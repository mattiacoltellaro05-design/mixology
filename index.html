<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bar Inventory Pro PRO</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --mint-50: #f8faf7; --mint-100: #eaf3ea; --mint-200: #d8e8d8; 
      --mint-300: #c5ddc5; --mint-400: #b3d2b3; --mint-500: #a8c4a5;
      --mint-600: #90b39a; --mint-700: #7d9a7a; --text-primary: #1a3c1a; 
      --accent: #f4a261; --danger: #ef476f; --success: #2a9d8f; --profit: #48cae4;
      --glass: rgba(255,255,255,0.1); --shadow: 0 8px 32px rgba(94,122,90,0.3);
    }
    [data-theme="dark"] {
      --mint-50: #1a231a; --mint-100: #2d3a2d; --mint-200: #3d4f3d; --mint-300: #4d644d; 
      --mint-400: #5d795d; --mint-500: #6e8e6e; --text-primary: #e8f5e8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system,BlinkMacSystemFont,sans-serif; 
      background: linear-gradient(135deg,var(--mint-100),var(--mint-300)); 
      min-height: 100vh; 
      color: var(--text-primary); 
      transition: all 0.3s ease;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .header { 
      text-align: center; 
      padding: 30px; 
      background: var(--glass); 
      border-radius: 24px; 
      margin-bottom: 30px; 
      backdrop-filter: blur(20px); 
      box-shadow: var(--shadow); 
    }
    .header h1 { 
      font-size: clamp(1.8rem,5vw,2.5rem); 
      background: linear-gradient(45deg,var(--mint-700),var(--accent)); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
      background-clip: text;
    }
    
    /* TABS SYSTEM - COMPLETAMENTE RIFATTO */
    .tabs-container {
      margin-bottom: 30px;
    }
    .tab-buttons {
      display: flex; 
      gap: 10px; 
      justify-content: center; 
      flex-wrap: wrap;
    }
    .tab-btn { 
      padding: 12px 24px; 
      border: none; 
      border-radius: 20px; 
      cursor: pointer; 
      background: var(--glass); 
      color: var(--text-primary); 
      transition: all 0.3s; 
      font-weight: 600;
    }
    .tab-btn.active { 
      background: var(--mint-500) !important; 
      color: white !important; 
      transform: translateY(-2px); 
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .tab-btn:hover:not(.active) {
      background: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }
    
    .tab-content { 
      display: none; 
    }
    .tab-content.active { 
      display: block; 
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
    @media (max-width: 768px) { 
      .main-grid { grid-template-columns: 1fr; } 
      .tab-buttons { gap: 8px; }
      .tab-btn { padding: 10px 16px; font-size: 0.9rem; }
    }
    
    .cocktails-buttons { 
      display: grid; 
      grid-template-columns: repeat(3,1fr); 
      gap: 12px; 
      max-height: 420px; 
      overflow-y: auto; 
      padding: 10px; 
    }
    .cocktail-btn { 
      background: var(--mint-50); 
      border: 2px solid transparent; 
      border-radius: 16px; 
      padding: 12px 8px; 
      text-align: center; 
      cursor: pointer; 
      min-height: 75px; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      font-size: 0.85rem; 
      font-weight: 600; 
      transition: all 0.3s; 
    }
    .cocktail-btn:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 8px 25px rgba(0,0,0,0.2); 
    }
    .cocktail-btn.selected { 
      border-color: var(--accent); 
      background: linear-gradient(45deg,var(--accent),#e76f51); 
      color: white; 
    }
    .cocktail-count { font-size: 1.1rem; font-weight: bold; margin-top: 2px; }
    .cocktail-price { font-size: 0.7rem; opacity: 0.9; margin-top: 2px; }
    .cocktail-profit { 
      font-size: 0.65rem; 
      background: var(--profit); 
      color: white; 
      padding: 2px 6px; 
      border-radius: 10px; 
      margin-top: 2px; 
    }
    
    .reorder-section { 
      background: linear-gradient(135deg,#ffeaa7,#fdcb6e); 
      margin-bottom: 20px; 
      padding: 20px; 
      border-radius: 20px; 
    }
    .reorder-list { 
      display: grid; 
      grid-template-columns: repeat(auto-fill,minmax(250px,1fr)); 
      gap: 10px; 
    }
    .reorder-item { 
      background: white; 
      padding: 15px; 
      border-radius: 16px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
    }
    .reorder-item.critical { 
      background: linear-gradient(45deg,var(--danger),#ff6b7b); 
      color: white; 
    }
    .reorder-btn { 
      padding: 8px 16px; 
      border: none; 
      border-radius: 12px; 
      cursor: pointer; 
      font-weight: 600; 
      margin: 0 2px; 
    }
    .btn-restock { background: var(--success); color: white; }
    .btn-edit { background: var(--mint-500); color: white; }
    
    .inventory-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill,minmax(200px,1fr)); 
      gap: 15px; 
      max-height: 500px; 
      overflow-y: auto; 
      padding: 10px; 
    }
    .bottle-card { 
      background: var(--glass); 
      backdrop-filter: blur(15px); 
      border-radius: 16px; 
      padding: 15px; 
      text-align: center; 
      box-shadow: var(--shadow); 
      border-left: 4px solid var(--mint-500); 
      cursor: pointer; 
      transition: all 0.2s; 
    }
    .bottle-card:hover { transform: scale(1.02); }
    .bottle-low { 
      border-left-color: var(--danger) !important; 
      animation: pulse 2s infinite; 
    }
    @keyframes pulse { 
      0%,100% { opacity: 1; } 
      50% { opacity: 0.6; } 
    }
    
    .btn { 
      padding: 12px 24px; 
      border: none; 
      border-radius: 16px; 
      cursor: pointer; 
      font-weight: 600; 
      transition: all 0.3s; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
      margin: 5px; 
      background: var(--mint-500); 
      color: white; 
    }
    .btn:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 8px 25px rgba(0,0,0,0.3); 
    }
    .btn-success { background: linear-gradient(45deg,var(--success),#48cae4); }
    .btn-danger { background: linear-gradient(45deg,var(--danger),#ff6b7a); }
    .btn-small { padding: 6px 12px; font-size: 0.8rem; }
    
    .settings { 
      position: fixed; 
      top: 20px; 
      right: 20px; 
      z-index: 1000; 
    }
    .settings-btn { 
      width: 55px; 
      height: 55px; 
      border-radius: 50%; 
      background: var(--mint-500); 
      color: white; 
      border: none; 
      font-size: 1.3rem; 
      cursor: pointer; 
      box-shadow: var(--shadow); 
      transition: all 0.3s;
    }
    .settings-btn:hover {
      transform: scale(1.05) rotate(90deg);
    }
    
    .overlay { 
      position: fixed; 
      top: 0; 
      left: 0; 
      right: 0; 
      bottom: 0; 
      background: rgba(0,0,0,0.7); 
      display: none; 
      z-index: 999; 
      backdrop-filter: blur(10px); 
      place-items: center; 
    }
    .overlay.show { display: grid; }
    .modal { 
      background: var(--mint-50); 
      border-radius: 24px; 
      padding: 30px; 
      max-width: 600px; 
      width: 90%; 
      max-height: 85vh; 
      overflow-y: auto; 
      box-shadow: var(--shadow); 
    }
    .editor-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill,minmax(250px,1fr)); 
      gap: 15px; 
    }
    .input-group { 
      display: flex; 
      flex-direction: column; 
      gap: 8px; 
    }
    .input-field { 
      padding: 12px; 
      border: 2px solid var(--mint-200); 
      border-radius: 12px; 
      font-size: 1rem; 
      transition: border-color 0.3s;
    }
    .input-field:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(244, 162, 97, 0.1);
    }
    .order-item { 
      background: var(--mint-50); 
      border-radius: 16px; 
      padding: 15px; 
      margin-bottom: 10px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
    }
    .summary-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); 
      gap: 20px; 
      margin-top: 30px; 
    }
    .summary-card { 
      background: var(--glass); 
      border-radius: 20px; 
      padding: 20px; 
      text-align: center; 
      backdrop-filter: blur(10px);
    }
    .summary-value { 
      font-size: 2rem; 
      font-weight: bold; 
      color: var(--accent); 
    }
    .chart-container { 
      background: var(--glass); 
      border-radius: 20px; 
      padding: 20px; 
      backdrop-filter: blur(10px); 
      margin-top: 20px; 
    }
    .switch { 
      position: relative; 
      display: inline-block; 
      width: 60px; 
      height: 34px; 
    }
    .switch input { 
      opacity: 0; 
      width: 0; 
      height: 0; 
    }
    .slider { 
      position: absolute; 
      cursor: pointer; 
      top: 0; 
      left: 0; 
      right: 0; 
      bottom: 0; 
      background-color: #ccc; 
      transition: .4s; 
      border-radius: 34px; 
    }
    .slider:before { 
      position: absolute; 
      content: ""; 
      height: 26px; 
      width: 26px; 
      left: 4px; 
      bottom: 4px; 
      background-color: white; 
      transition: .4s; 
      border-radius: 50%; 
    }
    input:checked + .slider { 
      background-color: var(--accent); 
    }
    input:checked + .slider:before { 
      transform: translateX(26px); 
    }
  </style>
</head>
<body>
  <div class="settings">
    <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
  </div>
  
  <div class="container">
    <div class="header">
      <h1>🥃 Bar Inventory Pro <span style="font-size:0.6em;opacity:0.8;">PRO</span></h1>
      <div id="currentDate"></div>
    </div>

    <!-- TABS SYSTEM - RISTRUTTURATO -->
    <div class="tabs-container">
      <div class="tab-buttons">
        <button class="tab-btn active" data-tab="cocktails">🍹 Ordini</button>
        <button class="tab-btn" data-tab="inventory">🥤 Ingredienti</button>
        <button class="tab-btn" data-tab="analytics">📊 Analisi</button>
      </div>

      <div id="cocktailsTab" class="tab-content active">
        <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
          <button class="btn btn-success" onclick="openCocktailEditor()">➕ Nuovo Cocktail</button>
        </div>
        <div id="reorderSection" style="display:none;"></div>
        <div class="main-grid">
          <div>
            <h2 style="font-size:1.3rem;margin-bottom:15px;text-align:center;">Seleziona Cocktail</h2>
            <div class="cocktails-buttons" id="cocktailsGrid"></div>
          </div>
          <div>
            <h2>Ordini Oggi <span id="totalOrders">0</span></h2>
            <div id="ordersList"></div>
            <div class="summary-grid" id="summaryGrid"></div>
            <div style="text-align:center;margin-top:20px;">
              <button class="btn btn-danger" onclick="clearDay()">🗑️ Fine Giornata</button>
            </div>
          </div>
        </div>
      </div>

      <div id="inventoryTab" class="tab-content">
        <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
          <button class="btn btn-success" onclick="openIngredientEditor()">➕ Nuovo Ingrediente</button>
        </div>
        <div class="inventory-grid" id="inventoryGrid"></div>
      </div>

      <div id="analyticsTab" class="tab-content">
        <div class="chart-container">
          <h3>🥇 TOP 5 Cocktail</h3>
          <div id="topCocktails"></div>
        </div>
        <div class="chart-container">
          <h3>📈 Previsioni Riordino</h3>
          <div id="forecastList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODALS -->
  <div class="overlay" id="ingredientModal">
    <div class="modal">
      <h3>Ingredienti per <span id="currentCocktail"></span></h3>
      <div class="editor-grid" id="ingredientInputs"></div>
      <div style="text-align:center;margin-top:25px;gap:10px;display:flex;flex-wrap:wrap;justify-content:center;">
        <button class="btn" onclick="confirmOrder()">✅ Conferma</button>
        <button class="btn btn-danger btn-small" onclick="closeIngredientModal()">❌ Annulla</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="ingredientEditorModal">
    <div class="modal">
      <h3 id="ingredientEditorTitle">➕ Nuovo Ingrediente</h3>
      <div class="editor-grid">
        <div class="input-group">
          <label>Nome</label>
          <input type="text" id="ingredientName" class="input-field">
        </div>
        <div class="input-group">
          <label>Capacità (cl)</label>
          <input type="number" id="ingredientCapacity" class="input-field" min="50">
        </div>
        <div class="input-group">
          <label>Quantità Attuale</label>
          <input type="number" id="ingredientCurrent" class="input-field" min="0">
        </div>
        <div class="input-group">
          <label>Prezzo/L (€)</label>
          <input type="number" id="ingredientPrice" class="input-field" step="0.1">
        </div>
      </div>
      <div style="text-align:center;margin-top:25px;gap:10px;display:flex;justify-content:center;flex-wrap:wrap;">
        <button class="btn" onclick="saveIngredient()">✅ Salva</button>
        <button class="btn btn-danger" onclick="deleteIngredient()" id="deleteIngredientBtn" style="display:none;">🗑️ Elimina</button>
        <button class="btn btn-small" onclick="closeIngredientEditor()">❌ Annulla</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="cocktailEditorModal">
    <div class="modal">
      <h3 id="cocktailEditorTitle">➕ Nuovo Cocktail</h3>
      <div class="editor-grid">
        <div class="input-group">
          <label>Nome</label>
          <input type="text" id="cocktailName" class="input-field">
        </div>
        <div class="input-group">
          <label>Prezzo (€)</label>
          <input type="number" id="cocktailPrice" class="input-field" step="0.5">
        </div>
        <div class="input-group">
          <label>Qty/Ingrediente (cl)</label>
          <input type="number" id="cocktailDefaultQty" class="input-field" step="0.5" value="3">
        </div>
        <div class="input-group">
          <label>Ingredienti</label>
          <input type="text" id="cocktailIngredients" class="input-field" placeholder="Gin, Campari, Vermouth">
        </div>
      </div>
      <div style="text-align:center;margin-top:25px;gap:10px;display:flex;justify-content:center;flex-wrap:wrap;">
        <button class="btn" onclick="addCocktail()">✅ Salva</button>
        <button class="btn btn-danger" onclick="deleteCocktail()" id="deleteCocktailBtn" style="display:none;">🗑️ Elimina</button>
        <button class="btn btn-small" onclick="closeCocktailEditor()">❌ Annulla</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="settingsOverlay">
    <div class="modal">
      <h3>⚙️ Impostazioni</h3>
      <div style="display:grid;gap:15px;margin-bottom:20px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <label>Dark Mode</label>
          <label class="switch">
            <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">
            <span class="slider"></span>
          </label>
        </div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <button class="btn" onclick="exportAll()">📤 Backup</button>
        <button class="btn btn-danger" onclick="resetAll()">🔄 Reset</button>
      </div>
      <button class="btn" onclick="toggleSettings()" style="width:100%;margin-top:15px;">✕ Chiudi</button>
    </div>
  </div>

  <script>
    // DATI APPLICAZIONE
    let cocktailsDB = JSON.parse(localStorage.getItem('barCustomCocktails') || `{
      "Negroni":{"ingredients":["Gin","Campari","Vermouth"],"defaultQty":3,"price":12},
      "Aperol Spritz":{"ingredients":["Aperol","Prosecco","Soda"],"defaultQty":4,"price":10},
      "Moscow Mule":{"ingredients":["Vodka","Zenzero","Lime"],"defaultQty":3,"price":11}
    }`);
    
    let inventory = JSON.parse(localStorage.getItem('barInventory') || '{}');
    let dailyOrders = JSON.parse(localStorage.getItem('barOrdersToday') || '{}');
    let isDarkMode = localStorage.getItem('barDark') === 'true';
    let currentOrderCocktail = '';
    let editingCocktail = null;
    let editingIngredient = null;

    // INVENTARIO DEFAULT
    const defaultInventory = {
      'Gin': {capacity: 1000, current: 800, pricePerLiter: 25},
      'Campari': {capacity: 1000, current: 700, pricePerLiter: 22},
      'Vermouth': {capacity: 1000, current: 650, pricePerLiter: 18},
      'Aperol': {capacity: 1000, current: 850, pricePerLiter: 20},
      'Prosecco': {capacity: 2000, current: 1800, pricePerLiter: 15},
      'Soda': {capacity: 2000, current: 1900, pricePerLiter: 2},
      'Vodka': {capacity: 1000, current: 900, pricePerLiter: 22},
      'Zenzero': {capacity: 500, current: 300, pricePerLiter: 12},
      'Lime': {capacity: 200, current: 120, pricePerLiter: 35}
    };

    // INIZIALIZZAZIONE
    document.addEventListener('DOMContentLoaded', function() {
      // Dark mode
      if (isDarkMode) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('darkModeToggle').checked = true;
      }
      
      // Data corrente
      document.getElementById('currentDate').textContent = new Date().toLocaleDateString('it-IT', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
      
      // Inizializza inventario
      Object.keys(defaultInventory).forEach(key => {
        if (!inventory[key]) inventory[key] = defaultInventory[key];
      });
      localStorage.setItem('barInventory', JSON.stringify(inventory));
      
      // Inizializza app
      initTabs();
      initApp();
      
      // Overlay click fuori per chiudere
      document.querySelectorAll('.overlay').forEach(overlay => {
        overlay.addEventListener('click', function(e) {
          if (e.target === overlay) overlay.classList.remove('show');
        });
      });
    });

    // SISTEMA TABS - COMPLTAMENTE RINNOVATO
    function initTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const tabName = this.dataset.tab;
          
          // Rimuovi active da tutti
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          
          // Attiva corrente
          this.classList.add('active');
          document.getElementById(tabName + 'Tab').classList.add('active');
          
          // Refresh specifico
          if (tabName === 'analytics') renderAnalytics();
        });
      });
    }

    function initApp() {
      renderReorderList();
      renderCocktails();
      renderOrders();
      renderInventory();
      renderAnalytics();
    }

    // RENDER FUNZIONI
    function renderReorderList() {
      const critical = [], warning = [];
      Object.entries(inventory).forEach(([name, data]) => {
        const percentage = (data.current / data.capacity) * 100;
        if (percentage < 20) critical.push({name, data, percentage});
        else if (percentage < 40) warning.push({name, data, percentage});
      });
      
      const section = document.getElementById('reorderSection');
      const hasItems = critical.length || warning.length;
      if (!hasItems) return section.style.display = 'none';
      
      section.style.display = 'block';
      section.innerHTML = `
        <div class="reorder-section">
          <h3>🔔 DA RIORDINARE</h3>
          ${critical.length ? `
            <h4 style="color:var(--danger)">🔴 CRITICO (${critical.length})</h4>
            <div class="reorder-list">
              ${critical.map(({name, data, percentage}) => `
                <div class="reorder-item critical">
                  <div>
                    <strong>${name}</strong>
                    <br><small>${Math.round(data.current)}/${data.capacity}cl (${percentage.toFixed(1)}%)</small>
                  </div>
                  <div>
                    <button class="reorder-btn btn-restock" onclick="quickRestock('${name.replace(/'/g, "\\'")}', 0.9)">🔄 90%</button>
                    <button class="reorder-btn btn-edit" onclick="openIngredientEditor('${name.replace(/'/g, "\\'")}')">✏️</button>
                  </div>
                </div>
              `).join('')}
            </div>
          ` : ''}
          ${warning.length ? `
            <h4 style="color:#f4a261">🟡 ATTENZIONE (${warning.length})</h4>
            <div class="reorder-list">
              ${warning.map(({name, data}) => `
                <div class="reorder-item">
                  <div>
                    <strong>${name}</strong>
                    <br><small>${Math.round(data.current)}/${data.capacity}cl</small>
                  </div>
                  <button class="reorder-btn btn-restock" onclick="quickRestock('${name.replace(/'/g, "\\'")}', 0.9)">🔄 90%</button>
                </div>
              `).join('')}
            </div>
          ` : ''}
        </div>
      `;
    }

    function quickRestock(name, percentage) {
      if (confirm(`🔄 Riordinare ${name} al ${Math.round(percentage * 100)}%?`)) {
        inventory[name].current = Math.round(inventory[name].capacity * percentage);
        localStorage.setItem('barInventory', JSON.stringify(inventory));
        renderReorderList();
        renderInventory();
        alert(`✅ ${name}: ${inventory[name].current}cl`);
      }
    }

    function calculateCocktailCost(name) {
      const data = cocktailsDB[name];
      if (!data) return 0;
      let total = 0;
      data.ingredients.forEach(ingredient => {
        const value = inventory[ingredient];
        if (value) total += (data.defaultQty * value.pricePerLiter) / 100;
      });
      return total;
    }

    function renderCocktails() {
      document.getElementById('cocktailsGrid').innerHTML = Object.keys(cocktailsDB)
        .sort()
        .map(name => {
          const data = cocktailsDB[name];
          const count = dailyOrders[name] || 0;
          const cost = calculateCocktailCost(name);
          const profit = data.price - cost;
          return `
            <div class="cocktail-btn ${count > 0 ? 'selected' : ''}" onclick="openIngredientModal('${name.replace(/'/g, "\\'")}')">
              <div style="font-size:0.9rem;line-height:1.1;">${name}</div>
              <div class="cocktail-count">${count}</div>
              <div class="cocktail-price">€${data.price}</div>
              <div class="cocktail-profit">+€${profit.toFixed(2)}</div>
            </div>
          `;
        }).join('');
    }

    function renderOrders() {
      const total = Object.values(dailyOrders).reduce((a, b) => a + b, 0);
      document.getElementById('totalOrders').textContent = total;
      
      document.getElementById('ordersList').innerHTML = Object.entries(dailyOrders)
        .filter(([_, count]) => count > 0)
        .sort(([_, a], [__, b]) => b - a)
        .map(([name, count]) => {
          const price = cocktailsDB[name]?.price || 12;
          const cost = calculateCocktailCost(name) * count;
          const profit = (price * count) - cost;
          return `
            <div class="order-item">
              <span>${name}</span>
              <span style="font-weight:bold;font-size:1.2rem;color:var(--accent)">×${count}</span>
              <div style="font-size:0.9rem">
                €${(price * count).toFixed(1)} 
                <span style="color:var(--profit);">+€${profit.toFixed(1)}</span>
              </div>
            </div>
          `;
        }).join('') || '<div style="opacity:0.5;text-align:center;padding:20px">Nessun ordine</div>';

      const grid = document.getElementById('summaryGrid');
      const revenue = Object.entries(dailyOrders).reduce((sum, [name, count]) => 
        sum + (cocktailsDB[name]?.price || 12) * count, 0);
      const costs = Object.entries(dailyOrders).reduce((sum, [name, count]) => 
        sum + calculateCocktailCost(name) * count, 0);
      const profit = revenue - costs;
      
      grid.innerHTML = `
        <div class="summary-card">
          <div style="font-size:1.1rem;opacity:0.8;">Cocktail</div>
          <div class="summary-value">${total}</div>
        </div>
        <div class="summary-card">
          <div style="font-size:1.1rem;opacity:0.8;">Fatturato</div>
          <div class="summary-value">€${revenue.toFixed(1)}</div>
        </div>
        <div class="summary-card">
          <div style="font-size:1.1rem;opacity:0.8;">Costo Ing.</div>
          <div class="summary-value" style="color:#f4a261;">€${costs.toFixed(1)}</div>
        </div>
        <div class="summary-card">
          <div style="font-size:1.1rem;opacity:0.8;">✅ PROFITTO</div>
          <div class="summary-value" style="color:var(--profit);">€${profit.toFixed(1)}</div>
        </div>
      `;
    }

    function renderAnalytics() {
      document.getElementById('topCocktails').innerHTML = Object.entries(dailyOrders)
        .sort(([_, a], [__, b]) => b - a)
        .slice(0, 5)
        .map(([name, count], i) => {
          const total = Object.values(dailyOrders).reduce((a, b) => a + b, 0);
          const percentage = total ? ((count / total) * 100).toFixed(1) : 0;
          return `
            <div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid rgba(255,255,255,0.1);">
              <span>${['🥇','🥈','🥉','④','⑤'][i]} ${name}</span>
              <span>${count} (${percentage}%)</span>
            </div>
          `;
        }).join('') || '<div style="text-align:center;opacity:0.5;">Nessun dato</div>';

      document.getElementById('forecastList').innerHTML = Object.entries(inventory)
        .filter(([_, data]) => (data.current / data.capacity) < 0.5)
        .sort(([_, a], [__, b]) => (a.current / (a.capacity * 0.05)) - (b.current / (b.capacity * 0.05)))
        .slice(0, 8)
        .map(([name, data]) => {
          const days = Math.round((data.current / (data.capacity * 0.05)) / 2);
          const status = days <= 2 ? '🔴 URGENTE' : days <= 7 ? '🟡 PRESTO' : '🟢 OK';
          return `
            <div style="padding:12px;border-radius:12px;background:${
              days <= 2 ? '#ff6b7a' : days <= 7 ? '#f4a261' : '#2a9d8f'
            };color:white;margin-bottom:8px;">
              ${name}: ${Math.round(data.current)}cl → ${status} (${days}gg)
            </div>
          `;
        }).join('') || '<div style="text-align:center;opacity:0.5;">Tutti OK!</div>';
    }

    function renderInventory() {
      document.getElementById('inventoryGrid').innerHTML = Object.entries(inventory)
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([name, data]) => {
          const percentage = Math.min(100, (data.current / data.capacity) * 100);
          const low = percentage < 20;
          const costPerCl = (data.pricePerLiter / 100).toFixed(2);
          return `
            <div class="bottle-card ${low ? 'bottle-low' : ''}" onclick="openIngredientEditor('${name.replace(/'/g, "\\'")}')">
              <div style="font-weight:600;font-size:1.1rem;">${name}</div>
              <div style="font-size:1.3rem;font-weight:bold;">${Math.round(data.current)}cl</div>
              <div style="font-size:0.8rem;opacity:0.7;">${data.capacity}cl</div>
              <div style="font-size:0.85rem;">€${costPerCl}/cl</div>
              <div style="height:6px;background:var(--mint-200);border-radius:3px;margin-top:8px;overflow:hidden">
                <div style="height:100%;width:${percentage}%;background:var(--accent);transition:width 0.3s"></div>
              </div>
            </div>
          `;
        }).join('') || '<div style="grid-column:1/-1;text-align:center;opacity:0.5;padding:40px;">Aggiungi un ingrediente!</div>';
    }

    // ORDINI
    function openIngredientModal(name) {
      currentOrderCocktail = name;
      document.getElementById('currentCocktail').textContent = name;
      const data = cocktailsDB[name];
      const ingredients = data.ingredients;
      const qty = data.defaultQty;
      
      const element = document.getElementById('ingredientInputs');
      element.innerHTML = ingredients.map(ingredient => {
        const value = inventory[ingredient] || {current: 0};
        return `
          <div class="input-group">
            <label>${ingredient}</label>
            <input type="number" class="ingredient-qty input-field" data-ingredient="${ingredient}" value="${qty}" min="0" step="0.5">
            <small>${value.current.toFixed(1)}cl disponibili</small>
          </div>
        `;
      }).join('');
      
      document.getElementById('ingredientModal').classList.add('show');
    }

    function confirmOrder() {
      const inputs = document.querySelectorAll('.ingredient-qty');
      let valid = true;
      
      inputs.forEach(input => {
        const qty = parseFloat(input.value) || 0;
        const name = input.dataset.ingredient;
        const remaining = inventory[name];
        if (qty > 0 && (!remaining || remaining.current < qty)) {
          alert(`❌ ${name} insufficiente! (${remaining?.current?.toFixed(1) || 0}cl)`);
          valid = false;
        }
      });
      
      if (!valid) return;

      inputs.forEach(input => {
        const qty = parseFloat(input.value) || 0;
        const name = input.dataset.ingredient;
        if (qty > 0 && inventory[name]) {
          inventory[name].current = Math.max(0, inventory[name].current - qty);
        }
      });

      dailyOrders[currentOrderCocktail] = (dailyOrders[currentOrderCocktail] || 0) + 1;
      localStorage.setItem('barInventory', JSON.stringify(inventory));
      localStorage.setItem('barOrdersToday', JSON.stringify(dailyOrders));
      initApp();
      document.getElementById('ingredientModal').classList.remove('show');
    }

    function closeIngredientModal() {
      document.getElementById('ingredientModal').classList.remove('show');
    }

    // GESTIONE INGREDIENTI
    function openIngredientEditor(name = null) {
      editingIngredient = name;
      document.getElementById('ingredientEditorModal').classList.add('show');
      
      if (name) {
        const data = inventory[name];
        document.getElementById('ingredientEditorTitle').textContent = `✏️ Modifica ${name}`;
        document.getElementById('ingredientName').value = name;
        document.getElementById('ingredientCapacity').value = data.capacity;
        document.getElementById('ingredientCurrent').value = data.current;
        document.getElementById('ingredientPrice').value = data.pricePerLiter;
        document.getElementById('deleteIngredientBtn').style.display = 'inline-flex';
      } else {
        document.getElementById('ingredientEditorTitle').textContent = '➕ Nuovo Ingrediente';
        document.getElementById('ingredientName').value = '';
        document.getElementById('ingredientCapacity').value = '';
        document.getElementById('ingredientCurrent').value = '';
        document.getElementById('ingredientPrice').value = '';
        document.getElementById('deleteIngredientBtn').style.display = 'none';
      }
    }

    function saveIngredient() {
      const name = document.getElementById('ingredientName').value.trim();
      const capacity = parseFloat(document.getElementById('ingredientCapacity').value) || 1000;
      const current = parseFloat(document.getElementById('ingredientCurrent').value) || 0;
      const price = parseFloat(document.getElementById('ingredientPrice').value) || 0;
      
      if (!name) {
        alert('❌ Nome richiesto!');
        return;
      }
      
      if (inventory[name] && editingIngredient !== name && !confirm('Sovrascrivere?')) {
        return;
      }
      
      inventory[name] = {capacity, current, pricePerLiter: price};
      localStorage.setItem('barInventory', JSON.stringify(inventory));
      initApp();
      document.getElementById('ingredientEditorModal').classList.remove('show');
    }

    function deleteIngredient() {
      if (editingIngredient && confirm(`🗑️ Elimina "${editingIngredient}"?`)) {
        delete inventory[editingIngredient];
        localStorage.setItem('barInventory', JSON.stringify(inventory));
        initApp();
        document.getElementById('ingredientEditorModal').classList.remove('show');
      }
    }

    function closeIngredientEditor() {
      document.getElementById('ingredientEditorModal').classList.remove('show');
    }

    // GESTIONE COCKTAIL
    function openCocktailEditor(name = null) {
      editingCocktail = name;
      document.getElementById('cocktailEditorModal').classList.add('show');
      
      if (name) {
        const data = cocktailsDB[name];
        document.getElementById('cocktailEditorTitle').textContent = `✏️ Modifica ${name}`;
        document.getElementById('cocktailName').value = name;
        document.getElementById('cocktailPrice').value = data.price;
        document.getElementById('cocktailDefaultQty').value = data.defaultQty;
        document.getElementById('cocktailIngredients').value = data.ingredients.join(', ');
        document.getElementById('deleteCocktailBtn').style.display = 'inline-flex';
      } else {
        document.getElementById('cocktailEditorTitle').textContent = '➕ Nuovo Cocktail';
        document.getElementById('cocktailName').value = '';
        document.getElementById('cocktailPrice').value = '';
        document.getElementById('cocktailDefaultQty').value = 3;
        document.getElementById('cocktailIngredients').value = '';
        document.getElementById('deleteCocktailBtn').style.display = 'none';
      }
    }

    function addCocktail() {
      const name = document.getElementById('cocktailName').value.trim();
      const price = parseFloat(document.getElementById('cocktailPrice').value) || 10;
      const qty = parseFloat(document.getElementById('cocktailDefaultQty').value) || 3;
      const ingredients = document.getElementById('cocktailIngredients').value
        .split(',')
        .map(e => e.trim())
        .filter(e => e);
      
      if (!name || !ingredients.length) {
        alert('❌ Nome e ingredienti richiesti!');
        return;
      }
      
      cocktailsDB[name] = {ingredients, defaultQty: qty, price};
      localStorage.setItem('barCustomCocktails', JSON.stringify(cocktailsDB));
      initApp();
      document.getElementById('cocktailEditorModal').classList.remove('show');
    }

    function deleteCocktail() {
      if (editingCocktail && confirm(`🗑️ Elimina "${editingCocktail}"?`)) {
        delete cocktailsDB[editingCocktail];
        localStorage.setItem('barCustomCocktails', JSON.stringify(cocktailsDB));
        initApp();
        document.getElementById('cocktailEditorModal').classList.remove('show');
      }
    }

    function closeCocktailEditor() {
      document.getElementById('cocktailEditorModal').classList.remove('show');
    }

    // UTILITY
    function clearDay() {
      if (confirm('Azzerare ordini oggi?')) {
        dailyOrders = {};
        localStorage.setItem('barOrdersToday', JSON.stringify(dailyOrders));
        initApp();
      }
    }

    function toggleSettings() {
      document.getElementById('settingsOverlay').classList.toggle('show');
    }

    function toggleDarkMode() {
      isDarkMode = !isDarkMode;
      localStorage.setItem('barDark', isDarkMode);
      document.documentElement.setAttribute('data-theme', isDarkMode ? 'dark' : '');
    }

    function exportAll() {
      const data = { inventory, cocktailsDB, dailyOrders };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `bar-backup-${new Date().toISOString().split('T')[0]}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function resetAll() {
      if (confirm('❌ RESET TOTALE? Questo cancellerà TUTTI i dati!')) {
        localStorage.clear();
        location.reload();
      }
    }
  </script>
</body>
</html>
