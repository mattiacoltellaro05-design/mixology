<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍸 Bar Manager</title>
    <style>
        /* [TUTTO il tuo CSS originale rimane IDENTICO - 500+ righe] */
        :root {
            --bg-primary: #f8f9fa;
            --bg-secondary: white;
            --bg-input: #f2f2f7;
            --text-primary: #1c1c1e;
            --text-secondary: #8e8e93;
            --mint-100: #a8e6cf;
            --mint-200: #86c8b8;
            --mint-dark: #0f5132;
            --border: #e5e5e7;
            --shadow: rgba(0,0,0,0.08);
        }
        [data-theme="dark"] {
            --bg-primary: #1c1c1e;
            --bg-secondary: #2c2c2e;
            --bg-input: #3c3c3e;
            --text-primary: #f5f5f7;
            --text-secondary: #8e8e93;
            --mint-100: #88d4b8;
            --mint-200: #6bc5a9;
            --mint-dark: #0f5132;
            --border: #38383a;
            --shadow: rgba(0,0,0,0.3);
        }
        /* ... tutto il resto del tuo CSS perfetto ... */
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .cocktail-btn.ordered {
            animation: bounce 0.3s ease-out;
        }
    </style>
</head>
<body>
    <!-- [TUTTO il tuo HTML originale rimane IDENTICO] -->
    
    <script>
        class BarManager {
            constructor() {
                this.inventoryData = {};
                this.cocktailsData = {};
                this.dailyOrders = {};
                this.statsHistory = [];
                this.editingIngredient = null;
                this.editingCocktail = null;
                this.currentCocktailIngredients = {};
                this.ingredientSelectOpen = false;
                this.pendingQuantityCallback = null;
                
                this.init();
            }

            init() {
                this.initTheme();
                this.loadData();
                this.bindEvents();
                this.renderAll();
            }

            initTheme() {
                const saved = localStorage.getItem('theme');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (saved === 'dark' || (!saved && prefersDark)) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    document.getElementById('themeToggle').textContent = '☀️';
                }
            }

            toggleTheme() {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
                document.getElementById('themeToggle').textContent = isDark ? '🌙' : '☀️';
                localStorage.setItem('theme', isDark ? 'light' : 'dark');
            }

            loadData() {
                try {
                    const data = JSON.parse(localStorage.getItem('barData') || '{}');
                    this.inventoryData = data.inventory || {};
                    this.cocktailsData = data.cocktails || {};
                    this.dailyOrders = data.orders || {};
                    this.statsHistory = JSON.parse(localStorage.getItem('barStats') || '[]');
                } catch(e) {
                    console.error('Errore caricamento dati:', e);
                }
            }

            saveData() {
                try {
                    localStorage.setItem('barData', JSON.stringify({
                        inventory: this.inventoryData,
                        cocktails: this.cocktailsData,
                        orders: this.dailyOrders
                    }));
                    localStorage.setItem('barStats', JSON.stringify(this.statsHistory.slice(0, 30)));
                } catch(e) {
                    console.error('Errore salvataggio dati:', e);
                }
            }

            // [TUTTI i tuoi metodi originali: bindEvents, calculateCost, toggleIngredientSelect...]

            renderStats() {
                const grid = document.getElementById('statsGrid');
                
                if (this.statsHistory.length === 0) {
                    grid.innerHTML = '<div class="card" style="text-align:center;opacity:0.5;padding:40px;grid-column:1/-1;">Nessuna statistica disponibile</div>';
                    return;
                }

                const latest = this.statsHistory[0];
                const avgOrders = Math.round(this.statsHistory.reduce((sum,s)=>sum+s.totalOrders,0)/this.statsHistory.length);
                const avgProfit = Math.round(this.statsHistory.reduce((sum,s)=>sum+Math.abs(s.profit),0)/this.statsHistory.length * 100) / 100;
                const totalDays = this.statsHistory.length;
                const bestDay = this.statsHistory.reduce((best,s)=>Math.abs(s.profit)>Math.abs(best.profit)? s : best, this.statsHistory[0]);

                grid.innerHTML = `
                    <div class="stat-item card">
                        <div class="stat-label">Oggi</div>
                        <div class="stat-value">${latest.totalOrders}</div>
                    </div>
                    <div class="stat-item card">
                        <div class="stat-label">Media ordini</div>
                        <div class="stat-value">${avgOrders}</div>
                    </div>
                    <div class="stat-item card">
                        <div class="stat-label">Media profitto</div>
                        <div class="stat-value">€${avgProfit}</div>
                    </div>
                    <div class="stat-item card">
                        <div class="stat-label">Giorni totali</div>
                        <div class="stat-value">${totalDays}</div>
                    </div>
                    <div class="stat-item card" style="grid-column:span 2;">
                        <div class="stat-label">Miglior cocktail oggi</div>
                        <div class="stat-value">${latest.topCocktail || 'N/D'} (${latest.topCocktailCount})</div>
                    </div>
                    <div class="stat-item card" style="grid-column:span 2;">
                        <div class="stat-label">Miglior giornata</div>
                        <div class="stat-value">${bestDay.date} €${Math.abs(bestDay.profit).toFixed(1)}</div>
                    </div>
                `;
            }

            calculateDayStats() {
                const orders = Object.entries(this.dailyOrders).filter(([_,c])=>c>0);
                const totalOrders = orders.reduce((sum,[_,c])=>sum+c, 0);
                const revenue = orders.reduce((sum,[name,c])=>{
                    const cocktail = this.cocktailsData[name];
                    return sum + (cocktail?.price || 0) * c;
                }, 0);
                const costs = orders.reduce((sum,[name,c])=>{
                    const cocktail = this.cocktailsData[name];
                    return sum + (cocktail ? this.calculateCost(cocktail) * c : 0);
                }, 0);
                
                let topCocktail = null, topCount = 0;
                for (let [name, count] of orders) {
                    if (count > topCount) {
                        topCount = count;
                        topCocktail = name;
                    }
                }
                
                return {
                    date: new Date().toLocaleDateString('it-IT'),
                    totalOrders,
                    revenue,
                    costs,
                    profit: revenue - costs,
                    topCocktail,
                    topCocktailCount: topCount
                };
            }

            showQuantityInput(onConfirm) {
                this.pendingQuantityCallback = onConfirm;
                const modal = document.createElement('div');
                modal.id = 'qtyModal';
                modal.className = 'overlay show';
                modal.style.zIndex = '1001';
                modal.innerHTML = `
                    <div class="modal" style="max-width:300px">
                        <div class="modal-header"><h3>Quantità (cl)</h3></div>
                        <div class="modal-content">
                            <input id="qtyInput" type="number" step="5" min="10" max="200" value="50" 
                                   style="font-size:20px;text-align:center;">
                        </div>
                        <div class="modal-buttons">
                            <button class="mint-btn" onclick="barManager.confirmQuantity()">✓</button>
                            <button class="mint-btn" onclick="barManager.cancelQuantity()">✕</button>
                        </div>
                    </div>`;
                document.body.appendChild(modal);
                document.getElementById('qtyInput').focus();
                document.getElementById('qtyInput').select();
            }

            confirmQuantity() {
                const qty = parseFloat(document.getElementById('qtyInput').value);
                if (qty && qty > 0 && this.pendingQuantityCallback) {
                    this.pendingQuantityCallback(qty);
                }
                this.cancelQuantity();
            }

            cancelQuantity() {
                const modal = document.getElementById('qtyModal');
                if (modal) modal.remove();
                this.pendingQuantityCallback = null;
            }

            addIngredientToCocktail() {
                const selectedText = document.getElementById('selectedIngredient').textContent;
                if (selectedText === 'Seleziona ingrediente...') return;
                
                this.showQuantityInput(qty => {
                    this.currentCocktailIngredients[selectedText] = qty;
                    this.renderCocktailIngredientsList();
                });
            }

            exportData() {
                const data = {
                    inventory: this.inventoryData,
                    cocktails: this.cocktailsData,
                    stats: this.statsHistory
                };
                const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `bar-manager-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            }

            renderAll() {
                this.renderOrders();
                this.renderCocktails();
                this.renderInventory();
                this.renderStats();
            }
        }

        // Inizializza l'app
        const barManager = new BarManager();
    </script>
</body>
</html>
