<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bar Orders Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --mint-50: #f8faf7; --mint-100: #eaf3ea; --mint-200: #d8e8d8; 
      --mint-300: #c5ddc5; --mint-400: #b3d2b3; --mint-500: #a8c4a5;
      --mint-600: #90b39a; --mint-700: #7d9a7a; --mint-800: #6a8570;
      --mint-900: #5e7a5a; --text-primary: #1a3c1a; --accent: #f4a261;
      --glass: rgba(255,255,255,0.1); --shadow: 0 8px 32px rgba(94,122,90,0.3);
    }
    [data-theme="dark"] {
      --mint-50: #1a231a; --mint-100: #2d3a2d; --mint-200: #3d4f3d;
      --mint-300: #4d644d; --mint-400: #5d795d; --mint-500: #6e8e6e;
      --text-primary: #e8f5e8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, var(--mint-100), var(--mint-300));
      min-height: 100vh; color: var(--text-primary); transition: all 0.4s;
    }
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    .header {
      text-align: center; padding: 30px; backdrop-filter: blur(20px); 
      background: var(--glass); border-radius: 24px; margin-bottom: 30px;
      box-shadow: var(--shadow);
    }
    .header h1 { 
      font-size: clamp(1.8rem, 5vw, 2.5rem); 
      background: linear-gradient(45deg, var(--mint-700), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .date-display { font-size: 1.2rem; color: var(--text-secondary); }
    
    .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
    @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }
    
    .cocktails-grid {
      background: var(--glass); backdrop-filter: blur(15px); border-radius: 24px;
      padding: 20px; box-shadow: var(--shadow);
    }
    .cocktails-title { font-size: 1.3rem; margin-bottom: 15px; text-align: center; }
    
    /* TASTI PICCOLI MINT-STYLE 3x3 GRID */
    .cocktails-buttons {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
      max-height: 500px; overflow-y: auto;
    }
    .cocktail-btn {
      background: var(--mint-50); 
      border: 2px solid transparent; 
      border-radius: 16px; 
      padding: 12px 8px; 
      text-align: center; 
      cursor: pointer; 
      transition: all 0.3s ease;
      min-height: 70px; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .cocktail-btn:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 8px 25px rgba(0,0,0,0.2); 
    }
    .cocktail-btn.selected { 
      border-color: var(--accent); 
      background: linear-gradient(45deg, var(--accent), #e76f51); 
      color: white; 
    }
    .cocktail-price { font-size: 0.7rem; opacity: 0.8; margin-top: 2px; }
    .cocktail-count { font-size: 1.1rem; font-weight: bold; margin-top: 2px; }
    
    .orders-section {
      background: var(--glass); backdrop-filter: blur(15px); border-radius: 24px;
      padding: 25px; box-shadow: var(--shadow);
    }
    .orders-list { min-height: 300px; }
    .order-item {
      background: var(--mint-50); border-radius: 16px; padding: 15px; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .order-count { font-weight: bold; font-size: 1.3rem; color: var(--accent); }
    
    .summary-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px; margin-top: 30px;
    }
    .summary-card {
      background: var(--glass); border-radius: 20px; padding: 20px; text-align: center;
    }
    .summary-value { font-size: 2rem; font-weight: bold; color: var(--accent); }
    
    .btn {
      padding: 12px 24px; border: none; border-radius: 16px; cursor: pointer;
      font-weight: 600; transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .btn-primary { background: linear-gradient(45deg, var(--mint-500), var(--mint-600)); color: white; }
    .btn-danger { background: linear-gradient(45deg, #ef476f, #ff6b7a); color: white; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
    
    .settings { position: fixed; top: 20px; right: 20px; z-index: 1000; }
    .settings-btn { 
      width: 55px; height: 55px; border-radius: 50%; background: var(--mint-500); 
      color: white; border: none; font-size: 1.3rem; cursor: pointer; box-shadow: var(--shadow);
    }
    .overlay { 
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); 
      display: none; z-index: 999; backdrop-filter: blur(10px); place-items: center;
    }
    .overlay.show { display: grid; }
    .modal { 
      background: var(--mint-50); border-radius: 24px; padding: 30px; max-width: 500px; 
      width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow);
    }
    .toggle { display: flex; align-items: center; gap: 15px; margin: 15px 0; cursor: pointer; }
    .switch { position: relative; width: 55px; height: 28px; background: var(--mint-300); border-radius: 28px; }
    .switch input { opacity: 0; width: 0; }
    .slider { position: absolute; top: 2px; left: 2px; width: 24px; height: 24px; background: white; border-radius: 50%; transition: 0.3s; }
    input:checked + .switch .slider { transform: translateX(27px); background: var(--accent); }
    .price-row { display: flex; gap: 10px; align-items: center; margin: 10px 0; }
    .price-input { flex: 1; padding: 10px; border: 2px solid var(--mint-200); border-radius: 12px; font-size: 1rem; }
    
    @media (max-width: 600px) {
      .cocktails-grid { padding: 15px; }
      .cocktails-buttons { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .cocktail-btn { padding: 10px 6px; font-size: 0.8rem; min-height: 60px; }
      .main-grid { gap: 20px; }
    }
  </style>
</head>
<body>
  <div class="settings">
    <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
  </div>
  
  <div class="container">
    <div class="header">
      <h1>🥃 Bar Orders Tracker</h1>
      <div class="date-display" id="currentDate"></div>
    </div>

    <div class="main-grid">
      <div class="cocktails-grid">
        <h2 class="cocktails-title">Seleziona Cocktail</h2>
        <div class="cocktails-buttons" id="cocktailsGrid"></div>
      </div>

      <div class="orders-section">
        <h2>Ordini Oggi <span class="order-count" id="totalOrders">0</span></h2>
        <div class="orders-list" id="ordersList"></div>
        <div class="summary-grid" id="summaryGrid"></div>
        
        <div style="text-align: center; margin-top: 20px;">
          <button class="btn btn-danger" onclick="clearDay()">🗑️ Fine Giornata</button>
        </div>
      </div>
    </div>
  </div>

  <div class="overlay" id="settingsOverlay">
    <div class="modal">
      <h3>⚙️ Impostazioni</h3>
      
      <div class="toggle">
        <label>Modalità Scura</label>
        <label class="switch">
          <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle">
        <label>Vibrazioni</label>
        <label class="switch">
          <input type="checkbox" id="vibrationToggle" onchange="toggleVibration()">
          <span class="slider"></span>
        </label>
      </div>
      
      <div style="margin: 25px 0; padding: 20px; background: var(--mint-100); border-radius: 16px;">
        <h4>💰 Prezzi Cocktail (€)</h4>
        <div id="priceEditor"></div>
        <button class="btn btn-primary" style="width:100%; margin-top:15px;" onclick="savePrices()">💾 Salva Prezzi</button>
      </div>
      
      <button class="btn btn-primary" onclick="exportDay()">📤 Esporta JSON</button>
      <button class="btn btn-danger" onclick="resetAll()">🔄 Reset Tutto</button>
      <button class="btn" onclick="toggleSettings()">✕ Chiudi</button>
    </div>
  </div>

  <script>
    // Database Cocktail con ingredienti e costi base
    const cocktailsDB = {
      'Negroni': { ingredients: {Gin: 3, 'Campari': 3, 'Vermouth': 3}, cost: 1.80 },
      'Aperol Spritz': { ingredients: {'Aperol': 3, 'Prosecco': 6, 'Soda': 2}, cost: 1.50 },
      'Moscow Mule': { ingredients: {Vodka: 4, 'Zenzero': 12, Lime: 2}, cost: 1.60 },
      'Margarita': { ingredients: {Tequila: 5, 'Triple Sec': 2, Lime: 2}, cost: 1.90 },
      'Old Fashioned': { ingredients: {Whisky: 6, Zucchero: 1, Angostura: 0.2}, cost: 2.20 },
      'Espresso Martini': { ingredients: {Vodka: 5, 'Kahlua': 2, Caffè: 3}, cost: 2.10 },
      'Daiquiri': { ingredients: {Rum: 5, Lime: 2, 'Zucchero': 1.5}, cost: 1.70 },
      'Mojito': { ingredients: {Rum: 4, Lime: 2, Menta: 8, Zucchero: 2, Soda: 6}, cost: 1.80 }
    };

    let dailyOrders = JSON.parse(localStorage.getItem('barOrdersToday') || '{}');
    let customPrices = JSON.parse(localStorage.getItem('barCustomPrices') || '{}');
    let isDarkMode = localStorage.getItem('barDark') === 'true';
    let isVibrationEnabled = localStorage.getItem('barVibration') !== 'false';

    document.addEventListener('DOMContentLoaded', function() {
      if (isDarkMode) document.documentElement.setAttribute('data-theme', 'dark');
      updateToggles();
      document.getElementById('currentDate').textContent = new Date().toLocaleDateString('it-IT', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'});
      renderCocktails();
      renderOrders();
      vibrateIfEnabled(100);
    });

    function renderCocktails() {
      const grid = document.getElementById('cocktailsGrid');
      grid.innerHTML = Object.keys(cocktailsDB).map(name => {
        const price = customPrices[name] || cocktailsDB[name].cost;
        const count = dailyOrders[name] || 0;
        return `
          <div class="cocktail-btn ${count > 0 ? 'selected' : ''}" onclick="addOrder('${name}')">
            <div style="font-size: 0.9rem; line-height: 1.1;">${name}</div>
            <div class="cocktail-price">€${price.toFixed(2)}</div>
            <div class="cocktail-count">${count}</div>
          </div>
        `;
      }).join('');
    }

    function addOrder(cocktailName) {
      dailyOrders[cocktailName] = (dailyOrders[cocktailName] || 0) + 1;
      localStorage.setItem('barOrdersToday', JSON.stringify(dailyOrders));
      renderCocktails();
      renderOrders();
      vibrateIfEnabled([100, 50]);
    }

    function renderOrders() {
      const ordersList = document.getElementById('ordersList');
      const summaryGrid = document.getElementById('summaryGrid');
      const totalOrders = Object.values(dailyOrders).reduce((a, b) => a + b, 0);
      
      document.getElementById('totalOrders').textContent = totalOrders;

      ordersList.innerHTML = Object.entries(dailyOrders)
        .filter(([_, count]) => count > 0)
        .map(([name, count]) => `
          <div class="order-item">
            <span>${name}</span>
            <span class="order-count">${count}x</span>
          </div>
        `).join('') || '<div style="text-align:center;opacity:0.5">Nessun ordine</div>';

      // Calcola totali ingredienti
      const totalIngredients = {};
      Object.entries(dailyOrders).forEach(([cocktail, count]) => {
        Object.entries(cocktailsDB[cocktail].ingredients).forEach(([ing, qty]) => {
          totalIngredients[ing] = (totalIngredients[ing] || 0) + (qty * count);
        });
      });

      // Incasso con prezzi custom
      const totalRevenue = Object.entries(dailyOrders).reduce((sum, [cocktail, count]) => 
        sum + ((customPrices[cocktail] || cocktailsDB[cocktail].cost) * count * 8), 0);

      summaryGrid.innerHTML = `
        <div class="summary-card">
          <div class="summary-value">€${(totalRevenue/100).toFixed(0)}</div>
          <div>Incasso Stimato</div>
        </div>
        <div class="summary-card">
          <div class="summary-value">${totalOrders}</div>
          <div>Cocktail Totali</div>
        </div>
        <div class="summary-card">
          <div class="summary-value">${Object.keys(totalIngredients).length}</div>
          <div>Ingredienti Usati</div>
        </div>
      `;
    }

    function renderPriceEditor() {
      const editor = document.getElementById('priceEditor');
      editor.innerHTML = Object.keys(cocktailsDB).map(name => `
        <div class="price-row">
          <span style="min-width:130px; font-weight:600;">${name}</span>
          <input type="number" step="0.01" min="0" max="10" 
                 value="${(customPrices[name] || cocktailsDB[name].cost).toFixed(2)}" 
                 onchange="updateTempPrice('${name}', this.value)"
                 class="price-input">
          <span>€</span>
        </div>
      `).join('');
    }

    function updateTempPrice(name, value) {
      customPrices[name] = parseFloat(value) || cocktailsDB[name].cost;
    }

    function savePrices() {
      localStorage.setItem('barCustomPrices', JSON.stringify(customPrices));
      alert('Prezzi salvati! ✅');
      vibrateIfEnabled(100);
      renderCocktails();
    }

    function clearDay() {
      if (confirm('Finire giornata? Salva report!')) {
        localStorage.removeItem('barOrdersToday');
        dailyOrders = {};
        renderOrders();
        renderCocktails();
        vibrateIfEnabled(300);
        alert('Giornata chiusa! Dati salvati.');
      }
    }

    function toggleSettings() {
      document.getElementById('settingsOverlay').classList.toggle('show');
      if (document.getElementById('settingsOverlay').classList.contains('show')) {
        renderPriceEditor();
      }
    }

    function toggleDarkMode() {
      isDarkMode = !isDarkMode;
      document.documentElement.setAttribute('data-theme', isDarkMode ? 'dark' : '');
      localStorage.setItem('barDark', isDarkMode);
      vibrateIfEnabled(100);
    }

    function toggleVibration() {
      isVibrationEnabled = !isVibrationEnabled;
      localStorage.setItem('barVibration', isVibrationEnabled);
      vibrateIfEnabled(100);
    }

    function updateToggles() {
      document.getElementById('darkModeToggle').checked = isDarkMode;
      document.getElementById('vibrationToggle').checked = isVibrationEnabled;
    }

    function vibrateIfEnabled(pattern = 100) {
      if (isVibrationEnabled && 'vibrate' in navigator) {
        navigator.vibrate(pattern);
      }
    }

    function exportDay() {
      const data = {
        date: new Date().toISOString().split('T')[0],
        orders: dailyOrders,
        prices: customPrices,
        timestamp: new Date().toISOString()
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `bar-report-${new Date().toISOString().split('T')[0]}.json`;
      a.click();
    }

    function resetAll() {
      if (confirm('Resettare TUTTO?')) {
        localStorage.clear();
        location.reload();
      }
    }
  </script>
</body>
</html>
