<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mixology Builder - Ricette Cocktail</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --mint-50: #f8faf7;
      --mint-100: #eaf3ea;
      --mint-200: #d8e8d8;
      --mint-300: #c5ddc5;
      --mint-400: #b3d2b3;
      --mint-500: #a8c4a5;
      --mint-600: #90b39a;
      --mint-700: #7d9a7a;
      --mint-800: #6a8570;
      --mint-900: #5e7a5a;
      --text-primary: #1a3c1a;
      --text-secondary: #4a6f4a;
      --accent: #f4a261;
      --glass: rgba(255,255,255,0.1);
      --shadow: 0 8px 32px rgba(94,122,90,0.3);
    }
    [data-theme="dark"] {
      --mint-50: #1a231a;
      --mint-100: #2d3a2d;
      --mint-200: #3d4f3d;
      --mint-300: #4d644d;
      --mint-400: #5d795d;
      --mint-500: #6e8e6e;
      --mint-600: #7ea37e;
      --mint-700: #8fb88f;
      --mint-800: #9fcda0;
      --mint-900: #b0e2b0;
      --text-primary: #e8f5e8;
      --text-secondary: #d0e0d0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, var(--mint-100), var(--mint-300));
      min-height: 100vh;
      color: var(--text-primary);
      transition: all 0.4s ease;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    .header {
      text-align: center; padding: 30px 0;
      backdrop-filter: blur(20px); background: var(--glass);
      border-radius: 24px; margin-bottom: 30px; box-shadow: var(--shadow);
    }
    .header h1 { 
      font-size: clamp(1.8rem, 5vw, 2.5rem); 
      background: linear-gradient(45deg, var(--mint-700), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .controls { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-bottom: 30px; }
    .btn {
      padding: 12px 24px; border: none; border-radius: 16px;
      background: linear-gradient(45deg, var(--mint-500), var(--mint-600));
      color: var(--text-primary); font-weight: 600; cursor: pointer;
      transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(94,122,90,0.3);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(94,122,90,0.4); }
    .btn:active { transform: translateY(0); }
    .btn-danger { background: linear-gradient(45deg, #ef476f, #ff6b7a); }
    .ingredients-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 15px; margin-bottom: 30px;
    }
    .ingredient-card {
      background: var(--glass); backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
      padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s ease;
      box-shadow: var(--shadow);
    }
    .ingredient-card:hover {
      transform: scale(1.05) translateY(-5px); background: var(--mint-200);
    }
    .ingredient-card.selected { background: var(--accent); color: white; }
    .ingredient-name { font-weight: 600; margin-bottom: 5px; }
    .recipe-output {
      background: var(--glass); backdrop-filter: blur(20px);
      border-radius: 24px; padding: 30px; box-shadow: var(--shadow);
      margin-bottom: 20px; display: none;
    }
    .recipe-output.show { display: block; animation: slideIn 0.4s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } }
    .shake-animation {
      font-size: 4rem; animation: shake 0.6s ease-in-out infinite;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px) rotate(-2deg); }
      75% { transform: translateX(10px) rotate(2deg); }
    }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 20px; margin: 20px 0; }
    .stat { text-align: center; }
    .stat-value { font-size: 2rem; font-weight: bold; color: var(--accent); }
    .cost-total { font-size: 1.5rem; font-weight: bold; text-align: center; margin: 20px 0; }
    #recipeChart { max-height: 300px; }
    .settings { position: fixed; top: 20px; right: 20px; z-index: 1000; }
    .settings-btn { 
      width: 50px; height: 50px; border-radius: 50%; 
      background: var(--mint-500); color: white; border: none;
      font-size: 1.2rem; cursor: pointer; box-shadow: var(--shadow);
    }
    .overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); display: none; z-index: 999;
      backdrop-filter: blur(10px); place-items: center;
    }
    .overlay.show { display: grid; }
    .modal { 
      background: var(--mint-50); border-radius: 24px; padding: 30px;
      max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;
      box-shadow: var(--shadow);
    }
    .toggle { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .switch { position: relative; width: 50px; height: 26px; background: var(--mint-300); border-radius: 26px; }
    .switch input { opacity: 0; width: 0; }
    .slider { position: absolute; top: 2px; left: 2px; width: 22px; height: 22px; background: white; border-radius: 50%; transition: 0.3s; }
    input:checked + .switch .slider { transform: translateX(24px); background: var(--accent); }
    @media (max-width: 600px) {
      .controls { flex-direction: column; align-items: center; }
      .ingredients-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <div class="settings">
    <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
  </div>
  
  <div class="container">
    <div class="header">
      <h1>🥃 Mixology Builder</h1>
      <p>Seleziona ingredienti dalla tua lista Mint e genera cocktail perfetti!</p>
    </div>

    <div class="controls">
      <button class="btn" onclick="generateRecipe()">🎲 Genera Ricetta</button>
      <button class="btn" onclick="clearSelection()">🗑️ Pulisci</button>
      <button class="btn" onclick="saveRecipe()">💾 Salva Preferita</button>
    </div>

    <div class="ingredients-grid" id="ingredientsGrid">
      <!-- Ingredient grid popola via JS -->
    </div>

    <div class="recipe-output" id="recipeOutput">
      <div class="shake-animation" id="shakeIcon">🧊</div>
      <h2 id="recipeTitle">Cocktail Generato</h2>
      <div class="stats-grid">
        <div class="stat">
          <div class="stat-value" id="totalCost">€0.00</div>
          <div>Totale Costo</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="alcoholPct">0%</div>
          <div>Alcol</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="prepTime">3 min</div>
          <div>Tempo</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="difficulty">★☆☆</div>
          <div>Difficoltà</div>
        </div>
      </div>
      
      <div class="cost-total" id="ingredientsList"></div>
      
      <canvas id="recipeChart"></canvas>
      
      <div style="text-align: center; margin-top: 20px;">
        <button class="btn" onclick="generateRecipe()">🎲 Nuova Ricetta</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="settingsOverlay">
    <div class="modal">
      <h3>⚙️ Impostazioni</h3>
      <div class="toggle">
        <label>Modalità Scura</label>
        <label class="switch">
          <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle">
        <label>Vibrazioni</label>
        <label class="switch">
          <input type="checkbox" id="vibrationToggle" onchange="toggleVibration()">
          <span class="slider"></span>
        </label>
      </div>
      <button class="btn" onclick="exportData()">📤 Backup JSON</button>
      <button class="btn btn-danger" onclick="resetData()">🔄 Reset</button>
      <button class="btn" onclick="toggleSettings()">✕ Chiudi</button>
    </div>
  </div>

  <script>
    // Dati ingredienti (compatibile con tua lista Mint)
    const ingredientsDB = {
      'Vodka': { price: 0.45, alcohol: 40, type: 'spirit' },
      'Gin': { price: 0.50, alcohol: 40, type: 'spirit' },
      'Rum': { price: 0.40, alcohol: 40, type: 'spirit' },
      'Tequila': { price: 0.55, alcohol: 40, type: 'spirit' },
      'Triple Sec': { price: 0.35, alcohol: 40, type: 'liqueur' },
      'Maraschino': { price: 0.60, alcohol: 32, type: 'liqueur' },
      'Succo Limone': { price: 0.15, alcohol: 0, type: 'mixer' },
      'Succo Lime': { price: 0.20, alcohol: 0, type: 'mixer' },
      'Sciroppo Zucchero': { price: 0.10, alcohol: 0, type: 'sweetener' },
      'Soda': { price: 0.05, alcohol: 0, type: 'soda' },
      'Acqua Tonica': { price: 0.25, alcohol: 0, type: 'soda' },
      'Latte': { price: 0.12, alcohol: 0, type: 'dairy' },
      'Panna': { price: 0.18, alcohol: 0, type: 'dairy' },
      'Birra': { price: 0.80, alcohol: 5, type: 'beer' }
    };

    let selectedIngredients = [];
    let chart = null;
    let isDarkMode = localStorage.getItem('mixologyDark') === 'true';
    let isVibrationEnabled = localStorage.getItem('mixologyVibration') !== 'false';
    let savedRecipes = JSON.parse(localStorage.getItem('mixologySaved') || '[]');

    // Inizializzazione
    document.addEventListener('DOMContentLoaded', function() {
      if (isDarkMode) document.documentElement.setAttribute('data-theme', 'dark');
      updateToggles();
      renderIngredients();
      vibrateIfEnabled(100);
    });

    function renderIngredients() {
      const grid = document.getElementById('ingredientsGrid');
      grid.innerHTML = Object.keys(ingredientsDB).map(name => `
        <div class="ingredient-card" onclick="toggleIngredient('${name}')">
          <div class="ingredient-name">${name}</div>
          <div>€${ingredientsDB[name].price.toFixed(2)}</div>
        </div>
      `).join('');
    }

    function toggleIngredient(name) {
      const index = selectedIngredients.indexOf(name);
      if (index > -1) {
        selectedIngredients.splice(index, 1);
      } else {
        selectedIngredients.push(name);
      }
      renderIngredients();
      vibrateIfEnabled(50);
      document.querySelectorAll('.ingredient-card')[Object.keys(ingredientsDB)[selectedIngredients.length-1] || 0]?.classList.add('selected');
    }

    function generateRecipe() {
      if (selectedIngredients.length < 2) {
        alert('Seleziona almeno 2 ingredienti! 🍸');
        return;
      }

      const recipe = createRandomRecipe();
      displayRecipe(recipe);
      vibrateIfEnabled([100, 50, 100]);
      document.getElementById('shakeIcon').style.display = 'block';
      setTimeout(() => document.getElementById('shakeIcon').style.display = 'none', 2000);
    }

    function createRandomRecipe() {
      const used = [...selectedIngredients];
      const recipe = { ingredients: [], instructions: [], name: '' };
      
      // 3-5 ingredienti random
      for (let i = 0; i < Math.floor(Math.random() * 3) + 3; i++) {
        const ing = used[Math.floor(Math.random() * used.length)];
        recipe.ingredients.push({ name: ing, amount: Math.floor(Math.random() * 6) + 1 });
      }

      // Calcola statistiche
      let totalCost = 0, totalVolume = 0, totalAlcohol = 0;
      recipe.ingredients.forEach(ing => {
        const data = ingredientsDB[ing.name];
        totalCost += data.price * ing.amount;
        totalVolume += ing.amount * 30; // 30ml per unità
        totalAlcohol += data.alcohol * ing.amount * 0.4; // 40% volume alcol
      });

      recipe.totalCost = totalCost;
      recipe.alcoholPct = Math.round((totalAlcohol / totalVolume) * 100);
      recipe.prepTime = Math.floor(Math.random() * 3) + 2;
      recipe.difficulty = '★'.repeat(Math.floor(Math.random() * 3) + 1) + '☆'.repeat(2);
      
      recipe.name = generateCocktailName();
      recipe.instructions = ['Shake con ghiaccio', 'Versa in bicchiere freddo', 'Guarnisci a piacere'];
      
      return recipe;
    }

    function generateCocktailName() {
      const names = ['Sunset Breeze', 'Midnight Elixir', 'Golden Negroni', 'Citrus Storm', 'Velvet Kiss', 'Emerald Dream'];
      return names[Math.floor(Math.random() * names.length)];
    }

    function displayRecipe(recipe) {
      document.getElementById('recipeOutput').classList.add('show');
      document.getElementById('recipeTitle').textContent = recipe.name;
      document.getElementById('totalCost').textContent = `€${recipe.totalCost.toFixed(2)}`;
      document.getElementById('alcoholPct').textContent = `${recipe.alcoholPct}%`;
      document.getElementById('prepTime').textContent = `${recipe.prepTime} min`;
      document.getElementById('difficulty').textContent = recipe.difficulty;
      
      document.getElementById('ingredientsList').innerHTML = recipe.ingredients
        .map(ing => `<div>${ing.name}: ${ing.amount}cl</div>`)
        .join('');

      renderChart(recipe.ingredients);
    }

    function renderChart(ingredients) {
      const ctx = document.getElementById('recipeChart').getContext('2d');
      if (chart) chart.destroy();
      
      chart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ingredients.map(i => i.name),
          datasets: [{
            data: ingredients.map(i => i.amount),
            backgroundColor: ['#f4a261', '#e76f51', '#2a9d8f', '#264653', '#f77f00']
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom' } }
        }
      });
    }

    function clearSelection() {
      selectedIngredients = [];
      renderIngredients();
      document.getElementById('recipeOutput').classList.remove('show');
      vibrateIfEnabled(200);
    }

    function saveRecipe() {
      if (!chart) return;
      const recipeData = {
        ...chart.data.labels.reduce((acc, name, i) => {
          acc[name] = chart.data.datasets[0].data[i];
          return acc;
        }, {}),
        timestamp: new Date().toISOString()
      };
      savedRecipes.push(recipeData);
      localStorage.setItem('mixologySaved', JSON.stringify(savedRecipes));
      alert('Ricetta salvata! 🎉');
    }

    // Impostazioni
    function toggleSettings() {
      document.getElementById('settingsOverlay').classList.toggle('show');
    }

    function toggleDarkMode() {
      isDarkMode = !isDarkMode;
      document.documentElement.setAttribute('data-theme', isDarkMode ? 'dark' : '');
      localStorage.setItem('mixologyDark', isDarkMode);
      vibrateIfEnabled(100);
    }

    function toggleVibration() {
      isVibrationEnabled = !isVibrationEnabled;
      localStorage.setItem('mixologyVibration', isVibrationEnabled);
      vibrateIfEnabled(100);
    }

    function updateToggles() {
      document.getElementById('darkModeToggle').checked = isDarkMode;
      document.getElementById('vibrationToggle').checked = isVibrationEnabled;
    }

    function vibrateIfEnabled(pattern = 100) {
      if (isVibrationEnabled && 'vibrate' in navigator) {
        navigator.vibrate(pattern);
      }
    }

    function exportData() {
      const data = {
        savedRecipes,
        settings: { isDarkMode, isVibrationEnabled },
        timestamp: new Date().toISOString()
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `mixology-backup-${new Date().toISOString().split('T')[0]}.json`;
      a.click();
    }

    function resetData() {
      if (confirm('Resettare tutto?')) {
        localStorage.removeItem('mixologySaved');
        localStorage.removeItem('mixologyDark');
        localStorage.removeItem('mixologyVibration');
        location.reload();
      }
    }
  </script>
</body>
</html>
