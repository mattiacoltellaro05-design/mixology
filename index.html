<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍸 Bar Manager</title>
    <style>
        :root {
            --bg: #f5f8f5;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-light: #666666;
            --mint: #a8e6cf;
            --mint-dark: #86c8b8;
            --mint-darker: #6ab8a7;
            --border: #e0e0e0;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-light: 0 2px 10px rgba(0,0,0,0.05);
        }
        [data-theme="dark"] {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --text-light: #b0b0b0;
            --mint: #4caf50;
            --mint-dark: #45a049;
            --mint-darker: #3d8b40;
            --border: #333333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh; 
            padding-bottom: 100px;
        }
        body.loading { opacity: 0.7; pointer-events: none; }
        
        .app-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        .header { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 20px; 
            margin-bottom: 25px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .header h1 { font-size: 2rem; font-weight: 700; color: var(--mint-darker); }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        
        .mint-btn { 
            background: var(--mint); 
            color: #1a1a1a; 
            border: 1px solid var(--mint-dark); 
            padding: 12px 24px; 
            border-radius: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s;
            font-size: 16px;
        }
        .mint-btn:hover { 
            background: var(--mint-dark); 
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(168,230,207,0.4);
        }
        .theme-toggle { 
            width: 48px; height: 48px; 
            border-radius: 50%; 
            background: var(--mint); 
            border: 2px solid var(--mint-dark);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 20px; color: #1a1a1a;
            transition: all 0.2s;
        }
        .theme-toggle:hover { background: var(--mint-dark); transform: scale(1.05); }
        
        .date-bar { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
        }
        
        .tabs { 
            display: flex; gap: 8px; 
            background: var(--card); 
            padding: 16px; 
            border-radius: 20px; 
            margin-bottom: 25px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
            overflow-x: auto;
        }
        .tab-btn { 
            padding: 12px 24px; 
            border: none; 
            background: transparent; 
            border-radius: 16px;
            cursor: pointer; 
            font-weight: 600; 
            color: var(--text-light);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tab-btn.active { 
            background: var(--mint); 
            color: #1a1a1a; 
            box-shadow: 0 4px 15px rgba(168,230,207,0.4);
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
        .card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: var(--shadow); 
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.12); }
        
        .summary-grid { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
        .summary-value { font-size: 2rem; font-weight: 800; color: var(--mint-darker); margin-top: 8px; }
        
        .bottle-card { cursor: pointer; text-align: center; }
        .bottle-card.bottle-low { border-left: 5px solid #ff6b6b; }
        .bottle-progress { 
            height: 8px; background: #f0f0f0; border-radius: 4px; 
            margin: 15px 0; overflow: hidden; border: 1px solid var(--border);
        }
        .bottle-progress-fill { 
            height: 100%; background: var(--mint); border-radius: 4px; 
            transition: width 0.4s ease;
        }
        
        .cocktail-card { cursor: pointer; text-align: center; position: relative; }
        .cocktail-card.selected { 
            border: 3px solid var(--mint); 
            box-shadow: 0 0 0 4px rgba(168,230,207,0.3);
        }
        .cocktail-count { font-size: 2.5rem; font-weight: 800; color: var(--mint-darker); margin: 15px 0; }
        .cocktail-price { font-size: 1.4rem; font-weight: 700; color: var(--mint-darker); }
        
        .orders-list { max-height: 450px; overflow-y: auto; }
        .order-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px; margin-bottom: 15px; background: var(--card);
            border-radius: 16px; box-shadow: var(--shadow-light); border: 1px solid var(--border);
        }
        
        .btn-danger { background: #ff6b6b !important; color: white !important; border-color: #ff5252 !important; }
        .btn-danger:hover { background: #ff5252 !important; }
        .btn-small { padding: 10px 16px; font-size: 14px; min-width: 44px; height: 44px; }
        
        .overlay { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.5); display: none; 
            align-items: center; justify-content: center; z-index: 1000;
        }
        .overlay.show { display: flex; }
        .modal { 
            background: var(--card); padding: 35px; 
            border-radius: 24px; max-width: 500px; width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); border: 1px solid var(--border);
        }
        .modal input { 
            width: 100%; padding: 16px; margin-bottom: 20px; 
            border: 2px solid var(--border); border-radius: 16px;
            font-size: 16px; background: #fafafa; transition: all 0.2s;
        }
        .modal input:focus { 
            outline: none; border-color: var(--mint); background: white;
            box-shadow: 0 0 0 3px rgba(168,230,207,0.2);
        }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; }
        
        .ingredient-row { 
            display: flex; align-items: center; gap: 12px; 
            padding: 16px; border-bottom: 1px solid var(--border); 
        }
        .ingredient-row:last-child { border-bottom: none; }
        .ingredient-row input[type="checkbox"] { width: 20px; height: 20px; }
        .ingredient-row input[type="number"] { flex: 1; }
        
        .total-badge { 
            position: fixed; bottom: 25px; right: 25px; left: 25px; 
            max-width: 350px; background: var(--mint); color: #1a1a1a;
            padding: 16px 24px; border-radius: 25px; font-weight: 700;
            font-size: 1.3rem; text-align: center; box-shadow: 0 8px 30px rgba(168,230,207,0.5);
        }
        
        @media (max-width: 768px) {
            .app-container { padding: 15px; }
            .header-top, .date-bar { flex-direction: column; gap: 15px; text-align: center; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-top">
                <h1>🍸 Bar Manager</h1>
                <div class="header-actions">
                    <button class="mint-btn" onclick="openIngredientEditor()">➕ Ingrediente</button>
                    <button class="mint-btn" onclick="openCocktailEditor()">🥃 Cocktail</button>
                    <button class="mint-btn btn-danger" onclick="clearDay()">🗑️ Azzera</button>
                    <div class="theme-toggle" onclick="toggleDarkMode()">🌙</div>
                </div>
            </div>
            <div class="date-bar">
                <div id="currentDate" style="font-size: 1.1rem; font-weight: 600;"></div>
                <div>
                    <button class="mint-btn" onclick="exportAll()">📊 Export</button>
                    <button class="mint-btn btn-danger btn-small" onclick="resetAll()">⚠️ Reset</button>
                </div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="orders">📋 Ordini</button>
            <button class="tab-btn" data-tab="inventory">🥛 Inventario</button>
            <button class="tab-btn" data-tab="cocktails">🍹 Cocktails</button>
            <button class="tab-btn" data-tab="reorder">🔄 Riordina</button>
            <button class="tab-btn" data-tab="analytics">📈 Stats</button>
        </div>

        <div id="ordersTab" class="tab-content active">
            <div class="grid summary-grid" id="summaryGrid"></div>
            <h3 style="margin: 25px 0 15px 0; font-size: 1.4rem; font-weight: 700;">Ordini Oggi</h3>
            <div id="ordersList" class="orders-list"></div>
        </div>

        <div id="inventoryTab" class="tab-content">
            <div class="grid" id="inventoryGrid"></div>
        </div>

        <div id="cocktailsTab" class="tab-content">
            <div class="grid" id="cocktailsGrid"></div>
        </div>

        <div id="reorderTab" class="tab-content">
            <div id="reorderSection"></div>
        </div>

        <div id="analyticsTab" class="tab-content">
            <div id="topCocktails"></div>
        </div>
    </div>

    <!-- MODALI -->
    <div id="ingredientEditorModal" class="overlay">
        <div class="modal">
            <h3 id="ingredientEditorTitle">➕ Nuovo Ingrediente</h3>
            <input id="ingredientName" placeholder="Nome ingrediente">
            <input id="ingredientCapacity" type="number" placeholder="Capacità (cl)">
            <input id="ingredientCurrent" type="number" placeholder="Quantità attuale (cl)">
            <input id="ingredientPrice" type="number" step="0.01" placeholder="Prezzo €/litro">
            <div class="modal-buttons">
                <button class="mint-btn" onclick="saveIngredient()">💾 Salva</button>
                <button id="deleteIngredientBtn" class="mint-btn btn-danger btn-small" onclick="deleteIngredient()" style="display:none">🗑️ Elimina</button>
                <button class="mint-btn btn-small" onclick="closeIngredientEditor()">✕</button>
            </div>
        </div>
    </div>

    <div id="cocktailEditorModal" class="overlay">
        <div class="modal">
            <h3 id="cocktailEditorTitle">🥃 Nuovo Cocktail</h3>
            <input id="cocktailName" placeholder="Nome cocktail">
            <input id="cocktailPrice" type="number" step="0.1" placeholder="Prezzo €">
            <div id="ingredientsSelector"></div>
            <div class="modal-buttons">
                <button class="mint-btn" onclick="saveCocktail()">💾 Salva</button>
                <button id="deleteCocktailBtn" class="mint-btn btn-danger btn-small" onclick="deleteCocktail()" style="display:none">🗑️ Elimina</button>
                <button class="mint-btn btn-small" onclick="closeCocktailEditor()">✕</button>
            </div>
        </div>
    </div>

    <div id="totalOrders" class="total-badge">0</div>

    <script>
        let inventoryData = {
            "Vodka": {capacity: 1000, current: 800, pricePerLiter: 25},
            "Gin": {capacity: 1000, current: 600, pricePerLiter: 28},
            "Rum": {capacity: 1000, current: 450, pricePerLiter: 22},
            "Tonica": {capacity: 2000, current: 300, pricePerLiter: 8}
        };
        let cocktailsData = {
            "Moscow Mule": {price: 12, ingredients: {"Vodka": 50, "Tonica": 150}},
            "Gin Tonic": {price: 11, ingredients: {"Gin": 40, "Tonica": 200}},
            "Cuba Libre": {price: 10, ingredients: {"Rum": 50, "Tonica": 150}}
        };
        let dailyOrders = {};
        let editingIngredient = null;
        let editingCocktail = null;
        let isDarkMode = localStorage.getItem('barDark') === 'true';
        const todayDate = new Date().toISOString().split('T')[0];

        // ✅ API SENZA CONSUMO INGREDIENTI
        async function apiGet(endpoint) {
            const data = localStorage.getItem('barData');
            const parsed = data ? JSON.parse(data) : {};
            if (endpoint === '/inventory') return parsed.inventory || inventoryData;
            if (endpoint === '/cocktails') return parsed.cocktails || cocktailsData;
            if (endpoint.startsWith('/orders/')) return parsed.orders || {};
            return {};
        }

        async function apiPost(endpoint, data) {
            const stored = JSON.parse(localStorage.getItem('barData') || '{}');
            
            if (endpoint === '/update_ingredient') {
                if (data.delete) {
                    delete stored.inventory[data.name];
                } else {
                    stored.inventory = stored.inventory || {};
                    stored.inventory[data.name] = {
                        capacity: data.capacity,
                        current: data.current,
                        pricePerLiter: data.pricePerLiter
                    };
                }
            }
            
            if (endpoint === '/update_cocktail') {
                if (data.delete) {
                    delete stored.cocktails[data.name];
                } else {
                    stored.cocktails = stored.cocktails || {};
                    stored.cocktails[data.name] = {
                        price: data.price,
                        ingredients: data.quantities
                    };
                }
            }
            
            if (endpoint === '/quick_order') {
                stored.orders = stored.orders || {};
                stored.orders[data.cocktail_name] = (stored.orders[data.cocktail_name] || 0) + 1;
                // ✅ NESSUN CONSUMO - solo contatore ordini
            }
            
            localStorage.setItem('barData', JSON.stringify(stored));
            return { success: true };
        }

        window.quickOrder = async function(cocktailName) {
            await apiPost('/quick_order', {cocktail_name: cocktailName, date: todayDate});
            await initApp();
        };

        // ✅ TASTO - FUNZIONANTE
        window.removeOrder = async function(name) {
            const stored = JSON.parse(localStorage.getItem('barData') || '{}');
            stored.orders = stored.orders || {};
            if (stored.orders[name] && stored.orders[name] > 1) {
                stored.orders[name]--;
            } else {
                delete stored.orders[name];
            }
            localStorage.setItem('barData', JSON.stringify(stored));
            await initApp();
        };

        window.openIngredientEditor = async function(name) {
            editingIngredient = name;
            const modal = document.getElementById('ingredientEditorModal');
            modal.classList.add('show');
            
            if (name && inventoryData[name]) {
                const data = inventoryData[name];
                document.getElementById('ingredientEditorTitle').textContent = '✏️ Modifica ' + name;
                document.getElementById('ingredientName').value = name;
                document.getElementById('ingredientCapacity').value = data.capacity;
                document.getElementById('ingredientCurrent').value = data.current;
                document.getElementById('ingredientPrice').value = data.pricePerLiter;
                document.getElementById('deleteIngredientBtn').style.display = 'inline-block';
            } else {
                document.getElementById('ingredientEditorTitle').textContent = '➕ Nuovo Ingrediente';
                document.getElementById('ingredientName').value = '';
                document.getElementById('ingredientCapacity').value = '1000';
                document.getElementById('ingredientCurrent').value = '1000';
                document.getElementById('ingredientPrice').value = '25';
                document.getElementById('deleteIngredientBtn').style.display = 'none';
            }
        };

        window.saveIngredient = async function() {
            const name = document.getElementById('ingredientName').value.trim();
            if (!name) return alert('❌ Nome richiesto');
            
            const capacity = parseFloat(document.getElementById('ingredientCapacity').value) || 1000;
            const current = parseFloat(document.getElementById('ingredientCurrent').value) || 0;
            const price = parseFloat(document.getElementById('ingredientPrice').value) || 0;
            
            await apiPost('/update_ingredient', {name, capacity, current, pricePerLiter: price});
            document.getElementById('ingredientEditorModal').classList.remove('show');
            await initApp();
        };

        window.deleteIngredient = async function() {
            if (!editingIngredient || !confirm('Elimina ' + editingIngredient + '?')) return;
            await apiPost('/update_ingredient', {name: editingIngredient, delete: true});
            document.getElementById('ingredientEditorModal').classList.remove('show');
            await initApp();
        };

        window.closeIngredientEditor = function() {
            document.getElementById('ingredientEditorModal').classList.remove('show');
        };

        // ✅ MODIFICA COCKTAIL CORRETTA
        window.openCocktailEditor = async function(name) {
            editingCocktail = name;
            const modal = document.getElementById('cocktailEditorModal');
            modal.classList.add('show');
            
            if (name && cocktailsData[name]) {
                const data = cocktailsData[name];
                document.getElementById('cocktailEditorTitle').textContent = '✏️ Modifica ' + name;
                document.getElementById('cocktailName').value = name;
                document.getElementById('cocktailPrice').value = data.price;
                document.getElementById('deleteCocktailBtn').style.display = 'inline-block';
            } else {
                document.getElementById('cocktailEditorTitle').textContent = '🥃 Nuovo Cocktail';
                document.getElementById('cocktailName').value = '';
                document.getElementById('cocktailPrice').value = '12';
                document.getElementById('deleteCocktailBtn').style.display = 'none';
            }
            
            // ✅ RICARICA INGREDIENTI DOPO 100ms
            setTimeout(renderIngredientsSelector, 100);
        };

        window.saveCocktail = async function() {
            const name = document.getElementById('cocktailName').value.trim();
            if (!name) return alert('❌ Nome richiesto');
            
            const price = parseFloat(document.getElementById('cocktailPrice').value) || 0;
            if (price <= 0) return alert('❌ Prezzo richiesto');
            
            const quantities = {};
            for (let ingredient in inventoryData) {
                const checkbox = document.getElementById('ing_' + ingredient.replace(/[^a-zA-Z0-9]/g, ''));
                if (checkbox?.checked) {
                    const qtyInput = checkbox.parentNode.querySelector('input[type="number"]');
                    const qty = parseFloat(qtyInput?.value) || 0;
                    if (qty > 0) quantities[ingredient] = qty;
                }
            }
            
            if (Object.keys(quantities).length === 0) return alert('❌ Seleziona ingredienti');
            
            await apiPost('/update_cocktail', {name, price, quantities});
            document.getElementById('cocktailEditorModal').classList.remove('show');
            await initApp();
        };

        window.deleteCocktail = async function() {
            if (!editingCocktail || !confirm('Elimina ' + editingCocktail + '?')) return;
            await apiPost('/update_cocktail', {name: editingCocktail, delete: true});
            document.getElementById('cocktailEditorModal').classList.remove('show');
            await initApp();
        };

        window.closeCocktailEditor = function() {
            document.getElementById('cocktailEditorModal').classList.remove('show');
        };

        window.clearDay = async function() {
            if (confirm('Azzerare ordini oggi?')) {
                const stored = JSON.parse(localStorage.getItem('barData') || '{}');
                stored.orders = {};
                localStorage.setItem('barData', JSON.stringify(stored));
                await initApp();
            }
        };

        window.toggleDarkMode = function() {
            isDarkMode = !isDarkMode;
            localStorage.setItem('barDark', isDarkMode);
            document.documentElement.setAttribute('data-theme', isDarkMode ? 'dark' : 'light');
        };

        window.exportAll = function() {
            const data = localStorage.getItem('barData');
            const blob = new Blob([data || '{}'], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'bar-data.json'; a.click();
        };

        window.resetAll = function() {
            if (confirm('RESET TOTALE?') && confirm('SICURO?')) {
                localStorage.clear(); location.reload();
            }
        };

        function calculateCocktailCost(name) {
            const data = cocktailsData[name];
            if (!data?.ingredients) return 0;
            let total = 0;
            for (let [ingredient, qty] of Object.entries(data.ingredients)) {
                const inv = inventoryData[ingredient];
                if (inv) total += (qty * inv.pricePerLiter) / 100;
            }
            return total;
        }

        function renderReorderList() {
            const section = document.getElementById('reorderSection');
            let html = '<div class="card"><h3 style="margin-bottom: 20px;">🔄 Da Riordinare</h3>';
            let hasItems = false;
            
            for (let [name, data] of Object.entries(inventoryData)) {
                const percentage = (data.current / data.capacity) * 100;
                if (percentage < 40) {
                    hasItems = true;
                    const critical = percentage < 20;
                    html += `
                        <div class="order-item ${critical ? 'bottle-low' : ''}">
                            <div>
                                <strong>${name}</strong><br>
                                <small>${Math.round(percentage)}% (${Math.round(data.current)}cl)</small>
                            </div>
                            <button class="mint-btn btn-small" onclick="quickRestock('${name.replace(/'/g, "\\'")}')">90%</button>
                        </div>`;
                }
            }
            
            section.innerHTML = hasItems ? html + '</div>' : '<div class="card" style="text-align:center;opacity:0.7;"><p>✅ Tutto a posto!</p></div>';
        }

        function renderCocktails() {
            const grid = document.getElementById('cocktailsGrid');
            let html = '';
            for (let [name, data] of Object.entries(cocktailsData).sort(([a], [b]) => a.localeCompare(b))) {
                const count = dailyOrders[name] || 0;
                const cost = calculateCocktailCost(name);
                const profit = data.price - cost;
                html += `
                    <div class="cocktail-card card ${count > 0 ? 'selected' : ''}" onclick="quickOrder('${name.replace(/'/g, "\\'")}')">
                        <div style="font-size:1.1rem;font-weight:600;margin-bottom:10px;">${name}</div>
                        <div class="cocktail-count">${count}</div>
                        <div class="cocktail-price">€${data.price.toFixed(1)}</div>
                        <div style="font-size:0.95rem;color:var(--text-light);">+€${profit.toFixed(1)}</div>
                    </div>`;
            }
            grid.innerHTML = html || '<div class="card" style="grid-column:1/-1;text-align:center;opacity:0.7;">Aggiungi cocktail</div>';
        }

        function renderOrders() {
            const total = Object.values(dailyOrders).reduce((a, b) => a + b, 0);
            document.getElementById('totalOrders').textContent = total;

            const list = document.getElementById('ordersList');
            let html = '';
            for (let [name, count] of Object.entries(dailyOrders).filter(([_, c]) => c > 0).sort(([_, a], [__, b]) => b - a)) {
                const price = cocktailsData[name]?.price || 12;
                const cost = calculateCocktailCost(name) * count;
                const profit = (price * count) - cost;
                html += `
                    <div class="order-item">
                        <div>
                            <div style="font-weight:600;font-size:1.1rem;">${name}</div>
                            <div style="font-size:0.9rem;color:var(--text-light);">€${(price*count).toFixed(1)}</div>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-size:1.4rem;font-weight:700;color:var(--mint-darker);">×${count}</div>
                            <div style="font-size:0.9rem;color:#27ae60;">+€${profit.toFixed(1)}</div>
                        </div>
                        <button class="mint-btn btn-danger btn-small" onclick="removeOrder('${name.replace(/'/g, "\\'")}')">➖</button>
                    </div>`;
            }
            list.innerHTML = html || '<div class="card" style="text-align:center;opacity:0.7;padding:40px;">Nessun ordine</div>';

            // Summary
            const revenue = Object.values(dailyOrders).reduce((sum, count) => {
                const name = Object.keys(dailyOrders).find(k => dailyOrders[k] === count);
                return sum + (cocktailsData[name]?.price || 12) * count;
            }, 0);
            const costs = Object.values(dailyOrders).reduce((sum, count) => {
                const name = Object.keys(dailyOrders).find(k => dailyOrders[k] === count);
                return sum + calculateCocktailCost(name) * count;
            }, 0);
            
            document.getElementById('summaryGrid').innerHTML = `
                <div class="card"><div>Cocktail</div><div class="summary-value">${total}</div></div>
                <div class="card"><div>Fatturato</div><div class="summary-value">€${revenue.toFixed(1)}</div></div>
                <div class="card"><div>Costo</div><div class="summary-value" style="color:#ff6b6b;">€${costs.toFixed(1)}</div></div>
                <div class="card"><div>Profitto</div><div class="summary-value" style="color:#27ae60;">€${(revenue-costs).toFixed(1)}</div></div>
            `;
        }

        function renderInventory() {
            const grid = document.getElementById('inventoryGrid');
            let html = '';
            for (let [name, data] of Object.entries(inventoryData).sort(([a], [b]) => a.localeCompare(b))) {
                const percentage = Math.min(100, (data.current / data.capacity) * 100);
                const low = percentage < 20;
                html += `
                    <div class="bottle-card card ${low ? 'bottle-low' : ''}" onclick="openIngredientEditor('${name.replace(/'/g, "\\'")}')">
                        <div style="font-weight:700;font-size:1.2rem;margin-bottom:8px;">${name}</div>
                        <div style="font-size:1.6rem;font-weight:800;color:var(--mint-darker);">${Math.round(data.current)}cl</div>
                        <div style="font-size:0.95rem;color:var(--text-light);">${data.capacity}cl tot.</div>
                        <div class="bottle-progress">
                            <div class="bottle-progress-fill" style="width:${percentage}%"></div>
                        </div>
                        <div style="display:flex;gap:8px;justify-content:center;margin-top:15px;">
                            <button class="mint-btn btn-small" onclick="event.stopPropagation();quickRestock('${name.replace(/'/g, "\\'")}')">🔄</button>
                            <button class="mint-btn btn-small" onclick="event.stopPropagation();openIngredientEditor('${name.replace(/'/g, "\\'")}')">✏️</button>
                        </div>
                    </div>`;
            }
            grid.innerHTML = html || '<div class="card" style="grid-column:1/-1;text-align:center;opacity:0.7;">Aggiungi ingrediente</div>';
        }

        function renderIngredientsSelector() {
            const selector = document.getElementById('ingredientsSelector');
            let html = '';
            for (let ingredient of Object.keys(inventoryData).sort()) {
                const cocktailName = document.getElementById('cocktailName').value;
                const cocktailData = cocktailsData[cocktailName];
                const isSelected = cocktailData?.ingredients?.[ingredient];
                const qty = cocktailData?.ingredients?.[ingredient] || '';
                const safeId = ingredient.replace(/[^a-zA-Z0-9]/g, '');
                
                html += `
                    <div class="ingredient-row">
                        <input type="checkbox" id="ing_${safeId}" ${isSelected ? 'checked' : ''}>
                        <label for="ing_${safeId}" style="flex:1;font-weight:500;">${ingredient}</label>
                        <input type="number" class="ingredient-qty" value="${qty}" min="0" step="0.5" placeholder="cl">
                    </div>`;
            }
            selector.innerHTML = html;
        }

        async function initApp() {
            document.body.classList.add('loading');
            const [inventory, cocktails, orders] = await Promise.all([
                apiGet('/inventory'), apiGet('/cocktails'), apiGet('/orders/' + todayDate)
            ]);
            inventoryData = inventory;
            cocktailsData = cocktails;
            dailyOrders = orders;
            
            renderCocktails();
            renderOrders();
            renderInventory();
            renderReorderList();
            document.body.classList.remove('loading');
        }

        function initTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById(this.dataset.tab + 'Tab').classList.add('active');
                });
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (isDarkMode) document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('it-IT', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });
            initTabs();
            document.querySelectorAll('.overlay').forEach(overlay => {
                overlay.addEventListener('click', e => {
                    if (e.target === overlay) overlay.classList.remove('show');
                });
            });
            initApp();
        });
    </script>
</body>
</html>
