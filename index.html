<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍸 Bar Manager</title>
    <style>
        :root {
            --bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card: rgba(255,255,255,0.95);
            --card-dark: rgba(50,50,70,0.95);
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --accent: #e74c3c;
            --accent-hover: #c0392b;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --border: rgba(255,255,255,0.2);
            --shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        [data-theme="dark"] {
            --bg: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            --card: rgba(40,44,52,0.98);
            --card-dark: rgba(30,34,42,0.98);
            --text: #ecf0f1;
            --text-light: #bdc3c7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh; 
            backdrop-filter: blur(10px);
        }
        body.loading { opacity: 0.7; pointer-events: none; }
        .app-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .header { 
            background: var(--card); 
            padding: 25px 30px; 
            border-radius: 20px; 
            box-shadow: var(--shadow);
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px;
            backdrop-filter: blur(20px);
        }
        .header h1 { 
            font-size: 2.2rem; 
            background: linear-gradient(45deg, var(--accent), #e57373);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .theme-toggle { 
            font-size: 1.6rem; 
            cursor: pointer; 
            padding: 12px; 
            border-radius: 50%; 
            background: var(--accent); 
            color: white;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(231,76,60,0.4);
        }
        .theme-toggle:hover { transform: scale(1.1); }

        .date-bar { 
            background: var(--card); 
            padding: 15px 25px; 
            border-radius: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px;
            box-shadow: var(--shadow);
        }
        .export-buttons { display: flex; gap: 12px; }

        .tabs { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 25px; 
            overflow-x: auto;
            background: var(--card);
            padding: 12px;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }
        .tab-btn { 
            padding: 12px 24px; 
            border: none; 
            background: transparent; 
            cursor: pointer; 
            font-weight: 600; 
            border-radius: 25px;
            transition: all 0.3s;
            color: var(--text-light);
        }
        .tab-btn.active { 
            background: var(--accent); 
            color: white; 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(231,76,60,0.4);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .summary-grid, .cocktails-grid, .inventory-grid { 
            display: grid; 
            gap: 20px; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        }
        .summary-card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 20px; 
            text-align: center;
            box-shadow: var(--shadow);
            backdrop-filter: blur(20px);
            transition: all 0.3s;
        }
        .summary-card:hover { transform: translateY(-5px); }
        .summary-value { font-size: 2.2rem; font-weight: 800; margin-top: 8px; }

        .bottle-card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 20px; 
            cursor: pointer; 
            text-align: center; 
            box-shadow: var(--shadow);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .bottle-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--accent);
        }
        .bottle-low::before { background: var(--danger); }
        .bottle-card:hover { transform: translateY(-8px) scale(1.02); }
        .bottle-card button { 
            margin: 4px; 
            padding: 10px 16px; 
            border-radius: 25px;
            font-size: 0.9rem;
            min-width: 50px;
        }

        .cocktail-btn { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 20px; 
            cursor: pointer; 
            text-align: center; 
            box-shadow: var(--shadow);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .cocktail-btn::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--success);
        }
        .cocktail-btn:hover { transform: translateY(-8px) scale(1.02); }
        .cocktail-btn.selected { 
            box-shadow: 0 15px 40px rgba(231,76,60,0.4); 
            border: 3px solid var(--accent);
        }
        .cocktail-count { font-size: 2.5rem; font-weight: 800; color: var(--accent); margin: 12px 0; }
        .cocktail-price { font-size: 1.5rem; font-weight: 700; color: var(--success); }
        .cocktail-profit { font-size: 1rem; color: var(--success); font-weight: 600; }

        .orders-list { max-height: 450px; overflow-y: auto; }
        .order-item { 
            background: var(--card); 
            padding: 20px; 
            margin-bottom: 15px; 
            border-radius: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }
        .order-item:hover { transform: translateX(5px); }

        .reorder-item { 
            background: var(--card); 
            padding: 20px; 
            margin-bottom: 15px; 
            border-radius: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: var(--shadow);
        }
        .reorder-item.critical { border-left: 6px solid var(--danger); }

        .btn { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: 600; 
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(231,76,60,0.4);
        }
        .btn:hover { 
            background: var(--accent-hover); 
            transform: translateY(-2px) scale(1.05); 
        }
        .btn-success { background: var(--success); box-shadow: 0 4px 15px rgba(39,174,96,0.4); }
        .btn-success:hover { background: #219a52; }
        .btn-danger { background: var(--danger); box-shadow: 0 4px 15px rgba(231,76,60,0.4); }
        .btn-danger:hover { background: #c0392b; }
        .btn-small { padding: 8px 16px; font-size: 0.9rem; min-width: 45px; height: 45px; }

        .overlay { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.7); 
            display: none; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .overlay.show { display: flex; }
        .modal { 
            background: var(--card); 
            padding: 35px; 
            border-radius: 25px; 
            max-width: 550px; 
            width: 90%; 
            max-height: 90vh; 
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 20px; 
            border: 2px solid var(--border); 
            border-radius: 15px; 
            font-size: 1.1rem; 
            background: rgba(255,255,255,0.8);
            transition: all 0.3s;
        }
        .modal input:focus { 
            outline: none; 
            border-color: var(--accent); 
            box-shadow: 0 0 0 4px rgba(231,76,60,0.1);
            transform: scale(1.02);
        }
        .modal-buttons { display: flex; gap: 15px; justify-content: flex-end; }

        .ingredient-checkbox { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 15px; 
            border-bottom: 1px solid var(--border);
            transition: all 0.2s;
        }
        .ingredient-checkbox:hover { background: rgba(231,76,60,0.05); }
        .ingredient-checkbox input[type="checkbox"] { width: auto; transform: scale(1.2); }
        .ingredient-checkbox input[type="number"] { 
            flex: 1; padding: 12px; border: 2px solid var(--border); border-radius: 10px;
        }

        .total-badge { 
            position: fixed; top: 25px; right: 25px; 
            background: var(--accent); 
            color: white; 
            padding: 15px 25px; 
            border-radius: 30px; 
            font-weight: 800; 
            font-size: 1.4rem; 
            box-shadow: 0 8px 30px rgba(231,76,60,0.6);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 8px 30px rgba(231,76,60,0.6); }
            50% { box-shadow: 0 8px 40px rgba(231,76,60,0.8); }
            100% { box-shadow: 0 8px 30px rgba(231,76,60,0.6); }
        }

        @media (max-width: 768px) {
            .app-container { padding: 15px; }
            .header, .date-bar { flex-direction: column; gap: 20px; text-align: center; }
            .summary-grid, .cocktails-grid, .inventory-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); }
            .tabs { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>🍸 Bar Manager</h1>
            <div class="header-actions">
                <button class="btn" onclick="openIngredientEditor()">➕ Ingrediente</button>
                <button class="btn" onclick="openCocktailEditor()">🥃 Cocktail</button>
                <button class="btn btn-danger" onclick="clearDay()">🗑️ Azzera</button>
                <div class="theme-toggle" onclick="toggleDarkMode()">🌙</div>
            </div>
        </header>

        <div class="date-bar">
            <div id="currentDate"></div>
            <div class="export-buttons">
                <button class="btn" onclick="exportAll()">📊 Export</button>
                <button class="btn btn-danger btn-small" onclick="resetAll()">⚠️ Reset</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="orders">📋 Ordini</button>
            <button class="tab-btn" data-tab="inventory">🥛 Inventario</button>
            <button class="tab-btn" data-tab="cocktails">🍹 Cocktail</button>
            <button class="tab-btn" data-tab="reorder">🔄 Riordina</button>
            <button class="tab-btn" data-tab="analytics">📈 Statistiche</button>
        </div>

        <div id="ordersTab" class="tab-content active">
            <div class="summary-section">
                <div id="summaryGrid" class="summary-grid"></div>
            </div>
            <div class="orders-section">
                <h3 style="margin-bottom: 20px; font-size: 1.5rem;">Ordini Oggi</h3>
                <div id="ordersList" class="orders-list"></div>
            </div>
        </div>

        <div id="inventoryTab" class="tab-content">
            <div id="inventoryGrid" class="inventory-grid"></div>
        </div>

        <div id="cocktailsTab" class="tab-content">
            <div id="cocktailsGrid" class="cocktails-grid"></div>
        </div>

        <div id="reorderTab" class="tab-content">
            <div id="reorderSection"></div>
        </div>

        <div id="analyticsTab" class="tab-content">
            <div id="topCocktails" style="background: var(--card); padding: 30px; border-radius: 20px; box-shadow: var(--shadow);"></div>
        </div>
    </div>

    <!-- MODALI -->
    <div id="ingredientEditorModal" class="overlay">
        <div class="modal">
            <h3 id="ingredientEditorTitle">➕ Nuovo Ingrediente</h3>
            <input id="ingredientName" placeholder="Nome ingrediente (es: Vodka)" required>
            <input id="ingredientCapacity" type="number" placeholder="Capacità totale (cl)" required>
            <input id="ingredientCurrent" type="number" placeholder="Quantità attuale (cl)" required>
            <input id="ingredientPrice" type="number" step="0.01" placeholder="Prezzo €/litro" required>
            <div class="modal-buttons">
                <button class="btn" onclick="saveIngredient()">💾 Salva</button>
                <button id="deleteIngredientBtn" class="btn btn-danger btn-small" onclick="deleteIngredient()" style="display:none">🗑️ Elimina</button>
                <button class="btn btn-small" onclick="closeIngredientEditor()">✕ Chiudi</button>
            </div>
        </div>
    </div>

    <div id="cocktailEditorModal" class="overlay">
        <div class="modal">
            <h3 id="cocktailEditorTitle">🥃 Nuovo Cocktail</h3>
            <input id="cocktailName" placeholder="Nome cocktail (es: Moscow Mule)" required>
            <input id="cocktailPrice" type="number" step="0.1" placeholder="Prezzo di vendita €" required>
            <div id="ingredientsSelector" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px;"></div>
            <div class="modal-buttons">
                <button class="btn" onclick="saveCocktail()">💾 Salva Cocktail</button>
                <button id="deleteCocktailBtn" class="btn btn-danger btn-small" onclick="deleteCocktail()" style="display:none">🗑️ Elimina</button>
                <button class="btn btn-small" onclick="closeCocktailEditor()">✕ Chiudi</button>
            </div>
        </div>
    </div>

    <div id="totalOrders" class="total-badge">0</div>

    <script>
        let inventoryData = {
            "Vodka": {capacity: 1000, current: 800, pricePerLiter: 25},
            "Gin": {capacity: 1000, current: 600, pricePerLiter: 28},
            "Rum": {capacity: 1000, current: 450, pricePerLiter: 22},
            "Tonica": {capacity: 2000, current: 300, pricePerLiter: 8}
        };
        let cocktailsData = {
            "Moscow Mule": {price: 12, ingredients: {"Vodka": 50, "Tonica": 150}},
            "Gin Tonic": {price: 11, ingredients: {"Gin": 40, "Tonica": 200}},
            "Cuba Libre": {price: 10, ingredients: {"Rum": 50, "Tonica": 150}}
        };
        let dailyOrders = {};
        let editingIngredient = null;
        let editingCocktail = null;
        let isDarkMode = localStorage.getItem('barDark') === 'true';
        const todayDate = new Date().toISOString().split('T')[0];

        // API LocalStorage (SENZA consumo ingredienti)
        async function apiGet(endpoint) {
            try {
                const data = localStorage.getItem('barData');
                const parsed = data ? JSON.parse(data) : {};
                if (endpoint === '/inventory') return parsed.inventory || inventoryData;
                if (endpoint === '/cocktails') return parsed.cocktails || cocktailsData;
                if (endpoint.startsWith('/orders/')) return parsed.orders || {};
                return {};
            } catch(e) { return {}; }
        }

        async function apiPost(endpoint, data) {
            try {
                const stored = JSON.parse(localStorage.getItem('barData') || '{}');
                if (endpoint === '/update_ingredient') {
                    if (data.delete) {
                        delete stored.inventory[data.name];
                    } else {
                        stored.inventory = stored.inventory || {};
                        stored.inventory[data.name] = {
                            capacity: data.capacity,
                            current: data.current, 
                            pricePerLiter: data.pricePerLiter
                        };
                    }
                }
                if (endpoint === '/update_cocktail') {
                    if (data.delete) {
                        delete stored.cocktails[data.name];
                    } else {
                        stored.cocktails = stored.cocktails || {};
                        stored.cocktails[data.name] = {
                            price: data.price,
                            ingredients: data.quantities
                        };
                    }
                }
                if (endpoint === '/quick_order') {
                    stored.orders = stored.orders || {};
                    stored.orders[data.cocktail_name] = (stored.orders[data.cocktail_name] || 0) + 1;
                    // ❌ NESSUN CONSUMO INGREDIENTI
                }
                localStorage.setItem('barData', JSON.stringify(stored));
                return { success: true };
            } catch(e) { return { success: false }; }
        }

        // ✅ FUNZIONI CORRETTE (tasto - funziona)
        window.quickOrder = async function(cocktailName) {
            const result = await apiPost('/quick_order', {
                cocktail_name: cocktailName, 
                date: todayDate
            });
            if (result.success) {
                await initApp();
                const btn = event.target.closest('.cocktail-btn');
                if (btn) {
                    btn.style.transform = 'scale(0.95)';
                    setTimeout(() => btn.style.transform = '', 150);
                }
            } else alert('❌ Errore ordine');
        };

        window.removeOrder = async function(name) {
            const stored = JSON.parse(localStorage.getItem('barData') || '{}');
            stored.orders = stored.orders || {};
            if (stored.orders[name] > 1) {
                stored.orders[name]--;
            } else {
                delete stored.orders[name];
            }
            localStorage.setItem('barData', JSON.stringify(stored));
            await initApp();
        };

        // ✅ Resto delle funzioni (corrette per modifica cocktail)
        window.quickRestock = async function(name) {
            if (!confirm('Riordinare ' + name + ' al 90%?')) return;
            const data = inventoryData[name];
            if (!data) return alert('Ingrediente non trovato');
            const newCurrent = Math.round(data.capacity * 0.9);
            const result = await apiPost('/update_ingredient', {
                name: name,
                capacity: data.capacity,
                current: newCurrent,
                pricePerLiter: data.pricePerLiter
            });
            if (result.success) await initApp();
        };

        window.openIngredientEditor = async function(name) {
            editingIngredient = name;
            const modal = document.getElementById('ingredientEditorModal');
            modal.classList.add('show');
            if (name && inventoryData[name]) {
                const data = inventoryData[name];
                document.getElementById('ingredientEditorTitle').textContent = '✏️ Modifica ' + name;
                document.getElementById('ingredientName').value = name;
                document.getElementById('ingredientCapacity').value = data.capacity;
                document.getElementById('ingredientCurrent').value = data.current;
                document.getElementById('ingredientPrice').value = data.pricePerLiter;
                document.getElementById('deleteIngredientBtn').style.display = 'inline-flex';
            } else {
                document.getElementById('ingredientEditorTitle').textContent = '➕ Nuovo Ingrediente';
                document.getElementById('ingredientName').value = '';
                document.getElementById('ingredientCapacity').value = '1000';
                document.getElementById('ingredientCurrent').value = '1000';
                document.getElementById('ingredientPrice').value = '25';
                document.getElementById('deleteIngredientBtn').style.display = 'none';
            }
        };

        window.saveIngredient = async function() {
            const name = document.getElementById('ingredientName').value.trim();
            const capacity = parseFloat(document.getElementById('ingredientCapacity').value) || 1000;
            const current = parseFloat(document.getElementById('ingredientCurrent').value) || 0;
            const price = parseFloat(document.getElementById('ingredientPrice').value) || 0;
            
            if (!name || capacity <= 0) return alert('❌ Controlla i dati!');
            
            const result = await apiPost('/update_ingredient', {
                name, capacity, current, pricePerLiter: price
            });
            if (result.success) {
                await initApp();
                document.getElementById('ingredientEditorModal').classList.remove('show');
            }
        };

        window.deleteIngredient = async function() {
            if (!editingIngredient || !confirm('🗑️ Elimina definitivamente ' + editingIngredient + '?')) return;
            const result = await apiPost('/update_ingredient', { name: editingIngredient, delete: true });
            if (result.success) {
                await initApp();
                document.getElementById('ingredientEditorModal').classList.remove('show');
            }
        };

        window.closeIngredientEditor = function() {
            document.getElementById('ingredientEditorModal').classList.remove('show');
        };

        window.openCocktailEditor = async function(name) {
            editingCocktail = name;
            const modal = document.getElementById('cocktailEditorModal');
            modal.classList.add('show');
            
            if (name && cocktailsData[name]) {
                const data = cocktailsData[name];
                document.getElementById('cocktailEditorTitle').textContent = '✏️ Modifica ' + name;
                document.getElementById('cocktailName').value = name;
                document.getElementById('cocktailPrice').value = data.price;
                document.getElementById('deleteCocktailBtn').style.display = 'inline-flex';
            } else {
                document.getElementById('cocktailEditorTitle').textContent = '🥃 Nuovo Cocktail';
                document.getElementById('cocktailName').value = '';
                document.getElementById('cocktailPrice').value = '12';
                document.getElementById('deleteCocktailBtn').style.display = 'none';
            }
            renderIngredientsSelector(); // ✅ Ora carica correttamente
        };

        window.saveCocktail = async function() {
            const name = document.getElementById('cocktailName').value.trim();
            const price = parseFloat(document.getElementById('cocktailPrice').value) || 0;
            
            if (!name || price <= 0) return alert('❌ Controlla i dati!');
            
            const quantities = {};
            for (let ingredient in inventoryData) {
                const checkbox = document.getElementById('ing_' + ingredient.replace(/'/g, ''));
                if (checkbox && checkbox.checked) {
                    const qtyInput = checkbox.parentNode.querySelector('.ingredient-qty');
                    const qty = parseFloat(qtyInput ? qtyInput.value : 0) || 0;
                    if (qty > 0) quantities[ingredient] = qty;
                }
            }
            if (Object.keys(quantities).length === 0) return alert('❌ Seleziona almeno un ingrediente!');
            
            const result = await apiPost('/update_cocktail', { name, price, quantities });
            if (result.success) {
                await initApp();
                document.getElementById('cocktailEditorModal').classList.remove('show');
            }
        };

        window.deleteCocktail = async function() {
            if (!editingCocktail || !confirm('🗑️ Elimina definitivamente ' + editingCocktail + '?')) return;
            const result = await apiPost('/update_cocktail', { name: editingCocktail, delete: true });
            if (result.success) {
                await initApp();
                document.getElementById('cocktailEditorModal').classList.remove('show');
            }
        };

        window.closeCocktailEditor = function() {
            document.getElementById('cocktailEditorModal').classList.remove('show');
        };

        window.clearDay = async function() {
            if (confirm('🗑️ Azzerare tutti gli ordini di oggi?')) {
                const stored = JSON.parse(localStorage.getItem('barData') || '{}');
                stored.orders = {};
                localStorage.setItem('barData', JSON.stringify(stored));
                await initApp();
            }
        };

        window.toggleDarkMode = function() {
            isDarkMode = !isDarkMode;
            localStorage.setItem('barDark', isDarkMode);
            document.documentElement.setAttribute('data-theme', isDarkMode ? 'dark' : 'light');
        };

        window.exportAll = function() {
            const data = localStorage.getItem('barData');
            const blob = new Blob([data || '{}'], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'bar-manager-' + todayDate + '.json';
            a.click();
            URL.revokeObjectURL(url);
        };

        window.resetAll = function() {
            if (confirm('⚠️ RESET TOTALE DI TUTTI I DATI?') && confirm('SICURO? Questo cancellerà tutto!')) {
                localStorage.clear();
                location.reload();
            }
        };

        // FUNZIONI RENDER (invariate ma migliorate)
        function calculateCocktailCost(name) {
            const data = cocktailsData[name];
            if (!data || !data.ingredients) return 0;
            let total = 0;
            for (let ingredient in data.ingredients) {
                const inv = inventoryData[ingredient];
                if (inv) total += (data.ingredients[ingredient] * inv.pricePerLiter) / 100;
            }
            return total;
        }

        function renderReorderList() {
            const section = document.getElementById('reorderSection');
            if (!section) return;
            let html = '<div style="background: var(--card); padding: 30px; border-radius: 20px; box-shadow: var(--shadow);"><h3 style="margin-bottom: 20px; font-size: 1.5rem;">🔄 DA RIORDINARE</h3>';
            let hasItems = false;
            for (let name in inventoryData) {
                const data = inventoryData[name];
                const percentage = (data.current / data.capacity) * 100;
                if (percentage < 40) {
                    hasItems = true;
                    const critical = percentage < 20;
                    html += `<h4 style="color:${critical ? 'var(--danger)' : 'var(--warning)'}">${critical ? '🚨 CRITICO' : '⚠️ ATTENZIONE'}</h4>
                    <div class="reorder-item ${critical ? 'critical' : ''}">
                        <div><strong style="font-size: 1.2rem;">${name}</strong><br><small>${Math.round(percentage)}%</small></div>
                        <button class="btn btn-small" onclick="quickRestock('${name.replace(/'/g, "\\'")}')">📦 90%</button>
                    </div>`;
                }
            }
            if (!hasItems) {
                section.innerHTML = '<div style="text-align:center; opacity:0.7; padding:40px;"><h3>✅ Tutto a posto!</h3></div>';
                section.style.display = 'block';
            } else {
                section.style.display = 'block';
                section.innerHTML = html + '</div>';
            }
        }

        // [Tutte le altre funzioni render rimangono identiche alla versione precedente]
        function renderCocktails() {
            const grid = document.getElementById('cocktailsGrid');
            if (!grid) return;
            let html = '';
            const names = Object.keys(cocktailsData).sort();
            for (let name of names) {
                const data = cocktailsData[name];
                const count = dailyOrders[name] || 0;
                const cost = calculateCocktailCost(name);
                const profit = data.price - cost;
                html += `<div class="cocktail-btn${count > 0 ? ' selected' : ''}" onclick="quickOrder('${name.replace(/'/g, "\\'")}')">
                    <div style="font-size:1rem; font-weight:600; margin-bottom:8px;">${name}</div>
                    <div class="cocktail-count">${count}</div>
                    <div class="cocktail-price">€${data.price.toFixed(1)}</div>
                    <div class="cocktail-profit">+€${profit.toFixed(1)}</div>
                </div>`;
            }
            grid.innerHTML = html || '<div style="grid-column:1/-1;text-align:center;opacity:0.5;padding:40px;"><h3>Aggiungi il primo cocktail</h3></div>';
        }

        function renderOrders() {
            const total = Object.values(dailyOrders).reduce((a, b) => a + b, 0);
            document.getElementById('totalOrders').textContent = total;

            const list = document.getElementById('ordersList');
            if (!list) return;
            let html = '';
            const orders = Object.entries(dailyOrders).filter(([_, count]) => count > 0).sort(([_, a], [__, b]) => b - a);
            for (let [name, count] of orders) {
                const price = cocktailsData[name]?.price || 12;
                const cost = calculateCocktailCost(name) * count;
                const profit = (price * count) - cost;
                html += `<div class="order-item">
                    <span style="font-size:1.1rem; font-weight:600;">${name}</span>
                    <span style="font-weight:800;font-size:1.5rem; color:var(--accent);">×${count}</span>
                    <div style="font-size:1rem;">
                        €${(price * count).toFixed(1)} 
                        <span style="color:var(--success);">+€${profit.toFixed(1)}</span>
                    </div>
                    <button class="btn btn-danger btn-small" onclick="removeOrder('${name.replace(/'/g, "\\'")}')">➖</button>
                </div>`;
            }
            list.innerHTML = html || '<div style="opacity:0.5;text-align:center;padding:60px;"><h3>Nessun ordine oggi</h3><p>Inizia a servire! 🍹</p></div>';

            const grid = document.getElementById('summaryGrid');
            if (!grid) return;
            const revenue = Object.entries(dailyOrders).reduce((sum, [name, count]) => sum + (cocktailsData[name]?.price || 12) * count, 0);
            const costs = Object.entries(dailyOrders).reduce((sum, [name, count]) => sum + calculateCocktailCost(name) * count, 0);
            const profit = revenue - costs;
            grid.innerHTML = `
                <div class="summary-card">
                    <div style="font-size:1.1rem;">🍹 Cocktail</div>
                    <div class="summary-value" style="color:var(--accent);">${total}</div>
                </div>
                <div class="summary-card">
                    <div style="font-size:1.1rem;">💰 Fatturato</div>
                    <div class="summary-value" style="color:var(--success);">€${revenue.toFixed(1)}</div>
                </div>
                <div class="summary-card">
                    <div style="font-size:1.1rem;">📦 Costo Ing.</div>
                    <div class="summary-value" style="color:var(--warning);">€${costs.toFixed(1)}</div>
                </div>
                <div class="summary-card">
                    <div style="font-size:1.1rem; font-weight:800;">🎯 PROFITTO</div>
                    <div class="summary-value" style="color:var(--success); font-size:2.5rem;">€${profit.toFixed(1)}</div>
                </div>
            `;
        }

        // Inizializzazione
        async function initApp() {
            document.body.classList.add('loading');
            try {
                const [inventory, cocktails, orders] = await Promise.all([
                    apiGet('/inventory'),
                    apiGet('/cocktails'), 
                    apiGet('/orders/' + todayDate)
                ]);
                inventoryData = inventory;
                cocktailsData = cocktails;
                dailyOrders = orders;
                
                renderReorderList();
                renderCocktails();
                renderOrders();
                renderInventory();
                renderAnalytics();
            } catch (error) {
                console.error('Init error:', error);
            } finally {
                document.body.classList.remove('loading');
            }
        }

        function renderInventory() {
            const grid = document.getElementById('inventoryGrid');
            if (!grid) return;
            let html = '';
            const items = Object.entries(inventoryData).sort(([a], [b]) => a.localeCompare(b));
            for (let [name, data] of items) {
                const percentage = Math.min(100, (data.current / data.capacity) * 100);
                const low = percentage < 20;
                const costPerCl = (data.pricePerLiter / 100).toFixed(2);
                html += `<div class="bottle-card${low ? ' bottle-low' : ''}" onclick="openIngredientEditor('${name.replace(/'/g, "\\'")}')">
                    <div style="font-weight:700;font-size:1.2rem; margin-bottom:8px;">${name}</div>
                    <div style="font-size:1.6rem;font-weight:800; color:var(--accent);">${Math.round(data.current)}cl</div>
                    <div style="font-size:0.9rem; color:var(--text-light);">${data.capacity}cl totali</div>
                    <div style="font-size:0.9rem; color:var(--warning);">€${costPerCl}/cl</div>
                    <div style="height:8px;background:rgba(0,0,0,0.1);border-radius:4px;margin:15px 0;overflow:hidden">
                        <div style="height:100%;width:${percentage}%;background:linear-gradient(90deg, var(--accent), var(--success));transition:width 0.4s;border-radius:4px;"></div>
                    </div>
                    <div style="display:flex;gap:8px;justify-content:center;">
                        <button class="btn btn-success btn-small" onclick="event.stopPropagation();quickRestock('${name.replace(/'/g, "\\'")}')">🔄</button>
                        <button class="btn btn-small" onclick="event.stopPropagation();openIngredientEditor('${name.replace(/'/g, "\\'")}')">✏️</button>
                    </div>
                </div>`;
            }
            grid.innerHTML = html || '<div style="grid-column:1/-1;text-align:center;opacity:0.5;padding:60px;"><h3>Aggiungi il primo ingrediente</h3></div>';
        }

        function renderAnalytics() {
            const topEl = document.getElementById('topCocktails');
            if (topEl) {
                const top = Object.entries(dailyOrders).sort(([_, a], [__, b]) => b - a).slice(0, 5);
                let html = '<h3 style="margin-bottom: 25px; font-size: 1.5rem;">📊 Top 5 Cocktail Oggi</h3>';
                if (top.length === 0) {
                    html += '<div style="text-align:center; opacity:0.7; padding:40px;"><h3>Nessun dato</h3><p>Inizia a prendere ordini!</p></div>';
                } else {
                    for (let [name, count] of top) {
                        const total = Object.values(dailyOrders).reduce((a, b) => a + b, 0);
                        const percentage = total ? ((count / total) * 100).toFixed(1) : 0;
                        html += `<div style="display:flex;justify-content:space-between;padding:20px;background:var(--card);border-radius:15px;margin-bottom:12px;box-shadow:var(--shadow);">
                            <span style="font-weight:600;">🍹 ${name}</span>
                            <span style="font-weight:800; color:var(--accent);">${count} (${percentage}%)</span>
                        </div>`;
                    }
                }
                topEl.innerHTML = html;
            }
        }

        function renderIngredientsSelector() {
            const selector = document.getElementById('ingredientsSelector');
            if (!selector) return;
            const cocktailName = document.getElementById('cocktailName').value;
            const cocktailData = cocktailName && cocktailsData[cocktailName];
            let html = '';
            for (let ingredient of Object.keys(inventoryData).sort()) {
                const isSelected = cocktailData?.ingredients?.[ingredient];
                const qty = cocktailData?.ingredients?.[ingredient] || '';
                const safeId = ingredient.replace(/'/g, '');
                html += `<div class="ingredient-checkbox">
                    <input type="checkbox" id="ing_${safeId}" ${isSelected ? 'checked' : ''}>
                    <label for="ing_${safeId}" style="flex:1; font-weight:500;">${ingredient}</label>
                    <input type="number" class="ingredient-qty" value="${qty}" min="0" step="0.5" placeholder="cl">
                </div>`;
            }
            selector.innerHTML = html;
        }

        function initTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tabName = this.dataset.tab;
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    this.classList.add('active');
                    const tab = document.getElementById(tabName + 'Tab');
                    if (tab) tab.classList.add('active');
                    if (tabName === 'analytics') renderAnalytics();
                    if (tabName === 'reorder') renderReorderList();
                });
            });
        }

        function initOverlays() {
            document.querySelectorAll('.overlay').forEach(overlay => {
                overlay.addEventListener('click', function(e) {
                    if (e.target === overlay) overlay.classList.remove('show');
                });
            });
        }

        // AVVIO
        document.addEventListener('DOMContentLoaded', function() {
            if (isDarkMode) document.documentElement.setAttribute('data-theme', 'dark');
            const dateEl = document.getElementById('currentDate');
            if (dateEl) {
                dateEl.textContent = new Date().toLocaleDateString('it-IT', {
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
                });
            }
            initTabs();
            initOverlays();
            initApp();
        });
    </script>
</body>
</html>
