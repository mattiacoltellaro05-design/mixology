<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍸 Bar Manager</title>
    <style>
        :root {
            --bg-primary: #f8f9fa;
            --bg-secondary: white;
            --bg-input: #f2f2f7;
            --text-primary: #1c1c1e;
            --text-secondary: #8e8e93;
            --mint-100: #a8e6cf;
            --mint-200: #86c8b8;
            --mint-dark: #0f5132;
            --border: #e5e5e7;
            --shadow: rgba(0,0,0,0.08);
        }
        
        [data-theme="dark"] {
            --bg-primary: #1c1c1e;
            --bg-secondary: #2c2c2e;
            --bg-input: #3c3c3e;
            --text-primary: #f5f5f7;
            --text-secondary: #8e8e93;
            --mint-100: #88d4b8;
            --mint-200: #6bc5a9;
            --mint-dark: #0f5132;
            --border: #38383a;
            --shadow: rgba(0,0,0,0.3);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, SF Pro Display, HelveticaNeue, sans-serif;
            background: var(--bg-primary); 
            color: var(--text-primary); 
            padding-bottom: 100px;
            transition: all 0.3s;
        }
        
        .header {
            background: linear-gradient(135deg, var(--mint-100) 0%, color-mix(in srgb, var(--mint-100) 80%, white) 100%);
            padding: 30px 25px;
            border-radius: 0 0 28px 28px;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 800;
            color: var(--mint-dark);
            margin-bottom: 20px;
            text-align: center;
        }
        .header-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .mint-btn {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 16px;
            padding: 14px 20px;
            font-weight: 600;
            font-size: 16px;
            color: var(--mint-dark);
            cursor: pointer;
            transition: all 0.2s;
            min-height: 48px;
        }
        .mint-btn:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(168,230,207,0.4);
        }
        
        .tabs {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 8px;
            margin: 0 20px 25px 20px;
            display: flex;
            gap: 8px;
            box-shadow: 0 4px 20px var(--shadow);
            overflow-x: auto;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 8px;
            border-radius: 12px;
            border: none;
            background: transparent;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 90px;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, var(--mint-100) 0%, var(--mint-200) 100%);
            color: var(--mint-dark);
            box-shadow: 0 4px 15px color-mix(in srgb, var(--mint-100), transparent 50%);
        }
        
        .tab-content { display: none; padding: 0 20px; }
        .tab-content.active { display: block; }
        
        .grid { 
            display: grid; 
            gap: 16px; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            margin-bottom: 25px;
        }
        .card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 20px var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        .card:active { transform: scale(0.98); }
        
        .cocktail-btn {
            text-align: center;
            cursor: pointer;
            padding: 20px 12px;
            border-radius: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            transition: all 0.2s;
            position: relative;
        }
        .cocktail-btn:active {
            background: color-mix(in srgb, var(--bg-secondary) 90%, var(--text-primary));
            transform: scale(0.98);
        }
        .cocktail-btn.selected {
            background: linear-gradient(135deg, var(--mint-100) 0%, var(--mint-200) 100%);
            border-color: var(--mint-200);
            transform: scale(1.02);
        }
        .cocktail-name { font-weight: 600; font-size: 16px; margin-bottom: 8px; }
        .cocktail-count { font-size: 32px; font-weight: 800; color: var(--mint-dark); margin-bottom: 4px; }
        .cocktail-price { font-size: 18px; font-weight: 700; color: var(--mint-dark); }
        
        .order-item {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 10px color-mix(in srgb, var(--shadow) 50%, transparent);
            border: 1px solid var(--border);
        }
        .order-name { font-weight: 600; font-size: 16px; }
        .order-count { font-size: 24px; font-weight: 800; color: var(--mint-dark); margin: 0 12px; }
        .order-total { text-align: right; }
        .order-price { font-size: 14px; color: var(--text-secondary); }
        .order-profit { font-weight: 600; color: #34c759; }
        .order-loss { font-weight: 600; color: #ff3b30; }
        
        .bottle-card {
            text-align: center;
            cursor: pointer;
            position: relative;
        }
        .bottle-card.bottle-low {
            border-left: 4px solid #ff3b30;
        }
        
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .overlay.show { display: flex; }
        .modal {
            background: var(--bg-secondary);
            border-radius: 24px;
            margin: 20px;
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 0 20px 40px color-mix(in srgb, var(--shadow) 80%, transparent);
        }
        .modal-header {
            padding: 24px 24px 0;
            border-bottom: 1px solid var(--border);
        }
        .modal-content {
            padding: 24px;
            max-height: 50vh;
            overflow-y: auto;
        }
        .modal input {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 17px;
            margin-bottom: 16px;
            background: var(--bg-input);
            color: var(--text-primary);
        }
        .modal input:focus {
            border-color: var(--mint-100);
            background: var(--bg-secondary);
            outline: none;
        }
        
        .select-container {
            position: relative;
            margin-bottom: 16px;
        }
        .select-display {
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 17px;
            cursor: pointer;
            min-height: 54px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .select-display:hover {
            border-color: var(--mint-100);
        }
        .select-options {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
            display: none;
            box-shadow: 0 8px 25px var(--shadow);
        }
        .select-options.show {
            display: block;
        }
        .select-option {
            padding: 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            font-size: 17px;
        }
        .select-option:last-child {
            border-bottom: none;
        }
        .select-option:hover {
            background: var(--bg-input);
        }
        
        .ingredient-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 0;
            border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
        }
        .ingredient-row:last-child { border-bottom: none; }
        
        .modal-buttons {
            padding: 24px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            border-top: 1px solid var(--border);
            background: color-mix(in srgb, var(--bg-primary) 20%, var(--bg-secondary));
        }
        
        .summary-grid {
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 25px;
        }
        .summary-card { text-align: center; }
        .summary-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--mint-dark);
            margin-top: 4px;
        }
        
        .stats-grid {
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }
        .stat-item {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 2px 10px var(--shadow);
            border: 1px solid var(--border);
        }
        .stat-label { color: var(--text-secondary); font-size: 14px; margin-bottom: 4px; }
        .stat-value { font-size: 24px; font-weight: 700; color: var(--mint-dark); }
        
        .total-badge {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--mint-100) 0%, var(--mint-200) 100%);
            color: var(--mint-dark);
            padding: 16px;
            border-radius: 24px;
            font-size: 20px;
            font-weight: 800;
            text-align: center;
            box-shadow: 0 8px 30px color-mix(in srgb, var(--mint-100), transparent 40%);
        }
        
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 15px var(--shadow);
            z-index: 100;
        }

        /* icone azione piccole */
        .small-icon-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 16px;
        }
        .small-icon-btn-left {
            position: absolute;
            top: 10px;
            left: 10px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .tabs { margin: 0 15px 25px; }
            .tab-content { padding: 0 15px; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">🌙</button>
    
    <div class="header">
        <h1>🍸 Bar Manager</h1>
        <div class="header-buttons">
            <button class="mint-btn" id="addIngredientBtn">➕ Ingrediente</button>
            <button class="mint-btn" id="addCocktailBtn">🍹 Cocktail</button>
            <button class="mint-btn" id="endDayBtn">🏁 Termina Giornata</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="orders">Ordini</button>
        <button class="tab-btn" data-tab="cocktails">Cocktails</button>
        <button class="tab-btn" data-tab="inventory">Inventario</button>
        <button class="tab-btn" data-tab="stats">📊 Stats</button>
    </div>

    <div id="ordersTab" class="tab-content active">
        <div class="summary-grid grid" id="summaryGrid"></div>
        <div id="ordersList"></div>
    </div>

    <div id="cocktailsTab" class="tab-content">
        <div class="grid" id="cocktailsGrid"></div>
    </div>

    <div id="inventoryTab" class="tab-content">
        <div class="grid" id="inventoryGrid"></div>
    </div>

    <div id="statsTab" class="tab-content">
        <div class="stats-grid grid" id="statsGrid"></div>
    </div>

    <!-- INGREDIENT MODAL -->
    <div id="ingredientModal" class="overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="ingredientTitle">➕ Nuovo Ingrediente</h3>
            </div>
            <div class="modal-content">
                <input id="ingredientName" placeholder="Nome ingrediente">
                <input id="ingredientPrice" type="number" step="0.01" placeholder="€/litro">
            </div>
            <div class="modal-buttons">
                <button class="mint-btn" id="saveIngredientBtn">Salva</button>
                <button id="deleteIngredientBtn" class="mint-btn" style="display:none">Elimina</button>
                <button class="mint-btn" id="cancelIngredientBtn">Annulla</button>
            </div>
        </div>
    </div>

    <!-- COCKTAIL MODAL -->
    <div id="cocktailModal" class="overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="cocktailTitle">🍹 Nuovo Cocktail</h3>
            </div>
            <div class="modal-content">
                <input id="cocktailName" placeholder="Nome cocktail">
                <input id="cocktailPrice" type="number" step="0.1" placeholder="Prezzo €">
                <div class="select-container">
                    <div class="select-display" id="ingredientSelectDisplay">
                        <span id="selectedIngredient">Seleziona ingrediente...</span>
                        <span>▼</span>
                    </div>
                    <div id="ingredientOptions" class="select-options"></div>
                </div>
                <button class="mint-btn" id="addIngredientToCocktailBtn" style="width:100%;margin-top:8px;">➕ Aggiungi ingrediente</button>
                <div id="cocktailIngredientsList"></div>
            </div>
            <div class="modal-buttons">
                <button class="mint-btn" id="saveCocktailBtn">Salva</button>
                <button class="mint-btn" id="deleteCocktailBtn" style="display:none">Elimina</button>
                <button class="mint-btn" id="cancelCocktailBtn">Annulla</button>
            </div>
        </div>
    </div>

    <div id="totalOrders" class="total-badge">0</div>

    <script>
        class BarManager {
            constructor() {
                this.inventoryData = {}
                this.cocktailsData = {}
                this.dailyOrders = {};
                this.editingIngredient = null;
                this.editingCocktail = null;
                this.currentCocktailIngredients = {};
                this.ingredientSelectOpen = false;
                
                this.init();
            }

            init() {
                this.initTheme();
                this.loadData();
                this.bindEvents();
                this.renderAll();
            }

            initTheme() {
                const saved = localStorage.getItem('theme');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (saved === 'dark' || (!saved && prefersDark)) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    document.getElementById('themeToggle').textContent = '☀️';
                }
            }

            toggleTheme() {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
                document.getElementById('themeToggle').textContent = isDark ? '🌙' : '☀️';
                localStorage.setItem('theme', isDark ? 'light' : 'dark');
            }

            loadData() {
                try {
                    const data = JSON.parse(localStorage.getItem('barData') || '{}');
                    this.inventoryData = data.inventory || this.inventoryData;
                    this.cocktailsData = data.cocktails || this.cocktailsData;
                    this.dailyOrders = data.orders || {};
                } catch(e) {
                    console.error('Errore caricamento dati:', e);
                }
            }

            saveData() {
                try {
                    localStorage.setItem('barData', JSON.stringify({
                        inventory: this.inventoryData,
                        cocktails: this.cocktailsData,
                        orders: this.dailyOrders,
                        stats: JSON.parse(localStorage.getItem('barStats') || '[]')
                    }));
                } catch(e) {
                    console.error('Errore salvataggio dati:', e);
                }
            }

            bindEvents() {
                // Theme toggle
                document.getElementById('themeToggle').onclick = () => this.toggleTheme();

                // Header buttons
                document.getElementById('addIngredientBtn').onclick = () => this.openIngredientModal();
                document.getElementById('addCocktailBtn').onclick = () => this.openCocktailModal();
                document.getElementById('endDayBtn').onclick = () => this.endDay();

                // Ingredient modal buttons
                document.getElementById('saveIngredientBtn').onclick = () => this.saveIngredient();
                document.getElementById('deleteIngredientBtn').onclick = () => this.deleteIngredient();
                document.getElementById('cancelIngredientBtn').onclick = () => this.closeIngredientModal();

                // Cocktail modal buttons
                document.getElementById('saveCocktailBtn').onclick = () => this.saveCocktail();
                document.getElementById('deleteCocktailBtn').onclick = () => this.deleteCocktail();
                document.getElementById('cancelCocktailBtn').onclick = () => this.closeCocktailModal();
                document.getElementById('addIngredientToCocktailBtn').onclick = () => this.addIngredientToCocktail();

                // Ingredient select
                document.getElementById('ingredientSelectDisplay').onclick = () => this.toggleIngredientSelect();

                // Tabs
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                        e.target.classList.add('active');
                        document.getElementById(e.target.dataset.tab + 'Tab').classList.add('active');
                    });
                });

                // Overlay close
                document.querySelectorAll('.overlay').forEach(modal => {
                    modal.addEventListener('click', e => {
                        if (e.target === modal) {
                            modal.classList.remove('show');
                            document.getElementById('ingredientOptions').classList.remove('show');
                        }
                    });
                });

                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.select-container')) {
                        document.getElementById('ingredientOptions').classList.remove('show');
                        this.ingredientSelectOpen = false;
                    }
                });
            }

            calculateCost(cocktail) {
                let total = 0;
                for (let [ing, qty] of Object.entries(cocktail.ingredients || {})) {
                    const inv = this.inventoryData[ing];
                    if (inv && inv.pricePerLiter) {
                        total += (qty * inv.pricePerLiter) / 100;
                    }
                }
                return Math.max(0, total);
            }

            toggleIngredientSelect() {
                const options = document.getElementById('ingredientOptions');
                this.ingredientSelectOpen = !this.ingredientSelectOpen;
                options.classList.toggle('show');
                if (this.ingredientSelectOpen) this.renderIngredientOptions();
            }

            renderIngredientOptions() {
                const container = document.getElementById('ingredientOptions');
                let html = '';
                for (let name of Object.keys(this.inventoryData).sort()) {
                    html += `<div class="select-option" onclick="barManager.selectIngredient('${name.replace(/'/g, "\\'")}')">${name}</div>`;
                }
                container.innerHTML = html;
            }

            selectIngredient(name) {
                document.getElementById('selectedIngredient').textContent = name;
                document.getElementById('ingredientOptions').classList.remove('show');
                this.ingredientSelectOpen = false;
            }

            addIngredientToCocktail() {
                const selectedText = document.getElementById('selectedIngredient').textContent;
                if (selectedText === 'Seleziona ingrediente...') return;
                
                const qty = prompt('Quantità (cl):', '50');
                if (!qty || isNaN(qty) || qty <= 0) return;
                
                this.currentCocktailIngredients[selectedText] = parseFloat(qty);
                this.renderCocktailIngredientsList();
            }

            renderCocktailIngredientsList() {
                const container = document.getElementById('cocktailIngredientsList');
                let html = '';
                for (let [name, qty] of Object.entries(this.currentCocktailIngredients)) {
                    html += `
                        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);">
                            <span>${name}: ${qty}cl</span>
                            <button class="mint-btn" style="padding:6px 12px;font-size:14px;" onclick="barManager.removeCocktailIngredient('${name.replace(/'/g, "\\'")}')">✕</button>
                        </div>`;
                }
                container.innerHTML = html || '<div style="opacity:0.5;padding:20px 0;">Nessun ingrediente</div>';
            }

            removeCocktailIngredient(name) {
                delete this.currentCocktailIngredients[name];
                this.renderCocktailIngredientsList();
            }

            async quickOrder(name) {
                this.dailyOrders[name] = (this.dailyOrders[name] || 0) + 1;
                this.saveData();
                this.renderAll();
            }

            async removeOrder(name) {
                if (this.dailyOrders[name] > 1) {
                    this.dailyOrders[name]--;
                } else {
                    delete this.dailyOrders[name];
                }
                this.saveData();
                this.renderAll();
            }

            openIngredientModal(name = null) {
                this.editingIngredient = name;
                const modal = document.getElementById('ingredientModal');
                const title = document.getElementById('ingredientTitle');
                
                if (name && this.inventoryData[name]) {
                    title.textContent = '✏️ Modifica ' + name;
                    document.getElementById('ingredientName').value = name;
                    document.getElementById('ingredientPrice').value = this.inventoryData[name].pricePerLiter;
                    document.getElementById('deleteIngredientBtn').style.display = 'inline-block';
                } else {
                    title.textContent = '➕ Nuovo Ingrediente';
                    document.getElementById('ingredientName').value = '';
                    document.getElementById('ingredientPrice').value = '25';
                    document.getElementById('deleteIngredientBtn').style.display = 'none';
                }
                modal.classList.add('show');
            }

            saveIngredient() {
                const name = document.getElementById('ingredientName').value.trim();
                if (!name) { alert('Nome richiesto'); return; }
                const price = parseFloat(document.getElementById('ingredientPrice').value) || 0;

                // rename gestione
                if (this.editingIngredient && this.editingIngredient !== name) {
                    // controlla conflitto
                    if (this.inventoryData[name] && name !== this.editingIngredient) {
                        alert('Esiste già un ingrediente con questo nome');
                        return;
                    }
                    // rinomina nelle ricette
                    for (const [cocktailName, cData] of Object.entries(this.cocktailsData)) {
                        if (cData.ingredients && cData.ingredients[this.editingIngredient]) {
                            cData.ingredients[name] = cData.ingredients[this.editingIngredient];
                            delete cData.ingredients[this.editingIngredient];
                        }
                    }
                    // rinomina in inventario
                    delete this.inventoryData[this.editingIngredient];
                }

                this.inventoryData[name] = {
                    pricePerLiter: price
                };
                this.saveData();
                document.getElementById('ingredientModal').classList.remove('show');
                this.editingIngredient = null;
                this.renderAll();
            }

            deleteIngredient() {
                if (!this.editingIngredient) return;
                // controlla uso nei cocktail
                const usedIn = Object.entries(this.cocktailsData)
                    .filter(([_, c]) => c.ingredients && c.ingredients[this.editingIngredient])
                    .map(([name]) => name);
                if (usedIn.length > 0) {
                    alert('Ingrediente usato nei cocktail: ' + usedIn.join(', ') + '. Rimuovilo prima dalle ricette.');
                    return;
                }
                if (!confirm('Eliminare ingrediente?')) return;

                delete this.inventoryData[this.editingIngredient];
                this.saveData();
                document.getElementById('ingredientModal').classList.remove('show');
                this.editingIngredient = null;
                this.renderAll();
            }

            closeIngredientModal() {
                document.getElementById('ingredientModal').classList.remove('show');
                this.editingIngredient = null;
            }

            openCocktailModal(name = null) {
                const modal = document.getElementById('cocktailModal');
                const title = document.getElementById('cocktailTitle');
                this.currentCocktailIngredients = {};
                this.editingCocktail = name;

                if (name && this.cocktailsData[name]) {
                    // edit esistente
                    const data = this.cocktailsData[name];
                    title.textContent = '✏️ Modifica ' + name;
                    document.getElementById('cocktailName').value = name;
                    document.getElementById('cocktailPrice').value = data.price;
                    this.currentCocktailIngredients = {...data.ingredients};
                    document.getElementById('deleteCocktailBtn').style.display = 'inline-block';
                } else {
                    // nuovo
                    title.textContent = '🍹 Nuovo Cocktail';
                    document.getElementById('cocktailName').value = '';
                    document.getElementById('cocktailPrice').value = '12';
                    document.getElementById('deleteCocktailBtn').style.display = 'none';
                }

                document.getElementById('selectedIngredient').textContent = 'Seleziona ingrediente...';
                this.renderCocktailIngredientsList();
                modal.classList.add('show');
            }

            saveCocktail() {
                const name = document.getElementById('cocktailName').value.trim();
                if (!name) { alert('Nome richiesto'); return; }
                
                const price = parseFloat(document.getElementById('cocktailPrice').value);
                if (!price || price <= 0) { alert('Prezzo richiesto'); return; }
                
                if (Object.keys(this.currentCocktailIngredients).length === 0) {
                    alert('Aggiungi ingredienti');
                    return;
                }

                // gestione rename cocktail
                if (this.editingCocktail && this.editingCocktail !== name) {
                    if (this.cocktailsData[name]) {
                        alert('Esiste già un cocktail con questo nome');
                        return;
                    }
                    // sposta ordini sul nuovo nome
                    if (this.dailyOrders[this.editingCocktail]) {
                        this.dailyOrders[name] = (this.dailyOrders[name] || 0) + this.dailyOrders[this.editingCocktail];
                        delete this.dailyOrders[this.editingCocktail];
                    }
                    delete this.cocktailsData[this.editingCocktail];
                } else if (!this.editingCocktail && this.cocktailsData[name]) {
                    alert('Cocktail già esistente');
                    return;
                }

                this.cocktailsData[name] = { price, ingredients: {...this.currentCocktailIngredients} };
                this.saveData();
                document.getElementById('cocktailModal').classList.remove('show');
                this.editingCocktail = null;
                this.renderAll();
            }

            deleteCocktail() {
                if (!this.editingCocktail) return;
                if (!confirm('Eliminare cocktail?')) return;

                delete this.cocktailsData[this.editingCocktail];
                // rimuovi anche eventuali ordini per quel cocktail
                delete this.dailyOrders[this.editingCocktail];

                this.saveData();
                document.getElementById('cocktailModal').classList.remove('show');
                this.editingCocktail = null;
                this.renderAll();
            }

            closeCocktailModal() {
                document.getElementById('cocktailModal').classList.remove('show');
                this.editingCocktail = null;
            }

            endDay() {
                if (confirm('Terminare giornata? Gli ordini verranno archiviati nelle statistiche.')) {
                    const dayStats = this.calculateDayStats();
                    const stats = JSON.parse(localStorage.getItem('barStats') || '[]');
                    stats.unshift(dayStats);
                    localStorage.setItem('barStats', JSON.stringify(stats.slice(0, 30)));
                    this.dailyOrders = {};
                    this.saveData();
                    this.renderAll();
                }
            }

            renderCocktails() {
                const grid = document.getElementById('cocktailsGrid');
                let html = '';
                for (let [name, data] of Object.entries(this.cocktailsData).sort(([a],[b])=>a.localeCompare(b))) {
                    const count = this.dailyOrders[name] || 0;
                    html += `
                        <div class="cocktail-btn ${count > 0 ? 'selected' : ''}">
                            <button class="small-icon-btn-left" onclick="event.stopPropagation();barManager.openCocktailModal('${name.replace(/'/g, "\\'")}')">✏️</button>
                            <div onclick="barManager.quickOrder('${name.replace(/'/g, "\\'")}')">
                                <div class="cocktail-name">${name}</div>
                                <div class="cocktail-count">${count}</div>
                                <div class="cocktail-price">€${data.price.toFixed(1)}</div>
                            </div>
                        </div>`;
                }
                grid.innerHTML = html || '<div class="card" style="text-align:center;opacity:0.5;">Nessun cocktail. Aggiungine uno!</div>';
            }

            renderOrders() {
                const total = Object.values(this.dailyOrders).reduce((a,b)=>a+b,0);
                document.getElementById('totalOrders').textContent = total;

                const list = document.getElementById('ordersList');
                let html = '';
                for (let [name, count] of Object.entries(this.dailyOrders).filter(([_,c])=>c>0).sort(([,a],[,b])=>b-a)) {
                    const data = this.cocktailsData[name];
                    if (!data) continue;
                    
                    const cost = this.calculateCost(data) * count;
                    const profit = (data.price * count) - cost;
                    const profitClass = profit >= 0 ? 'order-profit' : 'order-loss';
                    const profitSign = profit >= 0 ? '+€' : '-€';
                    
                    html += `
                        <div class="order-item">
                            <div class="order-name">${name}</div>
                            <div class="order-count">×${count}</div>
                            <div class="order-total">
                                <div class="order-price">€${(data.price*count).toFixed(1)}</div>
                                <div class="${profitClass}">${profitSign}${Math.abs(profit).toFixed(1)}</div>
                            </div>
                            <button class="mint-btn" style="padding:8px 12px;font-size:14px;" onclick="barManager.removeOrder('${name.replace(/'/g, "\\'")}')">➖</button>
                        </div>`;
                }
                list.innerHTML = html || '<div style="text-align:center;opacity:0.5;padding:40px;">Nessun ordine</div>';

                const revenue = Object.entries(this.dailyOrders).reduce((sum,[name,count])=>{
                    const cocktail = this.cocktailsData[name];
                    return sum + (cocktail?.price || 0) * count;
                }, 0);
                
                const costs = Object.entries(this.dailyOrders).reduce((sum,[name,count])=>{
                    const cocktail = this.cocktailsData[name];
                    return sum + (cocktail ? this.calculateCost(cocktail) * count : 0);
                }, 0);
                
                const totalProfit = revenue - costs;
                const profitColor = totalProfit >= 0 ? '#34c759' : '#ff3b30';
                const profitSign = totalProfit >= 0 ? '+€' : '-€';
                
                document.getElementById('summaryGrid').innerHTML = `
                    <div class="summary-card card"><div>Ordini</div><div class="summary-value">${total}</div></div>
                    <div class="summary-card card"><div>Fatturato</div><div class="summary-value">€${revenue.toFixed(1)}</div></div>
                    <div class="summary-card card"><div>Costo</div><div class="summary-value" style="color:#ff3b30">€${costs.toFixed(1)}</div></div>
                    <div class="summary-card card"><div>Profitto</div><div class="summary-value" style="color:${profitColor}">${profitSign}${Math.abs(totalProfit).toFixed(1)}</div></div>
                `;
            }

            renderInventory() {
                const grid = document.getElementById('inventoryGrid');
                let html = '';
                for (let [name, data] of Object.entries(this.inventoryData).sort(([a],[b])=>a.localeCompare(b))) {
                    html += `
                        <div class="bottle-card card" onclick="barManager.openIngredientModal('${name.replace(/'/g, "\\'")}')">
                            <div style="font-weight:700;font-size:17px;margin-bottom:4px;">${name}</div>
                            <div style="font-size:24px;font-weight:800;color:var(--mint-dark);">€${data.pricePerLiter}/L</div>
                        </div>`;
                }
                grid.innerHTML = html || '<div class="card" style="text-align:center;opacity:0.5;">Nessun ingrediente. Aggiungine uno!</div>';
            }

            renderStats() {
                const stats = JSON.parse(localStorage.getItem('barStats') || '[]');
                const grid = document.getElementById('statsGrid');
                
                if (stats.length === 0) {
                    grid.innerHTML = '<div class="card" style="text-align:center;opacity:0.5;padding:40px;grid-column:1/-1;">Nessuna statistica disponibile</div>';
                    return;
                }

                const latest = stats[0];
                const avgOrders = Math.round(stats.reduce((sum,s)=>sum+s.totalOrders,0)/stats.length);
                const avgProfit = Math.round(stats.reduce((sum,s)=>sum+Math.abs(s.profit),0)/stats.length * 100) / 100;
                const totalDays = stats.length;
                const bestDay = stats.reduce((best,s)=>Math.abs(s.profit)>Math.abs(best.profit)? s : best, stats[0]);

                grid.innerHTML = `
                    <div class="stat-item card">
                        <div class="stat-label">Oggi</div>
                        <div class="stat-value">${latest.totalOrders}</div>
                    </div>
                    <div class="stat-item card">
                        <div class="stat-label">Media ordini</div>
                        <div class="stat-value">${avgOrders}</div>
                    </div>
                    <div class="stat-item card">
                        <div class="stat-label">Media profitto</div>
                        <div class="stat-value">€${avgProfit}</div>
                    </div>
                    <div class="stat-item card">
                        <div class="stat-label">Giorni totali</div>
                        <div class="stat-value">${totalDays}</div>
                    </div>
                    <div class="stat-item card" style="grid-column:span 2;">
                        <div class="stat-label">Miglior cocktail oggi</div>
                        <div class="stat-value">${latest.topCocktail || 'N/D'} (${latest.topCocktailCount})</div>
                    </div>
                    <div class="stat-item card" style="grid-column:span 2;">
                        <div class="stat-label">Record profitto</div>
                        <div class="stat-value">€${bestDay.profit.toFixed(1)} (${bestDay.date})</div>
                    </div>
                `;
            }

            calculateDayStats() {
                const stats = {
                    date: new Date().toLocaleDateString('it-IT'),
                    totalOrders: Object.values(this.dailyOrders).reduce((a,b)=>a+b,0),
                    revenue: 0,
                    costs: 0,
                    profit: 0,
                    topCocktail: null,
                    topCocktailCount: 0
                };
                
                for (let [name, count] of Object.entries(this.dailyOrders)) {
                    const cocktail = this.cocktailsData[name];
                    if (cocktail) {
                        const cost = this.calculateCost(cocktail) * count;
                        stats.revenue += cocktail.price * count;
                        stats.costs += cost;
                        stats.profit += (cocktail.price * count) - cost;
                        
                        if (count > stats.topCocktailCount) {
                            stats.topCocktail = name;
                            stats.topCocktailCount = count;
                        }
                    }
                }
                return stats;
            }

            renderAll() {
                this.renderCocktails();
                this.renderOrders();
                this.renderInventory();
                this.renderStats();
            }
        }

        // Inizializzazione globale
        const barManager = new BarManager();
    </script>
</body>
</html>
