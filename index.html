<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bar Inventory Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --mint-50: #f8faf7; --mint-100: #eaf3ea; --mint-200: #d8e8d8; 
      --mint-300: #c5ddc5; --mint-400: #b3d2b3; --mint-500: #a8c4a5;
      --mint-600: #90b39a; --mint-700: #7d9a7a; --mint-800: #6a8570;
      --mint-900: #5e7a5a; --text-primary: #1a3c1a; --accent: #f4a261;
      --danger: #ef476f; --glass: rgba(255,255,255,0.1); --shadow: 0 8px 32px rgba(94,122,90,0.3);
    }
    [data-theme="dark"] {
      --mint-50: #1a231a; --mint-100: #2d3a2d; --mint-200: #3d4f3d;
      --mint-300: #4d644d; --mint-400: #5d795d; --mint-500: #6e8e6e;
      --text-primary: #e8f5e8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, var(--mint-100), var(--mint-300));
      min-height: 100vh; color: var(--text-primary); transition: all 0.4s;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .header {
      text-align: center; padding: 30px; backdrop-filter: blur(20px); 
      background: var(--glass); border-radius: 24px; margin-bottom: 30px;
      box-shadow: var(--shadow);
    }
    .header h1 { 
      font-size: clamp(1.8rem, 5vw, 2.5rem); 
      background: linear-gradient(45deg, var(--mint-700), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    
    .tabs { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; }
    .tab-btn { 
      padding: 12px 24px; border: none; border-radius: 20px; cursor: pointer; 
      background: var(--glass); backdrop-filter: blur(10px); color: var(--text-primary);
      transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .tab-btn.active { background: var(--mint-500); color: white; transform: translateY(-2px); }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
    @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }
    
    /* MINT-STYLE COCKTAIL BUTTONS */
    .cocktails-buttons {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
      max-height: 420px; overflow-y: auto; padding: 10px;
    }
    .cocktail-btn {
      background: var(--mint-50); border: 2px solid transparent; border-radius: 16px; 
      padding: 12px 8px; text-align: center; cursor: pointer; transition: all 0.3s ease;
      min-height: 65px; display: flex; flex-direction: column; align-items: center; 
      justify-content: center; font-size: 0.85rem; font-weight: 600;
    }
    .cocktail-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
    .cocktail-btn.selected { border-color: var(--accent); background: linear-gradient(45deg, var(--accent), #e76f51); color: white; }
    .cocktail-price { font-size: 0.7rem; opacity: 0.8; margin-top: 2px; }
    .cocktail-count { font-size: 1.1rem; font-weight: bold; margin-top: 2px; }
    
    /* INGREDIENTI BOTTLIGLIE */
    .inventory-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
      gap: 15px; max-height: 400px; overflow-y: auto; padding: 10px;
    }
    .bottle-card {
      background: var(--glass); backdrop-filter: blur(15px); border-radius: 16px;
      padding: 15px; text-align: center; box-shadow: var(--shadow);
      border-left: 4px solid var(--mint-500);
    }
    .bottle-low { border-left-color: var(--danger) !important; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .bottle-name { font-weight: 600; margin-bottom: 8px; }
    .bottle-qty { font-size: 1.3rem; font-weight: bold; color: var(--accent); }
    .bottle-cost { font-size: 0.8rem; opacity: 0.8; }
    
    .order-item, .ingredient-usage {
      background: var(--mint-50); border-radius: 16px; padding: 15px; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center;
    }
    
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-top: 30px; }
    .summary-card { background: var(--glass); border-radius: 20px; padding: 20px; text-align: center; }
    .summary-value { font-size: 2rem; font-weight: bold; color: var(--accent); }
    
    .btn { padding: 12px 24px; border: none; border-radius: 16px; cursor: pointer; font-weight: 600; transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .btn-primary { background: linear-gradient(45deg, var(--mint-500), var(--mint-600)); color: white; }
    .btn-success { background: linear-gradient(45deg, #2a9d8f, #48cae4); color: white; }
    .btn-danger { background: linear-gradient(45deg, var(--danger), #ff6b7a); color: white; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
    
    .settings { position: fixed; top: 20px; right: 20px; z-index: 1000; }
    .settings-btn { width: 55px; height: 55px; border-radius: 50%; background: var(--mint-500); color: white; border: none; font-size: 1.3rem; cursor: pointer; box-shadow: var(--shadow); }
    
    .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; z-index: 999; backdrop-filter: blur(10px); place-items: center; }
    .overlay.show { display: grid; }
    .modal { background: var(--mint-50); border-radius: 24px; padding: 30px; max-width: 600px; width: 90%; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow); }
    
    .ingredient-modal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
    .ingredient-input-group { display: flex; flex-direction: column; gap: 8px; }
    .ingredient-input { padding: 10px; border: 2px solid var(--mint-200); border-radius: 12px; font-size: 1rem; }

    /* NUOVO EDITOR COCKTAIL */
    .cocktail-editor { display: grid; gap: 15px; }
    .cocktail-editor input, .cocktail-editor select { 
      padding: 12px; border: 2px solid var(--mint-200); border-radius: 12px; font-size: 1rem; 
    }
    .ingredients-list { min-height: 100px; border: 2px dashed var(--mint-300); border-radius: 12px; padding: 15px; }
    .ingredient-tag { 
      background: var(--accent); color: white; padding: 6px 12px; border-radius: 20px; 
      margin: 4px; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem;
    }
    .ingredient-tag button { background: rgba(255,255,255,0.3); border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; }
    
    @media (max-width: 600px) { 
      .cocktails-buttons, .inventory-grid { grid-template-columns: repeat(3, 1fr) !important; gap: 8px; } 
    }
  </style>
</head>
<body>
  <div class="settings">
    <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
  </div>
  
  <div class="container">
    <div class="header">
      <h1>🥃 Bar Inventory Pro</h1>
      <div class="date-display" id="currentDate"></div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('cocktails')">🍹 Ordini</button>
      <button class="tab-btn" onclick="switchTab('inventory')">🏪 Inventario</button>
    </div>

    <!-- ORDINI TAB -->
    <div id="cocktailsTab" class="tab-content active">
      <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button class="btn btn-success" onclick="openCocktailEditor()">➕ Nuovo Cocktail</button>
      </div>
      <div class="main-grid">
        <div class="cocktails-grid">
          <h2 style="font-size: 1.3rem; margin-bottom: 15px; text-align: center;">Seleziona Cocktail</h2>
          <div class="cocktails-buttons" id="cocktailsGrid"></div>
        </div>

        <div class="orders-section">
          <h2>Ordini Oggi <span class="order-count" id="totalOrders">0</span></h2>
          <div class="orders-list" id="ordersList"></div>
          <div class="summary-grid" id="summaryGrid"></div>
          <div style="text-align: center; margin-top: 20px;">
            <button class="btn btn-danger" onclick="clearDay()">🗑️ Fine Giornata</button>
          </div>
        </div>
      </div>
    </div>

    <!-- INVENTARIO TAB -->
    <div id="inventoryTab" class="tab-content">
      <div class="inventory-grid" id="inventoryGrid"></div>
    </div>
  </div>

  <!-- MODAL INGREDIENTI PER COCKTAIL -->
  <div class="overlay" id="ingredientModal">
    <div class="modal">
      <h3 id="modalTitle">Ingredienti per <span id="currentCocktail"></span></h3>
      <div class="ingredient-modal-grid" id="ingredientInputs"></div>
      <div style="text-align: center; margin-top: 25px; gap: 10px; display: flex; flex-wrap: wrap; justify-content: center;">
        <button class="btn btn-primary" onclick="confirmOrder()">✅ Conferma Ordine</button>
        <button class="btn" onclick="closeIngredientModal()">❌ Annulla</button>
      </div>
    </div>
  </div>

  <!-- NUOVO MODAL EDITOR COCKTAIL -->
  <div class="overlay" id="cocktailEditorModal">
    <div class="modal">
      <h3 id="cocktailEditorTitle">➕ Nuovo Cocktail</h3>
      <div class="cocktail-editor">
        <div>
          <label>Nome Cocktail</label>
          <input type="text" id="cocktailName" placeholder="Es: Bellini Spritz">
        </div>
        <div>
          <label>Ingredienti (separati da virgola)</label>
          <input type="text" id="cocktailIngredients" placeholder="Prosecco, Peach Puree, Soda">
        </div>
        <div class="ingredients-list" id="selectedIngredientsList"></div>
        <div style="display: flex; gap: 10px;">
          <button class="btn btn-primary" onclick="addCocktail()">✅ Salva Cocktail</button>
          <button class="btn btn-danger" onclick="deleteCocktail()" id="deleteCocktailBtn" style="display: none;">🗑️ Elimina</button>
          <button class="btn" onclick="closeCocktailEditor()">❌ Annulla</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SETTINGS MODAL -->
  <div class="overlay" id="settingsOverlay">
    <div class="modal">
      <h3>⚙️ Gestione Completa</h3>
      <div class="toggle">
        <label>Modalità Scura</label>
        <label class="switch">
          <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle">
        <label>Vibrazioni</label>
        <label class="switch">
          <input type="checkbox" id="vibrationToggle" onchange="toggleVibration()">
          <span class="slider"></span>
        </label>
      </div>
      <button class="btn btn-primary" onclick="manageIngredients()">🥤 Gestisci Ingredienti</button>
      <button class="btn btn-primary" onclick="openCocktailEditor()">🍹 Gestisci Cocktail</button>
      <button class="btn btn-primary" onclick="exportAll()">📤 Backup Completo</button>
      <button class="btn btn-danger" onclick="resetAll()">🔄 Reset Tutto</button>
      <button class="btn" onclick="toggleSettings()">✕ Chiudi</button>
    </div>
  </div>

  <script>
    // CARICAMENTO COCKTAIL PERSONALIZZATI
    let cocktailsDB = {
      'Negroni': ['Gin', 'Campari', 'Vermouth'],
      'Aperol Spritz': ['Aperol', 'Prosecco', 'Soda'],
      'Moscow Mule': ['Vodka', 'Zenzero', 'Lime'],
      'Margarita': ['Tequila', 'Triple Sec', 'Lime'],
      'Old Fashioned': ['Whisky', 'Zucchero', 'Angostura'],
      'Espresso Martini': ['Vodka', 'Kahlua', 'Caffè'],
      'Daiquiri': ['Rum', 'Lime', 'Zucchero'],
      'Mojito': ['Rum', 'Lime', 'Menta', 'Zucchero', 'Soda']
    };

    // Carica cocktail personalizzati
    const savedCocktails = JSON.parse(localStorage.getItem('barCustomCocktails') || '{}');
    Object.assign(cocktailsDB, savedCocktails);

    let inventory = JSON.parse(localStorage.getItem('barInventory') || '{}');
    let dailyOrders = JSON.parse(localStorage.getItem('barOrdersToday') || '{}');
    let customPrices = JSON.parse(localStorage.getItem('barCustomPrices') || '{}');
    let isDarkMode = localStorage.getItem('barDark') === 'true';
    let isVibrationEnabled = localStorage.getItem('barVibration') !== 'false';
    let currentOrderCocktail = '';
    let editingCocktail = null;

    // INGREDIENTI DEFAULT se vuoti
    const defaultInventory = {
      'Gin': { capacity: 1000, current: 800, pricePerLiter: 25 },
      'Campari': { capacity: 1000, current: 700, pricePerLiter: 22 },
      'Vermouth': { capacity: 1000, current: 600, pricePerLiter: 18 },
      'Aperol': { capacity: 1000, current: 850, pricePerLiter: 20 },
      'Prosecco': { capacity: 750, current: 500, pricePerLiter: 8 },
      'Soda': { capacity: 1000, current: 900, pricePerLiter: 1.5 },
      'Vodka': { capacity: 1000, current: 750, pricePerLiter: 20 },
      'Zenzero': { capacity: 1000, current: 600, pricePerLiter: 3 },
      'Lime': { capacity: 500, current: 300, pricePerLiter: 5 },
      'Tequila': { capacity: 1000, current: 800, pricePerLiter: 28 },
      'Triple Sec': { capacity: 700, current: 500, pricePerLiter: 22 },
      'Whisky': { capacity: 1000, current: 650, pricePerLiter: 35 },
      'Zucchero': { capacity: 500, current: 400, pricePerLiter: 2 },
      'Angostura': { capacity: 200, current: 150, pricePerLiter: 45 },
      'Kahlua': { capacity: 700, current: 450, pricePerLiter: 25 },
      'Caffè': { capacity: 500, current: 300, pricePerLiter: 4 },
      'Rum': { capacity: 1000, current: 700, pricePerLiter: 22 },
      'Menta': { capacity: 200, current: 120, pricePerLiter: 8 }
    };

    Object.keys(defaultInventory).forEach(key => {
      if (!inventory[key]) inventory[key] = defaultInventory[key];
    });

    document.addEventListener('DOMContentLoaded', function() {
      if (isDarkMode) document.documentElement.setAttribute('data-theme', 'dark');
      updateToggles();
      document.getElementById('currentDate').textContent = new Date().toLocaleDateString('it-IT', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'});
      renderCocktails();
      renderOrders();
      renderInventory();
      vibrateIfEnabled(100);
    });

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(tab + 'Tab').classList.add('active');
    }

    function renderCocktails() {
      const grid = document.getElementById('cocktailsGrid');
      grid.innerHTML = Object.keys(cocktailsDB).map(name => {
        const count = dailyOrders[name] || 0;
        return `
          <div class="cocktail-btn ${count > 0 ? 'selected' : ''}" onclick="openIngredientModal('${name}')">
            <div style="font-size: 0.9rem; line-height: 1.1;">${name}</div>
            <div class="cocktail-count">${count}</div>
          </div>
        `;
      }).join('');
    }

    // NUOVE FUNZIONI EDITOR COCKTAIL
    function openCocktailEditor(cocktailToEdit = null) {
      editingCocktail = cocktailToEdit;
      document.getElementById('cocktailEditorModal').classList.add('show');
      
      if (editingCocktail) {
        document.getElementById('cocktailEditorTitle').textContent = '✏️ Modifica Cocktail';
        document.getElementById('cocktailName').value = editingCocktail;
        const ingredients = cocktailsDB[editingCocktail].join(', ');
        document.getElementById('cocktailIngredients').value = ingredients;
        document.getElementById('deleteCocktailBtn').style.display = 'inline-flex';
      } else {
        document.getElementById('cocktailEditorTitle').textContent = '➕ Nuovo Cocktail';
        document.getElementById('cocktailName').value = '';
        document.getElementById('cocktailIngredients').value = '';
        document.getElementById('deleteCocktailBtn').style.display = 'none';
      }
      
      updateIngredientsList();
      vibrateIfEnabled(100);
    }

    function closeCocktailEditor() {
      document.getElementById('cocktailEditorModal').classList.remove('show');
      editingCocktail = null;
    }

    function updateIngredientsList() {
      const ingredientsInput = document.getElementById('cocktailIngredients').value;
      const ingredients = ingredientsInput.split(',').map(i => i.trim()).filter(i => i);
      const list = document.getElementById('selectedIngredientsList');
      
      list.innerHTML = ingredients.map(ing => `
        <span class="ingredient-tag">
          ${ing} 
          <button onclick="this.parentElement.remove()">×</button>
        </span>
      `).join('') || '<div style="opacity:0.5">Ingredienti selezionati appariranno qui</div>';
    }

    document.getElementById('cocktailIngredients').addEventListener('input', updateIngredientsList);

    function addCocktail() {
      const name = document.getElementById('cocktailName').value.trim();
      const ingredientsText = document.getElementById('cocktailIngredients').value;
      const ingredients = ingredientsText.split(',').map(i => i.trim()).filter(i => i);
      
      if (!name || ingredients.length === 0) {
        alert('Inserisci nome e almeno un ingrediente!');
        return;
      }
      
      if (cocktailsDB[name] && editingCocktail !== name) {
        if (!confirm('Questo nome esiste già. Sovrascriverlo?')) return;
      }
      
      cocktailsDB[name] = ingredients;
      localStorage.setItem('barCustomCocktails', JSON.stringify(cocktailsDB));
      
      renderCocktails();
      closeCocktailEditor();
      vibrateIfEnabled([100, 50, 100]);
    }

    function deleteCocktail() {
      if (editingCocktail && confirm(`Eliminare "${editingCocktail}"?`)) {
        delete cocktailsDB[editingCocktail];
        localStorage.setItem('barCustomCocktails', JSON.stringify(cocktailsDB));
        renderCocktails();
        closeCocktailEditor();
      }
    }

    function openIngredientModal(cocktail) {
      currentOrderCocktail = cocktail;
      document.getElementById('currentCocktail').textContent = cocktail;
      const ingredients = cocktailsDB[cocktail];
      let html = '';
      ingredients.forEach(ing => {
        const inv = inventory[ing];
        const costPerCl = inv ? (inv.pricePerLiter / 100) : 0;
        html += `
          <div class="ingredient-input-group">
            <label>${ing}</label>
            <input type="number" id="ing_${ing}" placeholder="cl" step="0.1" min="0" max="${inv ? inv.current : 50}" class="ingredient-input" value="30">
            <small>Disponibile: ${inv ? Math.round(inv.current) + 'cl' : 'N/D'} | €${costPerCl.toFixed(2)}/cl</small>
          </div>
        `;
      });
      document.getElementById('ingredientInputs').innerHTML = html;
      document.getElementById('ingredientModal').classList.add('show');
      vibrateIfEnabled(100);
    }

    function confirmOrder() {
      const ingredients = cocktailsDB[currentOrderCocktail];
      let totalCost = 0;
      
      ingredients.forEach(ing => {
        const qty = parseFloat(document.getElementById('ing_' + ing)?.value) || 0;
        const inv = inventory[ing];
        if (inv && qty > 0 && qty <= inv.current) {
          inv.current -= qty;
          totalCost += (inv.pricePerLiter / 100) * qty;
          localStorage.setItem('barInventory', JSON.stringify(inventory));
        }
      });

      dailyOrders[currentOrderCocktail] = (dailyOrders[currentOrderCocktail] || 0) + 1;
      customPrices[currentOrderCocktail] = totalCost.toFixed(2);
      localStorage.setItem('barOrdersToday', JSON.stringify(dailyOrders));
      localStorage.setItem('barCustomPrices', JSON.stringify(customPrices));

      renderCocktails();
      renderOrders();
      renderInventory();
      closeIngredientModal();
      vibrateIfEnabled([100, 50, 100]);
    }

    function closeIngredientModal() {
      document.getElementById('ingredientModal').classList.remove('show');
    }

    function renderOrders() {
      const ordersList = document.getElementById('ordersList');
      const summaryGrid = document.getElementById('summaryGrid');
      const totalOrders = Object.values(dailyOrders).reduce((a, b) => a + b, 0);
      
      document.getElementById('totalOrders').textContent = totalOrders;

      ordersList.innerHTML = Object.entries(dailyOrders)
        .filter(([_, count]) => count > 0)
        .map(([name, count]) => {
          const cost = customPrices[name] || 0;
          return `
            <div class="order-item">
              <span>${name}</span>
              <span>€${cost} x${count}</span>
            </div>
          `;
        }).join('') || '<div style="text-align:center;opacity:0.5">Nessun ordine</div>';

      const totalRevenue = Object.entries(dailyOrders).reduce((sum, [cocktail, count]) => 
        sum + ((customPrices[cocktail] || 0) * count * 6), 0);

      summaryGrid.innerHTML = `
        <div class="summary-card">
          <div class="summary-value">€${(totalRevenue/100).toFixed(0)}</div>
          <div>Incasso Stimato</div>
        </div>
        <div class="summary-card">
          <div class="summary-value">${totalOrders}</div>
          <div>Cocktail Totali</div>
        </div>
        <div class="summary-card">
          <div class="summary-value">€${(Object.values(customPrices).reduce((a,b)=>a+b,0)/100).toFixed(2)}</div>
          <div>Costo Produzione</div>
        </div>
      `;
    }

    function renderInventory() {
      const grid = document.getElementById('inventoryGrid');
      grid.innerHTML = Object.entries(inventory).map(([name, data]) => {
        const percent = (data.current / data.capacity) * 100;
        const lowStock = percent < 20;
        const costPerCl = data.pricePerLiter / 100;
        return `
          <div class="bottle-card ${lowStock ? 'bottle-low' : ''}">
            <div class="bottle-name">${name}</div>
            <div class="bottle-qty">${Math.round(data.current)}cl</div>
            <div style="font-size:0.8rem;opacity:0.7;margin-top:5px;">${data.capacity}cl tot</div>
            <div class="bottle-cost">€${costPerCl.toFixed(2)}/cl</div>
            <div style="height:6px;background:var(--mint-200);border-radius:3px;margin-top:8px;overflow:hidden">
              <div style="height:100%;width:${percent}%;background:var(--accent);transition:width 0.3s"></div>
            </div>
          </div>
        `;
      }).join('');
    }

    // FUNZIONI SETTINGS
    function toggleSettings() { document.getElementById('settingsOverlay').classList.toggle('show'); }
    function toggleDarkMode() {
      isDarkMode = !isDarkMode;
      document.documentElement.setAttribute('data-theme', isDarkMode ? 'dark' : '');
      localStorage.setItem('barDark', isDarkMode);
    }
    function toggleVibration() {
      isVibrationEnabled = !isVibrationEnabled;
      localStorage.setItem('barVibration', isVibrationEnabled);
    }
    function vibrateIfEnabled(pattern = 100) {
      if (isVibrationEnabled && 'vibrate' in navigator) navigator.vibrate(pattern);
    }
    function updateToggles() {
      document.getElementById('darkModeToggle').checked = isDarkMode;
      document.getElementById('vibrationToggle').checked = isVibrationEnabled;
    }
    function clearDay() {
      if (confirm('Finire giornata?')) {
        localStorage.removeItem('barOrdersToday');
        dailyOrders = {};
        renderOrders();
        renderCocktails();
      }
    }
