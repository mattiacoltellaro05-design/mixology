<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bar Inventory Pro PRO</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --mint-50: #f8faf7; --mint-100: #eaf3ea; --mint-200: #d8e8d8; 
      --mint-300: #c5ddc5; --mint-400: #b3d2b3; --mint-500: #a8c4a5;
      --mint-600: #90b39a; --mint-700: #7d9a7a; --text-primary: #1a3c1a; 
      --accent: #f4a261; --danger: #ef476f; --success: #2a9d8f; --profit: #48cae4;
      --glass: rgba(255,255,255,0.1); --shadow: 0 8px 32px rgba(94,122,90,0.3);
    }
    [data-theme="dark"] {
      --mint-50: #1a231a; --mint-100: #2d3a2d; --mint-200: #3d4f3d; --mint-300: #4d644d; 
      --mint-400: #5d795d; --mint-500: #6e8e6e; --text-primary: #e8f5e8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system,BlinkMacSystemFont,sans-serif; background: linear-gradient(135deg,var(--mint-100),var(--mint-300)); min-height: 100vh; color: var(--text-primary); }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .header { text-align: center; padding: 30px; background: var(--glass); border-radius: 24px; margin-bottom: 30px; backdrop-filter: blur(20px); box-shadow: var(--shadow); }
    .header h1 { font-size: clamp(1.8rem,5vw,2.5rem); background: linear-gradient(45deg,var(--mint-700),var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .tabs { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
    .tab-btn { padding: 12px 24px; border: none; border-radius: 20px; cursor: pointer; background: var(--glass); color: var(--text-primary); transition: all 0.3s; }
    .tab-btn.active { background: var(--mint-500); color: white; transform: translateY(-2px); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
    @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }
    .cocktails-buttons { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; max-height: 420px; overflow-y: auto; padding: 10px; }
    .cocktail-btn { background: var(--mint-50); border: 2px solid transparent; border-radius: 16px; padding: 12px 8px; text-align: center; cursor: pointer; min-height: 75px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 600; transition: all 0.3s; }
    .cocktail-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
    .cocktail-btn.selected { border-color: var(--accent); background: linear-gradient(45deg,var(--accent),#e76f51); color: white; }
    .cocktail-count { font-size: 1.1rem; font-weight: bold; margin-top: 2px; }
    .cocktail-price { font-size: 0.7rem; opacity: 0.9; margin-top: 2px; }
    .cocktail-profit { font-size: 0.65rem; background: var(--profit); color: white; padding: 2px 6px; border-radius: 10px; margin-top: 2px; }
    .reorder-section { background: linear-gradient(135deg,#ffeaa7,#fdcb6e); margin-bottom: 20px; padding: 20px; border-radius: 20px; }
    .reorder-list { display: grid; grid-template-columns: repeat(auto-fill,minmax(250px,1fr)); gap: 10px; }
    .reorder-item { background: white; padding: 15px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .reorder-item.critical { background: linear-gradient(45deg,var(--danger),#ff6b7b); color: white; }
    .reorder-btn { padding: 8px 16px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; margin: 0 2px; }
    .btn-restock { background: var(--success); color: white; }
    .btn-edit { background: var(--mint-500); color: white; }
    .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(200px,1fr)); gap: 15px; max-height: 500px; overflow-y: auto; padding: 10px; }
    .bottle-card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 16px; padding: 15px; text-align: center; box-shadow: var(--shadow); border-left: 4px solid var(--mint-500); cursor: pointer; transition: all 0.2s; }
    .bottle-card:hover { transform: scale(1.02); }
    .bottle-low { border-left-color: var(--danger) !important; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    .btn { padding: 12px 24px; border: none; border-radius: 16px; cursor: pointer; font-weight: 600; transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin: 5px; background: var(--mint-500); color: white; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
    .btn-success { background: linear-gradient(45deg,var(--success),#48cae4); }
    .btn-danger { background: linear-gradient(45deg,var(--danger),#ff6b7a); }
    .btn-small { padding: 6px 12px; font-size: 0.8rem; }
    .settings { position: fixed; top: 20px; right: 20px; z-index: 1000; }
    .settings-btn { width: 55px; height: 55px; border-radius: 50%; background: var(--mint-500); color: white; border: none; font-size: 1.3rem; cursor: pointer; box-shadow: var(--shadow); }
    .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; z-index: 999; backdrop-filter: blur(10px); place-items: center; }
    .overlay.show { display: grid; }
    .modal { background: var(--mint-50); border-radius: 24px; padding: 30px; max-width: 600px; width: 90%; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow); }
    .editor-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(250px,1fr)); gap: 15px; }
    .input-group { display: flex; flex-direction: column; gap: 8px; }
    .input-field { padding: 12px; border: 2px solid var(--mint-200); border-radius: 12px; font-size: 1rem; }
    .order-item { background: var(--mint-50); border-radius: 16px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); gap: 20px; margin-top: 30px; }
    .summary-card { background: var(--glass); border-radius: 20px; padding: 20px; text-align: center; }
    .summary-value { font-size: 2rem; font-weight: bold; color: var(--accent); }
    .chart-container { background: var(--glass); border-radius: 20px; padding: 20px; backdrop-filter: blur(10px); margin-top: 20px; }
  </style>
</head>
<body>
  <div class="settings"><button class="settings-btn" onclick="toggleSettings()">⚙️</button></div>
  
  <div class="container">
    <div class="header">
      <h1>🥃 Bar Inventory Pro <span style="font-size:0.6em;opacity:0.8;">PRO</span></h1>
      <div id="currentDate"></div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('cocktails')">🍹 Ordini</button>
      <button class="tab-btn" onclick="switchTab('inventory')">🥤 Ingredienti</button>
      <button class="tab-btn" onclick="switchTab('analytics')">📊 Analisi</button>
    </div>

    <div id="cocktailsTab" class="tab-content active">
      <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
        <button class="btn btn-success" onclick="openCocktailEditor()">➕ Nuovo Cocktail</button>
      </div>
      <div id="reorderSection" style="display:none;"></div>
      <div class="main-grid">
        <div><h2 style="font-size:1.3rem;margin-bottom:15px;text-align:center;">Seleziona Cocktail</h2><div class="cocktails-buttons" id="cocktailsGrid"></div></div>
        <div><h2>Ordini Oggi <span id="totalOrders">0</span></h2><div id="ordersList"></div><div class="summary-grid" id="summaryGrid"></div><div style="text-align:center;margin-top:20px;"><button class="btn btn-danger" onclick="clearDay()">🗑️ Fine Giornata</button></div></div>
      </div>
    </div>

    <div id="inventoryTab" class="tab-content">
      <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;"><button class="btn btn-success" onclick="openIngredientEditor()">➕ Nuovo Ingrediente</button></div>
      <div class="inventory-grid" id="inventoryGrid"></div>
    </div>

    <div id="analyticsTab" class="tab-content">
      <div class="chart-container"><h3>🥇 TOP 5 Cocktail</h3><div id="topCocktails"></div></div>
      <div class="chart-container"><h3>📈 Previsioni Riordino</h3><div id="forecastList"></div></div>
    </div>
  </div>

  <!-- MODALS -->
  <div class="overlay" id="ingredientModal">
    <div class="modal">
      <h3>Ingredienti per <span id="currentCocktail"></span></h3>
      <div class="editor-grid" id="ingredientInputs"></div>
      <div style="text-align:center;margin-top:25px;gap:10px;display:flex;flex-wrap:wrap;justify-content:center;">
        <button class="btn btn-primary" onclick="confirmOrder()">✅ Conferma</button>
        <button class="btn btn-danger btn-small" onclick="closeIngredientModal()">❌ Annulla</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="ingredientEditorModal">
    <div class="modal">
      <h3 id="ingredientEditorTitle">➕ Nuovo Ingrediente</h3>
      <div class="editor-grid">
        <div class="input-group"><label>Nome</label><input type="text" id="ingredientName"></div>
        <div class="input-group"><label>Capacità (cl)</label><input type="number" id="ingredientCapacity" min="50"></div>
        <div class="input-group"><label>Quantità Attuale</label><input type="number" id="ingredientCurrent" min="0"></div>
        <div class="input-group"><label>Prezzo/L (€)</label><input type="number" id="ingredientPrice" step="0.1"></div>
      </div>
      <div style="text-align:center;margin-top:25px;gap:10px;display:flex;justify-content:center;">
        <button class="btn btn-primary" onclick="saveIngredient()">✅ Salva</button>
        <button class="btn btn-danger" onclick="deleteIngredient()" id="deleteIngredientBtn" style="display:none;">🗑️ Elimina</button>
        <button class="btn" onclick="closeIngredientEditor()">❌ Annulla</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="cocktailEditorModal">
    <div class="modal">
      <h3 id="cocktailEditorTitle">➕ Nuovo Cocktail</h3>
      <div class="editor-grid">
        <div class="input-group"><label>Nome</label><input type="text" id="cocktailName"></div>
        <div class="input-group"><label>Prezzo (€)</label><input type="number" id="cocktailPrice" step="0.5"></div>
        <div class="input-group"><label>Qty/Ingrediente (cl)</label><input type="number" id="cocktailDefaultQty" step="0.5" value="3"></div>
        <div class="input-group"><label>Ingredienti</label><input type="text" id="cocktailIngredients" placeholder="Gin, Campari, Vermouth"></div>
      </div>
      <div style="text-align:center;margin-top:25px;gap:10px;display:flex;justify-content:center;">
        <button class="btn btn-primary" onclick="addCocktail()">✅ Salva</button>
        <button class="btn btn-danger" onclick="deleteCocktail()" id="deleteCocktailBtn" style="display:none;">🗑️ Elimina</button>
        <button class="btn" onclick="closeCocktailEditor()">❌ Annulla</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="settingsOverlay">
    <div class="modal">
      <h3>⚙️ Impostazioni</h3>
      <div style="display:grid;gap:15px;margin-bottom:20px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <label>Dark Mode</label>
          <label class="switch"><input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()"><span class="slider"></span></label>
        </div>
      </div>
      <button class="btn btn-primary" onclick="exportAll()">📤 Backup</button>
      <button class="btn btn-danger" onclick="resetAll()">🔄 Reset</button>
      <button class="btn" onclick="toggleSettings()" style="width:100%;margin-top:15px;">✕ Chiudi</button>
    </div>
  </div>

  <script>
    let cocktailsDB=JSON.parse(localStorage.getItem('barCustomCocktails')||'{"Negroni":{"ingredients":["Gin","Campari","Vermouth"],"defaultQty":3,"price":12},"Aperol Spritz":{"ingredients":["Aperol","Prosecco","Soda"],"defaultQty":4,"price":10},"Moscow Mule":{"ingredients":["Vodka","Zenzero","Lime"],"defaultQty":3,"price":11}}');
    let inventory=JSON.parse(localStorage.getItem('barInventory')||'{}');
    let dailyOrders=JSON.parse(localStorage.getItem('barOrdersToday')||'{}');
    let isDarkMode=localStorage.getItem('barDark')==='true';
    let currentOrderCocktail='';
    let editingCocktail=editingIngredient=null;

    const defaultInventory={'Gin':{capacity:1000,current:800,pricePerLiter:25},'Campari':{capacity:1000,current:700,pricePerLiter:22},'Vermouth':{capacity:1000,current:650,pricePerLiter:18},'Aperol':{capacity:1000,current:850,pricePerLiter:20},'Prosecco':{capacity:2000,current:1800,pricePerLiter:15},'Soda':{capacity:2000,current:1900,pricePerLiter:2},'Vodka':{capacity:1000,current:900,pricePerLiter:22},'Zenzero':{capacity:500,current:300,pricePerLiter:12},'Lime':{capacity:200,current:120,pricePerLiter:35}};

    Object.keys(defaultInventory).forEach(k=>!inventory[k]&&(inventory[k]=defaultInventory[k]));
    document.addEventListener('DOMContentLoaded',()=>{isDarkMode&&document.documentElement.setAttribute('data-theme','dark');document.getElementById('currentDate').textContent=new Date().toLocaleDateString('it-IT',{weekday:'long',year:'numeric',month:'long',day:'numeric'});initApp();document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>e.target===o&&o.classList.remove('show')));});

    function initApp(){renderReorderList();renderCocktails();renderOrders();renderInventory();renderAnalytics();}

    function switchTab(t){document.querySelectorAll('.tab-btn, .tab-content').forEach((e,i)=>e.classList.toggle('active',i===+t[0]));t==='analytics'&&renderAnalytics();}

    function renderReorderList(){const c=[],w=[];Object.entries(inventory).forEach(([n,d])=>{const p=(d.current/d.capacity)*100;p<20?c.push({n:n,d:d,p}):p<40&&w.push({n:n,d:d,p})});const s=document.getElementById('reorderSection'),h=c.length||w.length;if(!h)return s.style.display='none';s.style.display='block';s.innerHTML=`<div class="reorder-section"><h3>🔔 DA RIORDINARE</h3>${c.length?`<h4 style="color:var(--danger)">🔴 CRITICO (${c.length})</h4><div class="reorder-list">${c.map(({n,d,p})=>`<div class="reorder-item critical"><div><strong>${n}</strong><br><small>${Math.round(d.current)}/${d.capacity}cl (${p.toFixed(1)}%)</small></div><div><button class="reorder-btn btn-restock" onclick="quickRestock('${n.replace(/'/g,"\\'")}',0.9)">🔄 90%</button><button class="reorder-btn btn-edit" onclick="openIngredientEditor('${n.replace(/'/g,"\\'")}')">✏️</button></div></div>`).join('')}</div>`:''}${w.length?`<h4 style="color:var(--warning);">🟡 ATTENZIONE (${w.length})</h4><div class="reorder-list">${w.map(({n,d,p})=>`<div class="reorder-item"><div><strong>${n}</strong><br><small>${Math.round(d.current)}/${d.capacity}cl</small></div><button class="reorder-btn btn-restock" onclick="quickRestock('${n.replace(/'/g,"\\'")}',0.9)">🔄 90%</button></div>`).join('')}</div>`:''}</div>`;}

    function quickRestock(n,p){confirm(`🔄 Riordinare ${n} al ${Math.round(p*100)}%?`)&&(inventory[n].current=Math.round(inventory[n].capacity*p),localStorage.setItem('barInventory',JSON.stringify(inventory)),renderReorderList(),renderInventory(),alert(`✅ ${n}: ${inventory[n].current}cl`));}

    function calculateCocktailCost(n){const d=cocktailsDB[n];if(!d)return 0;let t=0;return d.ingredients.forEach(i=>{const v=inventory[i];v&&(t+=(d.defaultQty*v.pricePerLiter)/100)}),t}

    function renderCocktails(){document.getElementById('cocktailsGrid').innerHTML=Object.keys(cocktailsDB).sort().map(n=>{const d=cocktailsDB[n],c=dailyOrders[n]||0,o=calculateCocktailCost(n),p=d.price-o;return`<div class="cocktail-btn ${c>0?'selected':''}" onclick="openIngredientModal('${n.replace(/'/g,'\\\\\'')}')"><div style="font-size:0.9rem;line-height:1.1;">${n}</div><div class="cocktail-count">${c}</div><div class="cocktail-price">€${d.price}</div><div class="cocktail-profit">+€${p.toFixed(2)}</div></div>`}).join('');}

    function renderOrders(){const t=Object.values(dailyOrders).reduce((a,b)=>a+b,0);document.getElementById('totalOrders').textContent=t;document.getElementById('ordersList').innerHTML=Object.entries(dailyOrders).filter(([_,c])=>c>0).sort(([_,a],[__,b])=>b-a).map(([n,c])=>{const p=cocktailsDB[n]?.price||12,o=calculateCocktailCost(n)*c,f=(p*c)-o;return`<div class="order-item"><span>${n}</span><span style="font-weight:bold;font-size:1.2rem;color:var(--accent)">×${c}</span><div style="font-size:0.9rem">€${(p*c).toFixed(1)} <span style="color:var(--profit);">+€${f.toFixed(1)}</span></div></div>`}).join('')||'<div style="opacity:0.5;text-align:center;padding:20px">Nessun ordine</div>';const g=document.getElementById('summaryGrid'),v=Object.entries(dailyOrders).reduce((s,[n,c])=>s+(cocktailsDB[n]?.price||12)*c,0),C=Object.entries(dailyOrders).reduce((s,[n,c])=>s+calculateCocktailCost(n)*c,0),P=v-C;g.innerHTML=`<div class="summary-card"><div style="font-size:1.1rem;opacity:0.8;">Cocktail</div><div class="summary-value">${t}</div></div><div class="summary-card"><div style="font-size:1.1rem;opacity:0.8;">Fatturato</div><div class="summary-value">€${v.toFixed(1)}</div></div><div class="summary-card"><div style="font-size:1.1rem;opacity:0.8;">Costo Ing.</div><div class="summary-value" style="color:var(--warning);">€${C.toFixed(1)}</div></div><div class="summary-card"><div style="font-size:1.1rem;opacity:0.8;">✅ PROFITTO</div><div class="summary-value" style="color:var(--profit);">€${P.toFixed(1)}</div></div>`;}

    function renderAnalytics(){document.getElementById('topCocktails').innerHTML=Object.entries(dailyOrders).sort(([_,a],[__,b])=>b-a).slice(0,5).map(([n,c],i)=>{const t=Object.values(dailyOrders).reduce((a,b)=>a+b,0),p=t?((c/t)*100).toFixed(1):0;return`<div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid rgba(255,255,255,0.1);"><span>${['🥇','🥈','🥉','④','⑤'][i]} ${n}</span><span>${c} (${p}%)</span></div>`}).join('')||'<div style="text-align:center;opacity:0.5;">Nessun dato</div>';document.getElementById('forecastList').innerHTML=Object.entries(inventory).filter(([_,d])=>(d.current/d.capacity)<0.5).sort(([_,a],[__,b])=>(a.current/(a.capacity*0.05))-(b.current/(b.capacity*0.05))).slice(0,8).map(([n,d])=>{const g=Math.round((d.current/(d.capacity*0.05))/2),s=g<=2?'🔴 URGENTE':g<=7?'🟡 PRESTO':'🟢 OK';return`<div style="padding:12px;border-radius:12px;background:${g<=2?'#ff6b7a':g<=7?'#f4a261':'#2a9d8f'};color:white;margin-bottom:8px;">${n}: ${Math.round(d.current)}cl → ${s} (${g}gg)</div>`}).join('')||'<div style="text-align:center;opacity:0.5;">Tutti OK!</div>';}

    function renderInventory(){document.getElementById('inventoryGrid').innerHTML=Object.entries(inventory).sort(([a],[b])=>a.localeCompare(b)).map(([n,d])=>{const p=Math.min(100,(d.current/d.capacity)*100),l=p<20,o=(d.pricePerLiter/100).toFixed(2);return`<div class="bottle-card ${l?'bottle-low':''}" onclick="openIngredientEditor('${n.replace(/'/g,'\\\\\'')}')"><div class="bottle-name">${n}</div><div class="bottle-qty">${Math.round(d.current)}cl</div><div style="font-size:0.8rem;opacity:0.7;">${d.capacity}cl</div><div class="bottle-cost">€${o}/cl</div><div style="height:6px;background:var(--mint-200);border-radius:3px;margin-top:8px;overflow:hidden"><div style="height:100%;width:${p}%;background:var(--accent);transition:width 0.3s"></div></div></div>`}).join('')||'<div style="grid-column:1/-1;text-align:center;opacity:0.5;padding:40px;">Aggiungi un ingrediente!</div>';}

    function openIngredientModal(n){currentOrderCocktail=n;document.getElementById('currentCocktail').textContent=n;const d=cocktailsDB[n],c=d.ingredients,q=d.defaultQty,e=document.getElementById('ingredientInputs');e.innerHTML=c.map(i=>{const v=inventory[i]||{current:0};return`<div class="input-group"><label>${i}</label><input type="number" class="ingredient-qty" data-ingredient="${i}" value="${q}" min="0" step="0.5" style="font-weight:bold;"><small>${v.current.toFixed(1)}cl disponibili</small></div>`}).join('');document.getElementById('ingredientModal').classList.add('show');}

    function confirmOrder(){const i=document.querySelectorAll('.ingredient-qty'),v=true;i.forEach(t=>{const q=parseFloat(t.value)||0,n=t.dataset.ingredient,r=inventory[n];q>0&&(!r||r.current<q)&&(alert(`❌ ${n} insufficiente! (${r?.current?.toFixed(1)||0}cl)`),v=false)});if(!v)return;i.forEach(t=>{const q=parseFloat(t.value)||0,n=t.dataset.ingredient;q>0&&inventory[n]&&(inventory[n].current=Math.max(0,inventory[n].current-q))});dailyOrders[currentOrderCocktail]=(dailyOrders[currentOrderCocktail]||0)+1;localStorage.setItem('barInventory',JSON.stringify(inventory));localStorage.setItem('barOrdersToday',JSON.stringify(dailyOrders));initApp();document.getElementById('ingredientModal').classList.remove('show');}

    function openIngredientEditor(n=null){editingIngredient=n;document.getElementById('ingredientEditorModal').classList.add('show');if(n){const d=inventory[n];document.getElementById('ingredientEditorTitle').textContent=`✏️ Modifica ${n}`;document.getElementById('ingredientName').value=n;document.getElementById('ingredientCapacity').value=d.capacity;document.getElementById('ingredientCurrent').value=d.current;document.getElementById('ingredientPrice').value=d.pricePerLiter;document.getElementById('deleteIngredientBtn').style.display='inline-flex'}else document.getElementById('ingredientEditorTitle').textContent='➕ Nuovo Ingrediente',[document.getElementById('ingredientName'),document.getElementById('ingredientCapacity'),document.getElementById('ingredientCurrent'),document.getElementById('ingredientPrice')].forEach(e=>e.value=''),document.getElementById('deleteIngredientBtn').style.display='none';}

    function saveIngredient(){const n=document.getElementById('ingredientName').value.trim(),c=parseFloat(document.getElementById('ingredientCapacity').value)||1000,r=parseFloat(document.getElementById('ingredientCurrent').value)||0,p=parseFloat(document.getElementById('ingredientPrice').value)||0;!n?alert('❌ Nome richiesto!'):inventory[n]&&editingIngredient!==n&&!confirm('Sovrascrivere?')||(inventory[n]={capacity:c,current:r,pricePerLiter:p},localStorage.setItem('barInventory',JSON.stringify(inventory)),initApp(),document.getElementById('ingredientEditorModal').classList.remove('show'));}

    function deleteIngredient(){editingIngredient&&confirm(`🗑️ Elimina "${editingIngredient}"?`)&&(delete inventory[editingIngredient],localStorage.setItem('barInventory',JSON.stringify(inventory)),initApp(),document.getElementById('ingredientEditorModal').classList.remove('show'));}

    function openCocktailEditor(n=null){editingCocktail=n;document.getElementById('cocktailEditorModal').classList.add('show');if(n){const d=cocktailsDB[n];document.getElementById('cocktailEditorTitle').textContent=`✏️ Modifica ${n}`;document.getElementById('cocktailName').value=n;document.getElementById('cocktailPrice').value=d.price;document.getElementById('cocktailDefaultQty').value=d.defaultQty;document.getElementById('cocktailIngredients').value=d.ingredients.join(', ');document.getElementById('deleteCocktailBtn').style.display='inline-flex'}else document.getElementById('cocktailEditorTitle').textContent='➕ Nuovo Cocktail',document.getElementById('cocktailName').value=document.getElementById('cocktailPrice').value='',document.getElementById('cocktailDefaultQty').value=3,document.getElementById('cocktailIngredients').value='',document.getElementById('deleteCocktailBtn').style.display='none';}

    function addCocktail(){const n=document.getElementById('cocktailName').value.trim(),p=parseFloat(document.getElementById('cocktailPrice').value)||10,q=parseFloat(document.getElementById('cocktailDefaultQty').value)||3,i=document.getElementById('cocktailIngredients').value.split(',').map(e=>e.trim()).filter(e=>e);!n||!i.length?alert('❌ Nome e ingredienti richiesti!'):cocktailsDB[n]={ingredients:i,defaultQty:q,price:p},localStorage.setItem('barCustomCocktails',JSON.stringify(cocktailsDB)),initApp(),document.getElementById('cocktailEditorModal').classList.remove('show');}

    function deleteCocktail(){editingCocktail&&confirm(`🗑️ Elimina "${editingCocktail}"?`)&&(delete cocktailsDB[editingCocktail],localStorage.setItem('barCustomCocktails',JSON.stringify(cocktailsDB)),initApp(),document.getElementById('cocktailEditorModal').classList.remove('show'));}

    function clearDay(){confirm('Azzerare ordini oggi?')&&(dailyOrders={},localStorage.setItem('barOrdersToday',JSON.stringify(dailyOrders)),initApp());}

    function toggleSettings(){document.getElementById('settingsOverlay').classList.toggle('show');}

    function toggleDarkMode(){isDarkMode=!isDarkMode;localStorage.setItem('barDark',isDarkMode);document.documentElement.setAttribute('data-theme',isDarkMode?'dark':'');}

    function exportAll(){const d={inventory,cocktailsDB};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`bar-backup-${new Date().toISOString().split('T')[0]}.json`;a.click();URL.revokeObjectURL(u);}

    function resetAll(){confirm('❌ RESET TOTALE?')&&localStorage.clear()&&location.reload();}
  </script>
</body>
</html>
