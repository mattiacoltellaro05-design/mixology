<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍸 Bar Manager PRO</title>
    <style>
        :root {
            --bg-primary: #f8f9fa;
            --bg-secondary: white;
            --bg-input: #f2f2f7;
            --text-primary: #1c1c1e;
            --text-secondary: #8e8e93;
            --mint-100: #a8e6cf;
            --mint-200: #86c8b8;
            --mint-dark: #0f5132;
            --border: #e5e5e7;
            --shadow: rgba(0,0,0,0.08);
            --gold: #ffd700;
            --purple: #8b5cf6;
        }
        
        [data-theme="dark"] {
            --bg-primary: #1c1c1e;
            --bg-secondary: #2c2c2e;
            --bg-input: #3c3c3e;
            --text-primary: #f5f5f7;
            --text-secondary: #8e8e93;
            --mint-100: #88d4b8;
            --mint-200: #6bc5a9;
            --mint-dark: #0f5132;
            --border: #38383a;
            --shadow: rgba(0,0,0,0.3);
            --gold: #facc15;
            --purple: #a78bfa;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, SF Pro Display, HelveticaNeue, sans-serif;
            background: var(--bg-primary); 
            color: var(--text-primary); 
            padding-bottom: 100px;
            transition: all 0.3s;
            user-select: none;
        }
        
        .header {
            background: linear-gradient(135deg, var(--mint-100) 0%, color-mix(in srgb, var(--mint-100) 80%, white) 100%);
            padding: 30px 25px;
            border-radius: 0 0 28px 28px;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 800;
            color: var(--mint-dark);
            margin-bottom: 20px;
            text-align: center;
        }
        .header-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .mint-btn {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 16px;
            padding: 14px 20px;
            font-weight: 600;
            font-size: 16px;
            color: var(--mint-dark);
            cursor: pointer;
            transition: all 0.2s;
            min-height: 48px;
        }
        .mint-btn:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(168,230,207,0.4);
        }
        
        .tabs {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 8px;
            margin: 0 20px 25px 20px;
            display: flex;
            gap: 8px;
            box-shadow: 0 4px 20px var(--shadow);
            overflow-x: auto;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 8px;
            border-radius: 12px;
            border: none;
            background: transparent;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 90px;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, var(--mint-100) 0%, var(--mint-200) 100%);
            color: var(--mint-dark);
            box-shadow: 0 4px 15px color-mix(in srgb, var(--mint-100), transparent 50%);
        }
        
        .tab-content { display: none; padding: 0 20px; }
        .tab-content.active { display: block; }
        
        .grid { 
            display: grid; 
            gap: 16px; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            margin-bottom: 25px;
        }
        .card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 20px var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.2s;
            cursor: grab;
        }
        .card:active { transform: scale(0.98); }
        .card.dragging {
            opacity: 0.5;
            transform: rotate(5deg);
            z-index: 1000;
        }
        
        .cocktail-btn {
            text-align: center;
            cursor: pointer;
            padding: 20px 12px;
            border-radius: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            transition: all 0.2s;
            user-select: none;
        }
        .cocktail-btn:active {
            background: color-mix(in srgb, var(--bg-secondary) 90%, var(--text-primary));
            transform: scale(0.98);
        }
        .cocktail-btn.selected {
            background: linear-gradient(135deg, var(--mint-100) 0%, var(--mint-200) 100%);
            border-color: var(--mint-200);
            transform: scale(1.02);
        }
        .cocktail-name { font-weight: 600; font-size: 16px; margin-bottom: 8px; }
        .cocktail-count { font-size: 32px; font-weight: 800; color: var(--mint-dark); margin-bottom: 4px; }
        .cocktail-price { font-size: 18px; font-weight: 700; color: var(--mint-dark); }
        
        .search-box {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 17px;
            margin-bottom: 20px;
        }
        .search-box:focus {
            border-color: var(--mint-100);
            outline: none;
        }
        
        /* NUOVE SEZIONI */
        .premium-section {
            background: linear-gradient(135deg, var(--purple) 0%, color-mix(in srgb, var(--purple) 80%, white) 100%);
            border-radius: 24px;
            padding: 25px;
            margin: 20px;
            box-shadow: 0 10px 40px rgba(139, 92, 246, 0.3);
        }
        .premium-title {
            font-size: 24px;
            font-weight: 800;
            color: white;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .table-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }
        .table-btn {
            aspect-ratio: 1;
            border-radius: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .table-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }
        .table-btn.active {
            background: var(--gold);
            color: var(--purple);
            border-color: var(--gold);
            box-shadow: 0 0 20px var(--gold);
        }
        .table-orders {
            margin-top: 16px;
            padding: 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            min-height: 60px;
        }
        
        .stats-card {
            text-align: center;
            padding: 20px;
            border-radius: 20px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .stats-value {
            font-size: 36px;
            font-weight: 800;
            color: var(--gold);
            margin-top: 8px;
        }
        
        .order-item {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 10px color-mix(in srgb, var(--shadow) 50%, transparent);
            border: 1px solid var(--border);
        }
        
        .overlay, .modal, .mint-btn, .summary-grid, .stats-grid, .total-badge, .theme-toggle {
            /* tutti gli stili esistenti... mantenuti identici */
        }
        
        .drag-placeholder {
            height: 200px;
            border: 2px dashed var(--mint-100);
            border-radius: 20px;
            background: color-mix(in srgb, var(--mint-100), transparent 80%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--mint-dark);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">🌙</button>
    
    <div class="header">
        <h1>🍸 Bar Manager PRO</h1>
        <div class="header-buttons">
            <button class="mint-btn" id="addIngredientBtn">➕ Ingrediente</button>
            <button class="mint-btn" id="addCocktailBtn">🍹 Cocktail</button>
            <button class="mint-btn" id="endDayBtn">🏁 Termina Giornata</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="orders">Ordini</button>
        <button class="tab-btn" data-tab="cocktails">Cocktails</button>
        <button class="tab-btn" data-tab="inventory">Inventario</button>
        <button class="tab-btn" data-tab="stats">📊 Stats</button>
        <button class="tab-btn" data-tab="premium">⭐ PRO</button>
    </div>

    <div id="ordersTab" class="tab-content active">
        <div class="summary-grid grid" id="summaryGrid"></div>
        <div id="ordersList"></div>
    </div>

    <div id="cocktailsTab" class="tab-content">
        <input class="search-box" id="cocktailSearch" placeholder="🔍 Cerca cocktail o ingrediente...">
        <div class="grid" id="cocktailsGrid"></div>
    </div>

    <div id="inventoryTab" class="tab-content">
        <div class="grid" id="inventoryGrid"></div>
    </div>

    <div id="statsTab" class="tab-content">
        <div class="stats-grid grid" id="statsGrid"></div>
    </div>

    <!-- NUOVA SEZIONE PREMIUM -->
    <div id="premiumTab" class="tab-content">
        <div class="premium-section">
            <h2 class="premium-title">⭐ PANEL PRO</h2>
            
            <!-- FEATURE 2: Top 5 Cocktail più venduti -->
            <div style="margin-bottom: 25px;">
                <h3 style="color: white; margin-bottom: 16px; font-size: 20px;">🥇 TOP 5 Cocktail</h3>
                <div class="stats-grid" id="topCocktails"></div>
            </div>

            <!-- FEATURE 5: Trend Vendite Oggi/Ieri -->
            <div style="margin-bottom: 25px;">
                <h3 style="color: white; margin-bottom: 16px; font-size: 20px;">📈 Trend Oggi/Ieri</h3>
                <div class="stats-grid" style="grid-template-columns: repeat(2, 1fr);">
                    <div class="stats-card">
                        <div style="color: rgba(255,255,255,0.8);">Oggi</div>
                        <div class="stats-value" id="todayOrders">-</div>
                    </div>
                    <div class="stats-card">
                        <div style="color: rgba(255,255,255,0.8);">Ieri</div>
                        <div class="stats-value" id="yesterdayOrders">-</div>
                    </div>
                </div>
            </div>

            <!-- FEATURE 11: Ordini Tavolo -->
            <h3 style="color: white; margin-bottom: 16px; font-size: 20px;">🪑 Tavoli</h3>
            <div class="table-grid">
                <div class="table-btn active" data-table="1">Tavolo 1</div>
                <div class="table-btn" data-table="2">Tavolo 2</div>
                <div class="table-btn" data-table="3">Tavolo 3</div>
                <div class="table-btn" data-table="4">Tavolo 4</div>
                <div class="table-btn" data-table="5">Banco</div>
            </div>
            <div id="tableOrders" class="table-orders">Seleziona un tavolo</div>
        </div>
    </div>

    <!-- MODALS (invariati) -->
    <div id="ingredientModal" class="overlay">
        <!-- modal ingredient esistente -->
        <div class="modal">
            <div class="modal-header">
                <h3 id="ingredientTitle">➕ Nuovo Ingrediente</h3>
            </div>
            <div class="modal-content">
                <input id="ingredientName" placeholder="Nome ingrediente">
                <input id="ingredientPrice" type="number" step="0.01" placeholder="€/litro">
            </div>
            <div class="modal-buttons">
                <button class="mint-btn" id="saveIngredientBtn">Salva</button>
                <button id="deleteIngredientBtn" class="mint-btn" style="display:none">Elimina</button>
                <button class="mint-btn" id="cancelIngredientBtn">Annulla</button>
            </div>
        </div>
    </div>

    <div id="cocktailModal" class="overlay">
        <!-- modal cocktail esistente -->
        <div class="modal">
            <div class="modal-header">
                <h3 id="cocktailTitle">🍹 Nuovo Cocktail</h3>
            </div>
            <div class="modal-content">
                <input id="cocktailName" placeholder="Nome cocktail">
                <input id="cocktailPrice" type="number" step="0.1" placeholder="Prezzo €">
                <div class="select-container">
                    <div class="select-display" id="ingredientSelectDisplay">
                        <span id="selectedIngredient">Seleziona ingrediente...</span>
                        <span>▼</span>
                    </div>
                    <div id="ingredientOptions" class="select-options"></div>
                </div>
                <button class="mint-btn" id="addIngredientToCocktailBtn" style="width:100%;margin-top:8px;">➕ Aggiungi ingrediente</button>
                <div id="cocktailIngredientsList"></div>
            </div>
            <div class="modal-buttons">
                <button class="mint-btn" id="saveCocktailBtn">Salva</button>
                <button class="mint-btn" id="cancelCocktailBtn">Annulla</button>
            </div>
        </div>
    </div>

    <div id="totalOrders" class="total-badge">0</div>

    <script>
        class BarManager {
            constructor() {
                this.inventoryData = {};
                this.cocktailsData = {};
                this.dailyOrders = {};
                this.tableOrders = {1: {}, 2: {}, 3: {}, 4: {}, 5: {}};
                this.editingIngredient = null;
                this.currentCocktailIngredients = {};
                this.ingredientSelectOpen = false;
                this.currentTable = 1;
                this.dragData = null;
                
                this.init();
            }

            init() {
                this.initTheme();
                this.loadData();
                this.bindEvents();
                this.renderAll();
            }

            // ... tutte le funzioni esistenti (loadData, saveData, calculateCost, etc.) ...
            async loadData() {
                try {
                    const data = JSON.parse(localStorage.getItem('barData') || '{}');
                    this.inventoryData = data.inventory || this.inventoryData;
                    this.cocktailsData = data.cocktails || this.cocktailsData;
                    this.dailyOrders = data.orders || {};
                    this.tableOrders = data.tableOrders || this.tableOrders;
                } catch(e) {
                    console.error('Errore caricamento dati:', e);
                }
            }

            async saveData() {
                try {
                    localStorage.setItem('barData', JSON.stringify({
                        inventory: this.inventoryData,
                        cocktails: this.cocktailsData,
                        orders: this.dailyOrders,
                        tableOrders: this.tableOrders,
                        stats: JSON.parse(localStorage.getItem('barStats') || '[]')
                    }));
                } catch(e) {
                    console.error('Errore salvataggio dati:', e);
                }
            }

            bindEvents() {
                document.getElementById('themeToggle').onclick = () => this.toggleTheme();
                document.getElementById('addIngredientBtn').onclick = () => this.openIngredientModal();
                document.getElementById('addCocktailBtn').onclick = () => this.openCocktailModal();
                document.getElementById('endDayBtn').onclick = () => this.endDay();

                // Ricerca cocktail
                document.getElementById('cocktailSearch').addEventListener('input', (e) => {
                    this.filterCocktails(e.target.value);
                });

                // Tab inclusa Premium
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                        e.target.classList.add('active');
                        document.getElementById(e.target.dataset.tab + 'Tab').classList.add('active');
                    });
                });

                // Tavoli
                document.querySelectorAll('.table-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.table-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.currentTable = parseInt(e.target.dataset.table);
                        this.renderTableOrders();
                    });
                });

                // Drag & Drop cocktails
                document.getElementById('cocktailsGrid').addEventListener('dragstart', (e) => {
                    if (e.target.classList.contains('cocktail-btn')) {
                        this.dragData = e.target.dataset.cocktail;
                        e.target.classList.add('dragging');
                    }
                });

                document.getElementById('cocktailsGrid').addEventListener('dragend', (e) => {
                    if (e.target.classList.contains('cocktail-btn')) {
                        e.target.classList.remove('dragging');
                        this.dragData = null;
                    }
                });

                document.getElementById('cocktailsGrid').addEventListener('dragover', (e) => e.preventDefault());
                document.getElementById('cocktailsGrid').addEventListener('drop', (e) => {
                    e.preventDefault();
                    // Reorder logic qui
                });
            }

            filterCocktails(query) {
                const grid = document.getElementById('cocktailsGrid');
                const cocktails = Object.entries(this.cocktailsData);
                
                if (!query) {
                    this.renderCocktails();
                    return;
                }

                let html = '';
                for (let [name, data] of cocktails) {
                    if (name.toLowerCase().includes(query.toLowerCase()) || 
                        Object.keys(data.ingredients || {}).some(ing => 
                            ing.toLowerCase().includes(query.toLowerCase())
                        )) {
                        const count = this.dailyOrders[name] || 0;
                        html += `
                            <div class="cocktail-btn ${count > 0 ? 'selected' : ''}" data-cocktail="${name}" draggable="true">
                                <div class="cocktail-name">${name}</div>
                                <div class="cocktail-count">${count}</div>
                                <div class="cocktail-price">€${data.price.toFixed(1)}</div>
                            </div>`;
                    }
                }
                grid.innerHTML = html || '<div class="drag-placeholder">Nessun cocktail trovato</div>';
            }

            renderTableOrders() {
                const container = document.getElementById('tableOrders');
                const tableData = this.tableOrders[this.currentTable];
                let total = 0;
                let html = '';

                for (let [name, count] of Object.entries(tableData).filter(([_,c])=>c>0)) {
                    total += count;
                    const data = this.cocktailsData[name];
                    if (data) {
                        html += `<div>${name} ×${count} (€${(data.price*count).toFixed(1)})</div>`;
                    }
                }

                container.innerHTML = total ? html : 'Nessun ordine a questo tavolo';
                container.innerHTML += `<div style="margin-top:12px;font-weight:600;color:var(--gold);">Totale: ${total}</div>`;
            }

            renderTopCocktails() {
                const sorted = Object.entries(this.dailyOrders)
                    .filter(([_,c])=>c>0)
                    .sort(([,a],[,b])=>b-a)
                    .slice(0,5);
                
                const container = document.getElementById('topCocktails');
                let html = '';
                let totalOrders = Object.values(this.dailyOrders).reduce((a,b)=>a+b,0);
                
                sorted.forEach(([name, count], i) => {
                    const percent = totalOrders ? ((count/totalOrders)*100).toFixed(1) : 0;
                    html += `
                        <div class="stat-item">
                            <div style="font-size:12px;color:rgba(255,255,255,0.8);">#${i+1}</div>
                            <div style="font-size:20px;font-weight:700">${name}</div>
                            <div style="font-size:14px;color:var(--gold);">${count} (${percent}%)</div>
                        </div>`;
                });
                container.innerHTML = html;
            }

            renderStats() {
                const stats = JSON.parse(localStorage.getItem('barStats') || '[]');
                const grid = document.getElementById('statsGrid');
                
                if (stats.length === 0) {
                    grid.innerHTML = '<div class="card" style="text-align:center;opacity:0.5;padding:40px;grid-column:1/-1;">Nessuna statistica disponibile</div>';
                    return;
                }

                const latest = stats[0];
                const yesterday = stats[1] || {totalOrders: 0};
                
                document.getElementById('todayOrders').textContent = latest.totalOrders;
                document.getElementById('yesterdayOrders').textContent = yesterday.totalOrders;

                // resto stats invariate...
                const avgOrders = Math.round(stats.reduce((sum,s)=>sum+s.totalOrders,0)/stats.length);
                grid.innerHTML = `
                    <div class="stat-item card">
                        <div class="stat-label">Oggi</div>
                        <div class="stat-value">${latest.totalOrders}</div>
                    </div>
                    <div class="stat-item card">
                        <div class="stat-label">Media ordini</div>
                        <div class="stat-value">${avgOrders}</div>
                    </div>
                `;
            }

            async quickOrder(name, table = null) {
                const targetOrders = table ? this.tableOrders[table] : this.dailyOrders;
                targetOrders[name] = (targetOrders[name] || 0) + 1;
                
                if (!table) await this.saveData();
                this.renderAll();
            }

            renderCocktails() {
                const grid = document.getElementById('cocktailsGrid');
                let html = '';
                for (let [name, data] of Object.entries(this.cocktailsData).sort(([a],[b])=>a.localeCompare(b))) {
                    const count = this.dailyOrders[name] || 0;
                    html += `
                        <div class="cocktail-btn ${count > 0 ? 'selected' : ''}" data-cocktail="${name}" draggable="true">
                            <div class="cocktail-name">${name}</div>
                            <div class="cocktail-count">${count}</div>
                            <div class="cocktail-price">€${data.price.toFixed(1)}</div>
                        </div>`;
                }
                grid.innerHTML = html || '<div class="drag-placeholder">Trascina qui i tuoi cocktail</div>';
            }

            async renderAll() {
                this.renderCocktails();
                this.renderOrders();
                this.renderInventory();
                this.renderStats();
                this.renderTopCocktails();
            }

            // Altre funzioni invariate (toggleTheme, openIngredientModal, etc.)
            toggleTheme() {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
                document.getElementById('themeToggle').textContent = isDark ? '🌙' : '☀️';
                localStorage.setItem('theme', isDark ? 'light' : 'dark');
            }
        }

        const barManager = new BarManager();
    </script>
</body>
</html>
